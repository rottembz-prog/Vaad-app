    function getDefaultYear() {
      const now = new Date();
      const m = now.getMonth() + 1;
      const y = now.getFullYear();
      const start = m >= 9 ? y : y - 1;
      const hebYears = { 2024: 'תשפ"ה', 2025: 'תשפ"ו', 2026: 'תשפ"ז', 2027: 'תשפ"ח', 2028: 'תשפ"ט' };
      return `${hebYears[start] || ''} ${start}–${start + 1}`.trim();
    }

    function formatDate(iso) {
      if (!iso) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) {
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
      }
      return iso;
    }

    function generateReport(budget) {
      const events   = budget.events   || [];
      const students = budget.students || [];
      const expenses = events.filter(e => (e.type || 'expense') === 'expense');
      const incomes  = events.filter(e => e.type === 'income');
      const totalBudgetExp  = expenses.reduce((s, e) => s + e.budget, 0);
      const totalSpent      = expenses.reduce((s, e) => s + e.spent,  0);
      const totalBudgetInc  = incomes.reduce((s, e) => s + e.budget, 0);
      const collectionBudget = (budget.expectedStudents || 0) * (budget.feePerStudent || 0);
      const totalCollected   = students.reduce((s, st) => s + (st.amount || 0), 0);
      const paidCount        = students.filter(s => s.paid).length;

      const catMap = {};
      expenses.forEach(e => { catMap[e.category] = (catMap[e.category] || 0) + e.spent; });
      const maxCatVal = Math.max(...Object.values(catMap), 1);

      const catRows = Object.entries(catMap).map(([cat, val]) => `
        <tr><td>${cat}</td><td>₪${val.toLocaleString()}</td>
        <td><div style="background:#e2e8f0;border-radius:4px;height:10px;width:160px">
        <div style="background:#7c3aed;height:10px;border-radius:4px;width:${Math.round((val/maxCatVal)*100)}%"></div>
        </div></td></tr>`).join('');

      const eventRows = events.map(e => `
        <tr><td>${e.name}</td><td>${formatDate(e.date)}</td><td>${e.category}</td>
        <td>${(e.type||'expense')==='income' ? 'הכנסה' : 'הוצאה'}</td>
        <td>₪${e.budget.toLocaleString()}</td><td>₪${e.spent.toLocaleString()}</td>
        <td>${e.done ? '✅' : '⬜'}</td></tr>`).join('');

      const membersHtml = (budget.members||[]).length > 0
        ? `<p><strong>חברי הועד:</strong> ${(budget.members||[]).join(', ')}</p>` : '';
      const groupsHtml = (budget.whatsappGroups||[]).length > 0
        ? `<p><strong>קבוצות וואצאפ:</strong> ${(budget.whatsappGroups||[]).map(g => g.name).join(', ')}</p>` : '';

      { id: "collect", label: "גבייה",  icon: "users" },
      { id: "gifts",   label: "רעיונות", icon: "bulb" },
      { id: "cash",    label: "מזומן",  icon: "wallet" },
    ];

    // ─────────────────────────────────────────
    // SHARED UI COMPONENTS
    // ─────────────────────────────────────────
    function Card({ children, style = {} }) {
      return (
        <div style={{
          background: "white", borderRadius: 16, padding: 16,
          boxShadow: "0 2px 16px rgba(0,0,0,0.07)", marginBottom: 10, ...style,
        }}>{children}</div>
      );
    }

    function Badge({ text, cat }) {
      const c = CAT_COLORS[cat] || CAT_COLORS["שונות"];
      return (
        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: c.bg, color: c.text, whiteSpace: "nowrap" }}>
          {text}
        </span>
      );
    }

    function ProgressBar({ pct, color = "#7c3aed", style = {} }) {
      return (
        <div style={{ background: "#f1f5f9", borderRadius: 100, height: 7, overflow: "hidden", ...style }}>
          <div style={{ height: "100%", borderRadius: 100, background: color, width: `${Math.min(Math.max(pct, 0), 100)}%`, transition: "width 0.4s ease" }} />
        </div>
      );
    }

    function BottomNav({ tabs, activeTab, setActiveTab }) {
      return (
        <div style={{
          position: "fixed", bottom: 0, right: 0, left: 0, maxWidth: 480, margin: "0 auto",
          background: "white", borderTop: "1px solid #f1f5f9",
          display: "flex", padding: "6px 0 10px",
          boxShadow: "0 -8px 30px rgba(0,0,0,0.1)", zIndex: 100,
        }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
              gap: 2, background: "none", border: "none", cursor: "pointer", padding: "4px 0",
            }}>
              <Icon n={t.icon} s={20} c={activeTab === t.id ? "#7c3aed" : "#94a3b8"} w={activeTab === t.id ? 2.2 : 1.6} />
              <span style={{ fontSize: 10, fontWeight: activeTab === t.id ? 800 : 400, fontFamily: "inherit", color: activeTab === t.id ? "#7c3aed" : "#94a3b8" }}>{t.label}</span>
              {activeTab === t.id && <div style={{ width: 18, height: 3, borderRadius: 100, background: "linear-gradient(90deg,#7c3aed,#db2777)" }} />}
            </button>
          ))}
        </div>
      );
    }

    // Reusable inline edit row label
    function FieldLabel({ children }) {
      return <div style={{ fontSize: 11, fontWeight: 600, color: "#64748b", marginBottom: 3, marginTop: 4 }}>{children}</div>;
    }

    // ─── SVG icon system ───────────────────────
    function Icon({ n, s = 18, c = "currentColor", w = 1.8 }) {
      const p = {
        chart:    <><rect x="3" y="10" width="3.5" height="7" rx="1"/><rect x="8.5" y="6" width="3.5" height="11" rx="1"/><rect x="14" y="2" width="3.5" height="15" rx="1"/></>,
        users:    <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        bulb:     <><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L15 17H9l-.7-2C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z"/></>,
        wallet:   <><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></>,
        pencil:   <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        trash:    <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
        copy:     <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
        report:   <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></>,
        check:    <polyline points="20 6 9 17 4 12"/>,
        x:        <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        plus:     <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        arrow:    <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
        arrowleft:<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        user:     <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        link:     <><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>,
        msg:      <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 0 2 2z"/></>,
        phone:    <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 17z"/></>,
        search:   <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        store:    <><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></>,
        tag:      <><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>,
        image:    <><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
        upload:   <><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>,
        cash:     <><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></>,
        income:   <><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></>,
        expense:  <><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></>,
        partial:  <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
        calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
      };
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round" style={{ width: s, height: s, display: "inline-block", verticalAlign: "middle", flexShrink: 0 }}>
          {p[n] || null}
        </svg>
      );
    }

    // ─────────────────────────────────────────
    // HOME SCREEN — Budget Manager
    // ─────────────────────────────────────────
    const EMPTY_BUDGET_FORM = { name: "", className: "", year: getDefaultYear(), colorKey: "purple", feePerStudent: "500", members: [], whatsappGroups: [] };

    function BudgetListCard({ budget, onSelect, onEdit, onDelete, onCopy, onReport }) {
      const clr = BUDGET_COLORS[budget.colorKey] || BUDGET_COLORS.purple;
      const paidCount  = budget.students.filter(s => s.paid).length;
      const total      = budget.students.length;
      const budgetSum  = budget.events.reduce((s, e) => s + e.budget, 0);
      const collected  = budget.students.reduce((s, st) => s + (st.amount || 0), 0);

      return (
        <div style={{ background: "white", borderRadius: 20, overflow: "hidden", marginBottom: 14, boxShadow: "0 4px 20px rgba(0,0,0,0.09)" }}>
          {/* Colored header */}
          <div style={{ background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`, padding: "14px 16px 12px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: "white", fontWeight: 900, fontSize: 18, marginBottom: 2 }}>{budget.name}</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 13 }}>{budget.className} • {budget.year}</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={onReport} style={{ background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 8, padding: "6px 8px", color: "white", cursor: "pointer", lineHeight: 1, display:"flex", alignItems:"center" }} title="דו״ח PDF"><Icon n="report" s={15} c="white" w={1.8} /></button>
                <button onClick={onCopy}   style={{ background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 8, padding: "6px 8px", color: "white", cursor: "pointer", lineHeight: 1, display:"flex", alignItems:"center" }} title="שכפלי"><Icon n="copy" s={15} c="white" w={1.8} /></button>
                <button onClick={onEdit}   style={{ background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 8, padding: "6px 8px", color: "white", cursor: "pointer", lineHeight: 1, display:"flex", alignItems:"center" }} title="ערכי"><Icon n="pencil" s={15} c="white" w={1.8} /></button>
                <button onClick={onDelete} style={{ background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 8, padding: "6px 8px", color: "white", cursor: "pointer", lineHeight: 1, display:"flex", alignItems:"center" }} title="מחקי"><Icon n="trash" s={15} c="white" w={1.8} /></button>
              </div>
            </div>
          </div>
          {/* Stats */}
          <div style={{ padding: "12px 16px 14px" }}>
            {total > 0 && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748b", marginBottom: 5 }}>
                  <span>גבייה</span>
                  <span style={{ fontWeight: 700, color: "#0f172a" }}>{paidCount}/{total} שילמו</span>
                </div>
                <ProgressBar pct={total > 0 ? (paidCount / total) * 100 : 0} color={clr.from} style={{ marginBottom: 10 }} />
              </>
            )}
            <div style={{ display: "flex", gap: 14, fontSize: 12, color: "#64748b", alignItems: "center" }}>
              <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="chart" s={13} c="#7c3aed" w={2} /> ₪{budgetSum.toLocaleString()} תקציב</span>
              <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="wallet" s={13} c="#0ea5e9" w={2} /> ₪{collected.toLocaleString()} נגבה</span>
              {budget.feePerStudent && <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="user" s={13} c="#10b981" w={2} /> ₪{budget.feePerStudent}/ילד</span>}
            </div>
            <button onClick={onSelect} style={{
              marginTop: 12, width: "100%", padding: "11px 0", borderRadius: 12, border: "none",
              background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`,
              color: "white", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit",
            }}>כנסי לתקציב ←</button>
          </div>
        </div>
      );
    }

    function BudgetForm({ initial = EMPTY_BUDGET_FORM, onSave, onCancel, title }) {
      const [form, setForm]           = useState({ ...EMPTY_BUDGET_FORM, ...initial });
      const [newMember, setNewMember] = useState("");
      const [newGName,  setNewGName]  = useState("");
      const [newGLink,  setNewGLink]  = useState("");
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const addMember = () => {
        if (!newMember.trim()) return;
        set("members", [...(form.members || []), newMember.trim()]);
        setNewMember("");
      };
      const removeMember = (i) => set("members", (form.members || []).filter((_, j) => j !== i));

      const addGroup = () => {
        if (!newGName.trim()) return;
        set("whatsappGroups", [...(form.whatsappGroups || []), { name: newGName.trim(), link: newGLink.trim() }]);
        setNewGName(""); setNewGLink("");
      };
      const removeGroup = (i) => set("whatsappGroups", (form.whatsappGroups || []).filter((_, j) => j !== i));

      return (
        <Card style={{ border: "2px solid #ede9fe" }}>
          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 12 }}>{title}</div>

          <FieldLabel>שם הועד / הקבוצה</FieldLabel>
          <input placeholder="ועד הורים / ועדת ספורט / ..." value={form.name}
            onChange={e => set("name", e.target.value)} style={S.input} autoFocus />

          <FieldLabel>כיתה / קבוצה</FieldLabel>
          <input placeholder='כיתה ו׳ / מחלקת א׳ / ...' value={form.className}
            onChange={e => set("className", e.target.value)} style={S.input} />

          <FieldLabel>שנת לימודים</FieldLabel>
          <input placeholder="תשפ״ה / 2025-2026" value={form.year}
            onChange={e => set("year", e.target.value)} style={S.input} />

          <FieldLabel>תשלום פר ילד (₪)</FieldLabel>
          <input type="text" inputMode="numeric" placeholder="500" value={form.feePerStudent}
            onChange={e => set("feePerStudent", e.target.value)} style={S.input} />

          <FieldLabel>צבע נושא</FieldLabel>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            {Object.entries(BUDGET_COLORS).map(([key, clr]) => (
              <button key={key} onClick={() => set("colorKey", key)} style={{
                width: 36, height: 36, borderRadius: "50%", border: form.colorKey === key ? "3px solid #0f172a" : "3px solid transparent",
                background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`,
                cursor: "pointer", outline: "none",
              }} title={clr.label} />
            ))}
          </div>

          <FieldLabel>חברי הועד</FieldLabel>
          {(form.members || []).map((m, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, background: "#f8fafc", borderRadius: 8, padding: "6px 10px" }}>
              <span style={{ flex: 1, fontSize: 13 }}>👤 {m}</span>
              <button onClick={() => removeMember(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            <input value={newMember} onChange={e => setNewMember(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addMember()}
              placeholder="שם חבר/ת ועד" style={{ ...S.input, marginBottom: 0, flex: 1 }} />
            <button onClick={addMember} style={{ ...S.btn("#7c3aed"), flex: "none", padding: "10px 14px" }}>+ הוסף</button>
          </div>

          <FieldLabel>קבוצות וואצאפ</FieldLabel>
          {(form.whatsappGroups || []).map((g, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, background: "#f0fdf4", borderRadius: 8, padding: "6px 10px" }}>
              <span style={{ flex: 1, fontSize: 13 }}>💬 {g.name}</span>
              {g.link && <a href={g.link} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#7c3aed" }}>🔗</a>}
              <button onClick={() => removeGroup(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ marginBottom: 6 }}>
            <input value={newGName} onChange={e => setNewGName(e.target.value)}
              placeholder="שם הקבוצה" style={{ ...S.input, marginBottom: 6 }} />
            <input value={newGLink} onChange={e => setNewGLink(e.target.value)}
              placeholder="קישור לקבוצה (https://chat.whatsapp.com/...)" style={{ ...S.input, marginBottom: 6 }} />
            <button onClick={addGroup} style={{ ...S.btn("#059669"), width: "100%" }}>+ הוסף קבוצה</button>
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={() => onSave(form)} style={S.btn("#7c3aed")} disabled={!form.name.trim()}>שמור</button>
            <button onClick={onCancel} style={S.btn("#94a3b8")}>ביטול</button>
          </div>
        </Card>
      );
    }

    function HomeScreen({ budgets, currentClass, user, onSignOut, onBack, onAddBudget, onDeleteBudget, onUpdateBudgetMeta, onSelect }) {
      const [mode, setMode]           = useState("list"); // list | add | edit
      const [editingId, setEditingId] = useState(null);
      const [showCode, setShowCode]   = useState(false);

      const handleAdd = async (form) => {
        await onAddBudget({
          name: form.name.trim(),
          className: form.className.trim(),
          year: form.year.trim(),
          colorKey: form.colorKey,
          feePerStudent: Number(form.feePerStudent) || 500,
          expectedStudents: 0,
          students: [], events: [], cashLog: [],
          members: form.members || [],
          whatsappGroups: form.whatsappGroups || [],
          payboxLink: "",
          classWhatsappLink: "",
        });
        setMode("list");
      };

      const handleSave = async (form) => {
        await onUpdateBudgetMeta(editingId, {
          name: form.name.trim(),
          className: form.className.trim(),
          year: form.year.trim(),
          colorKey: form.colorKey,
          feePerStudent: Number(form.feePerStudent),
          members: form.members || [],
          whatsappGroups: form.whatsappGroups || [],
        });
        setMode("list"); setEditingId(null);
      };

      const handleCopy = async (id) => {
        const src = budgets.find(b => b.id === id);
        if (!src) return;
        const { id: _id, ...rest } = src;
        await onAddBudget({ ...rest, name: `עותק — ${src.name}` });
      };

      const handleDelete = async (id) => {
        if (window.confirm("למחוק תקציב זה? הנתונים יאבדו לצמיתות.")) {
          await onDeleteBudget(id);
        }
      };

      const editingBudget = budgets.find(b => b.id === editingId);

      return (
        <div style={{ minHeight: "100vh", background: "#f8fafc" }}>
          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)", padding: "20px 20px 24px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>
                  {currentClass?.name || "מנהל תקציבים"}
                </div>
                <div style={{ color: "white", fontWeight: 900, fontSize: 22 }}>ועד הורים</div>
                <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, marginTop: 3 }}>בחרי תקציב לניהול</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={onBack} style={{ background: "rgba(255,255,255,0.12)", border: "none", borderRadius: 8, padding: "6px 10px", color: "rgba(255,255,255,0.8)", cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>
                    ← קבוצות
                  </button>
                  <button onClick={onSignOut} style={{ background: "rgba(255,255,255,0.12)", border: "none", borderRadius: 8, padding: "6px 10px", color: "rgba(255,255,255,0.8)", cursor: "pointer", fontSize: 11, fontFamily: "inherit" }}>
                    יציאה
                  </button>
                </div>
                {currentClass?.inviteCode && (
                  <button onClick={() => setShowCode(v => !v)} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 8, padding: "5px 10px", color: "white", cursor: "pointer", fontSize: 11, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>
                    🔗 קוד הצטרפות{showCode ? ` · ${currentClass.inviteCode}` : ""}
                  </button>
                )}
              </div>
            </div>
          </div>

          <div style={{ padding: "20px 14px 30px" }}>
            {mode === "add" && (
              <BudgetForm title="➕ תקציב חדש" onSave={handleAdd} onCancel={() => setMode("list")} />
            )}
            {mode === "edit" && editingBudget && (
              <BudgetForm
                title="✏️ עריכת תקציב"
                initial={{ ...editingBudget, feePerStudent: String(editingBudget.feePerStudent), members: editingBudget.members || [], whatsappGroups: editingBudget.whatsappGroups || [] }}
                onSave={handleSave}
                onCancel={() => { setMode("list"); setEditingId(null); }}
              />
            )}

            {budgets.length === 0 && mode === "list" && (
              <div style={{ textAlign: "center", color: "#94a3b8", padding: "40px 0" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
                <div style={{ fontSize: 15, fontWeight: 600 }}>אין תקציבים עדיין</div>
                <div style={{ fontSize: 13, marginTop: 4 }}>לחצי על הכפתור למטה כדי להוסיף</div>
              </div>
            )}

            {mode === "list" && budgets.map(b => (
              <BudgetListCard
                key={b.id}
                budget={{ students: [], events: [], cashLog: [], ...b }}
                onSelect={() => onSelect(b.id)}
                onEdit={() => { setEditingId(b.id); setMode("edit"); }}
                onDelete={() => handleDelete(b.id)}
                onCopy={() => handleCopy(b.id)}
                onReport={() => generateReport({ students: [], events: [], cashLog: [], ...b })}
              />
            ))}

            {mode === "list" && (
              <button onClick={() => setMode("add")} style={{
                width: "100%", padding: 16, borderRadius: 16, border: "2px dashed #cbd5e1",
                background: "transparent", color: "#7c3aed", fontWeight: 700, fontSize: 14,
                cursor: "pointer", fontFamily: "inherit",
              }}>+ הוסיפי תקציב חדש</button>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // BUDGET TAB — Events with edit
    // ─────────────────────────────────────────
    const EMPTY_EVENT = { name: "", date: "", budget: "", spent: "", category: "פעילות", notes: "", paidBy: "", done: false, type: "expense" };

    function EventForm({ data, onChange, onSave, onCancel, title }) {
      return (
        <Card style={{ border: "2px solid #ede9fe" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>{title}</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            {["expense", "income"].map(t => (
              <button key={t} onClick={() => onChange({ ...data, type: t })} style={{
                flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
                cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 13,
                background: data.type === t ? (t === "expense" ? "#fee2e2" : "#dcfce7") : "#f1f5f9",
                color:      data.type === t ? (t === "expense" ? "#ef4444" : "#059669") : "#94a3b8",
              }}><span style={{ display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n={t === "expense" ? "expense" : "income"} s={13} c={data.type === t ? (t === "expense" ? "#ef4444" : "#059669") : "#94a3b8"} w={2} />{t === "expense" ? "הוצאה" : "הכנסה"}</span></button>
            ))}
          </div>
          <FieldLabel>קטגוריה</FieldLabel>
          <select value={data.category} onChange={e => onChange({ ...data, category: e.target.value })} style={S.input}>
            {CAT_LIST.map(c => <option key={c}>{c}</option>)}
          </select>
          {data.category === "חג" && (
            <div style={{ marginBottom: 4 }}>
              <FieldLabel>בחרי חג (ימלא את שם הארוע)</FieldLabel>
              <select value="" onChange={e => { if (e.target.value) onChange({ ...data, name: e.target.value }); }} style={S.input}>
                <option value="">— בחרי חג —</option>
                {HOLIDAY_OPTIONS.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          )}
          <FieldLabel>שם הארוע *</FieldLabel>
          <input value={data.name} onChange={e => onChange({ ...data, name: e.target.value })} placeholder="שם הארוע" style={S.input} autoFocus />
          <FieldLabel>תאריך</FieldLabel>
          <input type="date" value={data.date} onChange={e => onChange({ ...data, date: e.target.value })} style={S.input} />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <FieldLabel>תקציב ₪</FieldLabel>
              <input type="text" inputMode="numeric" value={data.budget} onChange={e => onChange({ ...data, budget: e.target.value })} placeholder="0" style={S.input} />
            </div>
            <div style={{ flex: 1 }}>
              <FieldLabel>{(data.type || "expense") === "income" ? "התקבל ₪" : "שולם ₪"}</FieldLabel>
              <input type="text" inputMode="numeric" value={data.spent} onChange={e => onChange({ ...data, spent: e.target.value })} placeholder="0" style={S.input} />
            </div>
          </div>
          <FieldLabel>הערות</FieldLabel>
          <input value={data.notes} onChange={e => onChange({ ...data, notes: e.target.value })} placeholder="הערות" style={S.input} />
          <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
          <input value={data.paidBy || ""} onChange={e => onChange({ ...data, paidBy: e.target.value })} placeholder="שם" style={S.input} />
          <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
            <input type="checkbox" checked={!!data.done} onChange={e => onChange({ ...data, done: e.target.checked })} style={{ width: 16, height: 16 }} />
            הושלם ✅
          </label>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onSave} style={S.btn("#7c3aed")} disabled={!data.name.trim()}>שמור</button>
            <button onClick={onCancel} style={S.btn("#94a3b8")}>ביטול</button>
          </div>
        </Card>
      );
    }

    function BudgetTab({ events, setEvents, collectionBudget = 0 }) {
      const [showAdd, setShowAdd] = useState(false);
      const [filter, setFilter]  = useState("הכל");
      const [addForm, setAddForm] = useState(EMPTY_EVENT);
      const [editId, setEditId]  = useState(null);
      const [editForm, setEditForm] = useState({});

      const totalExpBudget = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.budget, 0);
      const totalIncBudget = collectionBudget + events.filter(e => (e.type || "expense") === "income").reduce((s, e) => s + e.budget, 0);
      const totalSpent     = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.spent, 0);
      const cats           = ["הכל", ...CAT_LIST];
      const filtered       = filter === "הכל" ? events : events.filter(e => e.category === filter);
      const parseSortDate  = (d) => { if (!d) return Infinity; if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return new Date(d).getTime(); const m = d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/); if (m) { let y = parseInt(m[3]); if (y < 100) y += 2000; return new Date(y, parseInt(m[2]) - 1, parseInt(m[1])).getTime(); } return Infinity; };
      const sorted         = [...filtered].sort((a, b) => parseSortDate(a.date) - parseSortDate(b.date));

      const addEvent = () => {
        if (!addForm.name.trim()) return;
        setEvents([...events, { id: Date.now(), ...addForm, budget: Number(addForm.budget) || 0, spent: Number(addForm.spent) || 0 }]);
        setAddForm(EMPTY_EVENT); setShowAdd(false);
      };

      const startEdit  = (ev) => { setEditId(ev.id); setEditForm({ ...ev, budget: String(ev.budget), spent: String(ev.spent), type: ev.type || "expense" }); };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        setEvents(events.map(e => e.id === editId ? { ...editForm, id: editId, budget: Number(editForm.budget) || 0, spent: Number(editForm.spent) || 0 } : e));
        setEditId(null);
      };
      const removeEvent = (id) => { if (window.confirm("למחוק ארוע זה?")) setEvents(events.filter(e => e.id !== id)); };
      const toggleDone  = (id) => setEvents(events.map(e => e.id === id ? { ...e, done: !e.done } : e));

      return (
        <div>
          {/* Summary */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
            {[
              { l: "תקציב הוצאות", v: `₪${totalExpBudget.toLocaleString()}`, c: "#ef4444", icon: "expense" },
              { l: "תקציב הכנסות", v: `₪${totalIncBudget.toLocaleString()}`, c: "#059669", icon: "income" },
              { l: "שולם בפועל",   v: `₪${totalSpent.toLocaleString()}`,     c: "#db2777", icon: "cash" },
              { l: "יתרה תקציבית", v: `₪${(totalIncBudget - totalExpBudget).toLocaleString()}`, c: totalIncBudget >= totalExpBudget ? "#7c3aed" : "#ef4444", icon: "chart" },
            ].map(x => (
              <div key={x.l} style={{ background: "white", borderRadius: 14, padding: "12px 8px", textAlign: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.07)" }}>
                <div style={{ display:"flex", justifyContent:"center", marginBottom: 2 }}><Icon n={x.icon} s={18} c={x.c} w={2} /></div>
                <div style={{ fontWeight: 900, fontSize: 15, color: x.c }}>{x.v}</div>
                <div style={{ fontSize: 10, color: "#94a3b8" }}>{x.l}</div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
            {cats.map(c => (
              <button key={c} onClick={() => setFilter(c)} style={{
                padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer",
                fontFamily: "inherit", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap",
                background: filter === c ? "#7c3aed" : "#f1f5f9",
                color:      filter === c ? "white"   : "#64748b",
              }}>{c}</button>
            ))}
          </div>

          {/* Event list */}
          {sorted.map(ev => {
            const isIncome = (ev.type || "expense") === "income";
            return editId === ev.id ? (
              <EventForm key={ev.id} title="✏️ עריכת ארוע" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <Card key={ev.id} style={{ opacity: ev.done ? 0.65 : 1, padding: "12px 14px", borderRight: `3px solid ${isIncome ? "#22c55e" : "#7c3aed"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                      <button onClick={() => toggleDone(ev.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 0, lineHeight: 1 }}>
                        {ev.done ? "✅" : "⬜"}
                      </button>
                      <span style={{ fontWeight: 700, fontSize: 14, color: "#0f172a" }}>{ev.name}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 8, background: isIncome ? "#dcfce7" : "#fee2e2", color: isIncome ? "#059669" : "#ef4444" }}>
                        <span style={{ display:"inline-flex", alignItems:"center", gap: 3 }}><Icon n={isIncome ? "income" : "expense"} s={10} c={isIncome ? "#059669" : "#ef4444"} w={2.2} />{isIncome ? "הכנסה" : "הוצאה"}</span>
                      </span>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                      <Badge text={ev.category} cat={ev.category} />
                      <span style={{ fontSize: 11, color: "#94a3b8" }}>{formatDate(ev.date)}</span>
                      {ev.paidBy && <span style={{ fontSize: 11, color: "#64748b" }}>👤 {ev.paidBy}</span>}
                    </div>
                    {ev.notes && <div style={{ fontSize: 11, color: "#64748b" }}>📝 {ev.notes}</div>}
                  </div>
                  <div style={{ textAlign: "left", flexShrink: 0, marginRight: 8 }}>
                    <div style={{ fontWeight: 900, fontSize: 16, color: "#0f172a" }}>₪{ev.budget.toLocaleString()}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>תקציב</div>
                    {ev.spent > 0 && <div style={{ fontSize: 12, fontWeight: 700, color: isIncome ? "#059669" : "#db2777", marginTop: 2 }}>₪{ev.spent.toLocaleString()} {isIncome ? "התקבל" : "שולם"}</div>}
                  </div>
                </div>
                {ev.spent > 0 && ev.budget > 0 && (
                  <ProgressBar
                    pct={(ev.spent / ev.budget) * 100}
                    color={isIncome ? "#22c55e" : ((ev.spent / ev.budget) > 1 ? "#ef4444" : (ev.spent / ev.budget) > 0.8 ? "#f59e0b" : "#7c3aed")}
                    style={{ marginTop: 8, marginBottom: 4 }}
                  />
                )}
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button onClick={() => startEdit(ev)} style={S.smallBtn("#e2e8f0", "#64748b")}>עריכה</button>
                  <button onClick={() => removeEvent(ev.id)} style={S.smallBtn("#fee2e2", "#ef4444")}>✕ מחקי</button>
                </div>
              </Card>
            );
          })}

          {/* Add form */}
          {showAdd ? (
            <EventForm title="➕ ארוע חדש" data={addForm} onChange={setAddForm} onSave={addEvent} onCancel={() => setShowAdd(false)} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, border: "2px dashed #e2e8f0",
              background: "transparent", color: "#7c3aed", fontWeight: 700, fontSize: 14,
              cursor: "pointer", fontFamily: "inherit",
            }}>+ הוסיפי ארוע</button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // COLLECT TAB — Students with edit
    // ─────────────────────────────────────────
    const EMPTY_STUDENT_FORM = { name: "", paid: false, amount: "", note: "", paidBy: "", partial: false };

    function CollectTab({ students, setStudents, feePerStudent = 500, setFeePerStudent, expectedStudents = 0, setExpectedStudents, payboxLink = "", setPayboxLink, classWhatsappLink = "", setClassWhatsappLink }) {
      const [search,        setSearch]        = useState("");
      const [showAdd,       setShowAdd]       = useState(false);
      const [addForm,       setAddForm]       = useState(EMPTY_STUDENT_FORM);
      const [editId,        setEditId]        = useState(null);
      const [editForm,      setEditForm]      = useState({});
      const [studentsRaw,   setStudentsRaw]   = useState(String(expectedStudents));

      const paidCount      = students.filter(s => s.paid).length;
      const totalCollected = students.reduce((s, st) => s + (st.amount || 0), 0);
      const collectionBudgetTotal = expectedStudents * feePerStudent;
      const filtered       = search ? students.filter(s => s.name.includes(search)) : students;

      const toggle = (id) => setStudents(students.map(s =>
        s.id === id ? { ...s, paid: !s.paid, amount: !s.paid ? feePerStudent : s.amount } : s
      ));

      const addStudent = () => {
        if (!addForm.name.trim()) return;
        setStudents([...students, { id: Date.now(), name: addForm.name.trim(), paid: !!addForm.paid, amount: Number(addForm.amount) || 0, note: addForm.note || "", paidBy: addForm.paidBy || "", partial: !!addForm.partial }]);
        setAddForm(EMPTY_STUDENT_FORM); setShowAdd(false);
      };

      const startEdit = (s) => { setEditId(s.id); setEditForm({ ...s, amount: String(s.amount) }); };
      const cancelEdit = () => setEditId(null);
      const saveEdit = () => {
        setStudents(students.map(s => s.id === editId
          ? { ...editForm, id: editId, amount: Number(editForm.amount) || 0, paid: !!editForm.paid, partial: !!editForm.partial }
          : s
        ));
        setEditId(null);
      };
      const removeStudent = (id) => { if (window.confirm("למחוק תלמיד זה?")) setStudents(students.filter(s => s.id !== id)); };

      const unpaidStudents = students.filter(s => !s.paid);
      const whatsappMsg = unpaidStudents.length === 0
        ? null
        : paidCount === 0
          ? `שלום כיתה יקרה! 😊\nנפתחה גבייה לדמי ועד הורים לשנה"ל: ₪${feePerStudent} לתלמיד.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`
          : `שלום 😊 תזכורת ידידותית לתשלום דמי ועד הורים (₪${feePerStudent}).\nטרם שולם: ${unpaidStudents.map(s => s.name).join(', ')}.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`;

      return (
        <div>
          {/* Paybox / Bit link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לפייבוקס / ביט</FieldLabel>
            <input value={payboxLink} onChange={e => setPayboxLink && setPayboxLink(e.target.value)}
              placeholder="https://paybox.me/..." style={{ ...S.input, marginBottom: payboxLink ? 6 : 0 }} />
            {payboxLink && <a href={payboxLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#7c3aed" }}>🔗 פתח קישור לתשלום</a>}
          </Card>

          {/* Class WhatsApp link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לוואצאפ כיתה</FieldLabel>
            <input value={classWhatsappLink} onChange={e => setClassWhatsappLink && setClassWhatsappLink(e.target.value)}
              placeholder="https://chat.whatsapp.com/..." style={{ ...S.input, marginBottom: classWhatsappLink ? 6 : 0 }} />
            {classWhatsappLink && <a href={classWhatsappLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#25d366" }}>💬 פתח קבוצת כיתה</a>}
          </Card>

          {/* Collection budget settings */}
          <Card style={{ marginBottom: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div>
                <FieldLabel>מספר תלמידים</FieldLabel>
                <input type="text" inputMode="decimal" value={studentsRaw} onChange={e => { const raw = e.target.value; setStudentsRaw(raw); const num = parseFloat(raw); if (setExpectedStudents) setExpectedStudents(isNaN(num) ? 0 : num); }} style={{ ...S.input, marginBottom: 0 }} />
              </div>
              <div>
                <FieldLabel>סכום לגבייה ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={feePerStudent} onChange={e => setFeePerStudent && setFeePerStudent(Number(e.target.value) || 0)} style={{ ...S.input, marginBottom: 0 }} />
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, padding: "8px 12px", background: "#f0fdf4", borderRadius: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#166534" }}>תקציב גבייה</span>
              <span style={{ fontSize: 17, fontWeight: 900, color: "#059669" }}>₪{collectionBudgetTotal.toLocaleString()}</span>
            </div>
          </Card>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
            {[
              { l: "שילמו",    v: paidCount,                            c: "#059669", icon: "check" },
              { l: "לא שילמו", v: students.length - paidCount,          c: "#ef4444", icon: "x" },
              { l: "נגבה",     v: `₪${totalCollected.toLocaleString()}`, c: "#7c3aed", icon: "wallet" },
            ].map(x => (
              <div key={x.l} style={{ background: "white", borderRadius: 14, padding: "12px 8px", textAlign: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.07)" }}>
                <div style={{ display:"flex", justifyContent:"center", marginBottom: 2 }}><Icon n={x.icon} s={18} c={x.c} w={2.2} /></div>
                <div style={{ fontWeight: 900, fontSize: 18, color: x.c }}>{x.v}</div>
                <div style={{ fontSize: 10, color: "#94a3b8" }}>{x.l}</div>
              </div>
            ))}
          </div>

          <input placeholder="🔍 חפשי תלמיד..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ ...S.input, marginBottom: 10 }} />

          {students.length > 0 && (
            <>
              <ProgressBar pct={(paidCount / students.length) * 100} color="linear-gradient(90deg,#059669,#7c3aed)" />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginBottom: 14, marginTop: 4 }}>
                <span>0%</span>
                <span style={{ fontWeight: 600 }}>{Math.round((paidCount / students.length) * 100)}% שולם</span>
                <span>100%</span>
              </div>
            </>
          )}

          {filtered.map(s => (
            editId === s.id ? (
              <Card key={s.id} style={{ border: "2px solid #ede9fe" }}>
                <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>✏️ עריכת תלמיד</div>
                <FieldLabel>שם</FieldLabel>
                <input value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} style={S.input} autoFocus />
                <FieldLabel>סכום ששולם ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={editForm.amount} onChange={e => setEditForm({ ...editForm, amount: e.target.value })} style={S.input} />
                <FieldLabel>הערה</FieldLabel>
                <input value={editForm.note || ""} onChange={e => setEditForm({ ...editForm, note: e.target.value })} placeholder="הערה..." style={S.input} />
                <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
                <input value={editForm.paidBy || ""} onChange={e => setEditForm({ ...editForm, paidBy: e.target.value })} placeholder="שם" style={S.input} />
                <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, cursor: "pointer", fontSize: 13 }}>
                  <input type="checkbox" checked={!!editForm.paid} onChange={e => setEditForm({ ...editForm, paid: e.target.checked })} style={{ width: 16, height: 16 }} />
                  שולם ✅
                </label>
                <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
                  <input type="checkbox" checked={!!editForm.partial} onChange={e => setEditForm({ ...editForm, partial: e.target.checked })} style={{ width: 16, height: 16 }} />
                  🟠 תשלום חלקי
                </label>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={saveEdit} style={S.btn("#7c3aed")}>שמור</button>
                  <button onClick={cancelEdit} style={S.btn("#94a3b8")}>ביטול</button>
                </div>
              </Card>
            ) : (
              <div key={s.id} style={{
                background: s.partial && !s.paid ? "#fff7ed" : "white",
                borderRadius: 14, padding: "12px 14px", marginBottom: 8,
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)",
                borderRight: `4px solid ${s.paid ? "#059669" : s.partial ? "#f97316" : "#e2e8f0"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: "#0f172a", display: "flex", alignItems: "center", gap: 6 }}>
                      {students.indexOf(s) + 1}. {s.name}
                      {s.partial && !s.paid && <span style={{ fontSize: 10, background: "#fed7aa", color: "#c2410c", borderRadius: 6, padding: "1px 6px", fontWeight: 700 }}>חלקי</span>}
                    </div>
                    {s.note   && <div style={{ fontSize: 11, color: "#f59e0b", marginTop: 2 }}>📝 {s.note}</div>}
                    {s.paidBy && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>👤 {s.paidBy}</div>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                    {(s.paid || s.amount > 0) && <span style={{ fontSize: 12, fontWeight: 700, color: s.paid ? "#059669" : "#f97316" }}>₪{s.amount}</span>}
                    <button onClick={() => toggle(s.id)} style={{
                      width: 36, height: 36, borderRadius: "50%", border: "none", cursor: "pointer",
                      background: s.paid ? "#dcfce7" : s.partial ? "#fed7aa" : "#fee2e2", fontSize: 18,
                    }}>{s.paid ? "✅" : s.partial ? "🟠" : "❌"}</button>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button onClick={() => startEdit(s)} style={S.smallBtn("#e2e8f0", "#64748b")}>עריכה</button>
                  <button onClick={() => removeStudent(s.id)} style={S.smallBtn("#fee2e2", "#ef4444")}>✕ מחקי</button>
                </div>
              </div>
            )
          ))}

          {showAdd ? (
            <Card style={{ border: "2px solid #ede9fe" }}>
              <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>➕ תלמיד/ה חדש/ה</div>
              <FieldLabel>שם התלמיד/ה *</FieldLabel>
              <input value={addForm.name} onChange={e => setAddForm({ ...addForm, name: e.target.value })}
                placeholder="שם התלמיד/ה" style={S.input} autoFocus />
              <FieldLabel>סכום ששולם ₪</FieldLabel>
              <input type="text" inputMode="numeric" value={addForm.amount} onChange={e => setAddForm({ ...addForm, amount: e.target.value })}
                placeholder="0" style={S.input} />
              <FieldLabel>הערה</FieldLabel>
              <input value={addForm.note} onChange={e => setAddForm({ ...addForm, note: e.target.value })}
                placeholder="הערה..." style={S.input} />
              <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
              <input value={addForm.paidBy} onChange={e => setAddForm({ ...addForm, paidBy: e.target.value })}
                placeholder="שם" style={S.input} />
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, cursor: "pointer", fontSize: 13 }}>
                <input type="checkbox" checked={!!addForm.paid} onChange={e => setAddForm({ ...addForm, paid: e.target.checked })} style={{ width: 16, height: 16 }} />
                שולם ✅
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
                <input type="checkbox" checked={!!addForm.partial} onChange={e => setAddForm({ ...addForm, partial: e.target.checked })} style={{ width: 16, height: 16 }} />
                🟠 תשלום חלקי
              </label>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={addStudent} style={S.btn("#7c3aed")} disabled={!addForm.name.trim()}>הוסיפי</button>
                <button onClick={() => { setShowAdd(false); setAddForm(EMPTY_STUDENT_FORM); }} style={S.btn("#94a3b8")}>ביטול</button>
              </div>
            </Card>
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, border: "2px dashed #e2e8f0",
              background: "transparent", color: "#7c3aed", fontWeight: 700, fontSize: 14,
              cursor: "pointer", fontFamily: "inherit", marginTop: 4,
            }}>+ הוסיפי תלמיד/ה</button>
          )}

          {/* Dynamic WhatsApp reminder */}
          {students.length > 0 && (
            <Card style={{ background: unpaidStudents.length === 0 ? "#f0fdf4" : "#f0fdf4", border: `1px solid ${unpaidStudents.length === 0 ? "#bbf7d0" : "#bbf7d0"}`, marginTop: 12 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#166534", marginBottom: 6 }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap: 6 }}>{unpaidStudents.length === 0 ? <><Icon n="check" s={14} c="#166534" w={2.5} /> כולם שילמו!</> : <><Icon n="msg" s={14} c="#166534" w={2} /> תזכורת לוואצאפ</>}</span>
              </div>
              {whatsappMsg && (
                <div style={{ fontSize: 12, color: "#166534", lineHeight: 1.8, userSelect: "all", whiteSpace: "pre-wrap" }}>
                  {whatsappMsg}
                </div>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // GIFTS TAB — Global ideas directory (cross-budget)
    // ─────────────────────────────────────────
    const EMPTY_GIFT = { icon: "🎁", name: "", forWhom: "", priceRange: "", tag: "", notes: "", vendorName: "", vendorPhone: "", vendorLink: "", photo: null };

    function handlePhotoUpload(e, data, onChange) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => onChange({ ...data, photo: ev.target.result });
      reader.readAsDataURL(file);
    }

    function GiftForm({ data, onChange, onSave, onCancel, title }) {
      return (
        <Card style={{ border: "2px solid #ede9fe" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>{title}</div>
          <FieldLabel>אמוג׳י</FieldLabel>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {EMOJIS.map(e => (
              <button key={e} onClick={() => onChange({ ...data, icon: e })} style={{
                fontSize: 20, background: data.icon === e ? "#ede9fe" : "#f8fafc",
                border: data.icon === e ? "2px solid #7c3aed" : "2px solid transparent",
                borderRadius: 8, padding: 4, cursor: "pointer",
              }}>{e}</button>
            ))}
          </div>
          <FieldLabel>שם הרעיון *</FieldLabel>
          <input value={data.name} onChange={e => onChange({ ...data, name: e.target.value })} placeholder="שם הרעיון" style={S.input} autoFocus />
          <FieldLabel>עבור מי</FieldLabel>
          <input value={data.forWhom} onChange={e => onChange({ ...data, forWhom: e.target.value })} placeholder="אנני, כיתה, הורים..." style={S.input} />
          <FieldLabel>טווח מחיר</FieldLabel>
          <input value={data.priceRange} onChange={e => onChange({ ...data, priceRange: e.target.value })} placeholder="50–100₪" style={S.input} />
          <FieldLabel>תג / אירוע</FieldLabel>
          <input value={data.tag} onChange={e => onChange({ ...data, tag: e.target.value })} placeholder="סוף שנה, פורים..." style={S.input} />
          <FieldLabel>שם ספק</FieldLabel>
          <input value={data.vendorName || ""} onChange={e => onChange({ ...data, vendorName: e.target.value })} placeholder="שם הספק / חנות" style={S.input} />
          <FieldLabel>טלפון ספק</FieldLabel>
          <input value={data.vendorPhone || ""} onChange={e => onChange({ ...data, vendorPhone: e.target.value })} placeholder="050-0000000" style={S.input} />
          <FieldLabel>קישור לספק</FieldLabel>
          <input value={data.vendorLink || ""} onChange={e => onChange({ ...data, vendorLink: e.target.value })} placeholder="https://..." style={S.input} />
          <FieldLabel>הערות</FieldLabel>
          <input value={data.notes} onChange={e => onChange({ ...data, notes: e.target.value })} placeholder="הערות" style={S.input} />
          <FieldLabel>תמונה</FieldLabel>
          {data.photo && <img src={data.photo} alt="" style={{ width: "100%", borderRadius: 8, marginBottom: 8, maxHeight: 150, objectFit: "cover" }} />}
          <input type="file" accept="image/*" onChange={e => handlePhotoUpload(e, data, onChange)}
            style={{ ...S.input, padding: "6px 12px", cursor: "pointer" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
            <button onClick={onSave} style={S.btn("#7c3aed")} disabled={!data.name.trim()}>שמור</button>
            <button onClick={onCancel} style={S.btn("#94a3b8")}>ביטול</button>
          </div>
        </Card>
      );
    }

    const GIFT_CAT_MAP = { 'ט"ו בשבט': "חג", 'פורים': "חג", 'פסח': "חג", 'ראש השנה': "חג", 'חנוכה': "חג", 'שבועות': "חג", 'סוף שנה': "מתנות", 'יום המורה': "מתנות", 'יום המשפחה': "פעילות" };

    function GiftsTab({ gifts, setGifts, onAddEvent }) {
      const [search,      setSearch]      = useState("");
      const [showAdd,     setShowAdd]     = useState(false);
      const [addForm,     setAddForm]     = useState(EMPTY_GIFT);
      const [editId,      setEditId]      = useState(null);
      const [editForm,    setEditForm]    = useState({});
      const [copyGiftId,  setCopyGiftId]  = useState(null);
      const [copyForm,    setCopyForm]    = useState({ ...EMPTY_EVENT });

      const filtered = search
        ? gifts.filter(g => g.name.includes(search) || g.tag.includes(search) || g.forWhom.includes(search) || (g.vendorName || "").includes(search))
        : gifts;

      const addGift    = () => { if (!addForm.name.trim()) return; setGifts([...gifts, { ...addForm, id: Date.now() }]); setAddForm(EMPTY_GIFT); setShowAdd(false); };
      const startEdit  = (g) => { setEditId(g.id); setEditForm({ ...g }); };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => { setGifts(gifts.map(g => g.id === editId ? { ...editForm, id: editId } : g)); setEditId(null); };
      const removeGift = (id) => { if (window.confirm("למחוק רעיון זה?")) setGifts(gifts.filter(g => g.id !== id)); };

      const startCopy = (gift) => {
        const cat = GIFT_CAT_MAP[gift.tag] || "פעילות";
        setCopyGiftId(gift.id);
        setCopyForm({ ...EMPTY_EVENT, name: gift.name, category: cat, notes: gift.notes || "", type: "expense" });
      };
      const saveCopy = () => {
        if (onAddEvent) onAddEvent({ ...copyForm, budget: Number(copyForm.budget) || 0, spent: Number(copyForm.spent) || 0 });
        setCopyGiftId(null);
      };

      return (
        <div>
          <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 10, textAlign: "center" }}>
            ספרייה משותפת לכל התקציבים • {gifts.length} רעיונות
          </div>
          <input placeholder="🔍 חפשי רעיון, ספק, תג..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ ...S.input, marginBottom: 12 }} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            {filtered.map(gift => (
              editId === gift.id ? null : (
                <div key={gift.id} style={{ background: "white", borderRadius: 16, padding: 14, boxShadow: "0 2px 14px rgba(0,0,0,0.08)", display: "flex", flexDirection: "column" }}>
                  {gift.photo
                    ? <img src={gift.photo} alt="" style={{ width: "100%", borderRadius: 10, marginBottom: 8, height: 90, objectFit: "cover" }} />
                    : <div style={{ fontSize: 30, marginBottom: 6 }}>{gift.icon}</div>
                  }
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#0f172a", marginBottom: 4 }}>{gift.name}</div>
                  {gift.forWhom    && <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>עבור: {gift.forWhom}</div>}
                  {gift.vendorName && <div style={{ fontSize: 11, color: "#64748b", marginBottom: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="store" s={11} c="#64748b" w={1.8} />{gift.vendorName}</div>}
                  {gift.vendorPhone && <div style={{ fontSize: 11, color: "#64748b", marginBottom: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="phone" s={11} c="#64748b" w={1.8} />{gift.vendorPhone}</div>}
                  {gift.notes      && <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>{gift.notes}</div>}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "auto", paddingTop: 6, marginBottom: 8 }}>
                    {gift.tag        && <span style={{ fontSize: 10, fontWeight: 700, background: "#f0fdf4", color: "#059669", borderRadius: 8, padding: "2px 6px" }}>{gift.tag}</span>}
                    {gift.priceRange && <span style={{ fontSize: 12, fontWeight: 700, color: "#7c3aed" }}>{gift.priceRange}</span>}
                  </div>
                  {gift.vendorLink && (
                    <a href={gift.vendorLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#7c3aed", marginBottom: 6, display: "block", wordBreak: "break-all" }}>🔗 קישור לספק</a>
                  )}
                  <div style={{ display: "flex", gap: 4 }}>
                    {onAddEvent && <button onClick={() => startCopy(gift)} style={{ ...S.smallBtn("#ede9fe", "#7c3aed"), flex: 1, textAlign: "center" }} title="הוסף לתקציב">📊</button>}
                    <button onClick={() => startEdit(gift)} style={{ ...S.smallBtn("#e2e8f0", "#64748b"), flex: 1, textAlign: "center" }}>✏️</button>
                    <button onClick={() => removeGift(gift.id)} style={{ ...S.smallBtn("#fee2e2", "#ef4444"), flex: 1, textAlign: "center" }}>✕</button>
                  </div>
                </div>
              )
            ))}
          </div>

          {/* Edit form (full width, below grid) */}
          {editId !== null && (
            <GiftForm title="✏️ עריכת רעיון" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
          )}

          {/* Copy-to-budget form */}
          {copyGiftId !== null && (
            <Card style={{ border: "2px solid #ede9fe" }}>
              <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>📊 הוסיפי לתקציב</div>
              <FieldLabel>שם הארוע</FieldLabel>
              <input value={copyForm.name} onChange={e => setCopyForm({ ...copyForm, name: e.target.value })} style={S.input} />
              <FieldLabel>קטגוריה</FieldLabel>
              <select value={copyForm.category} onChange={e => setCopyForm({ ...copyForm, category: e.target.value })} style={S.input}>
                {CAT_LIST.map(c => <option key={c}>{c}</option>)}
              </select>
              <FieldLabel>תאריך</FieldLabel>
              <input type="date" value={copyForm.date} onChange={e => setCopyForm({ ...copyForm, date: e.target.value })} style={S.input} />
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <FieldLabel>תקציב ₪</FieldLabel>
                  <input type="text" inputMode="numeric" value={copyForm.budget} onChange={e => setCopyForm({ ...copyForm, budget: e.target.value })} placeholder="0" style={S.input} />
                </div>
                <div style={{ flex: 1 }}>
                  <FieldLabel>שולם ₪</FieldLabel>
                  <input type="text" inputMode="numeric" value={copyForm.spent} onChange={e => setCopyForm({ ...copyForm, spent: e.target.value })} placeholder="0" style={S.input} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={saveCopy} style={S.btn("#7c3aed")} disabled={!copyForm.name.trim()}>הוסיפי לתקציב</button>
                <button onClick={() => setCopyGiftId(null)} style={S.btn("#94a3b8")}>ביטול</button>
              </div>
            </Card>
          )}

          {showAdd ? (
            <GiftForm title="➕ רעיון חדש" data={addForm} onChange={setAddForm} onSave={addGift} onCancel={() => setShowAdd(false)} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, border: "2px dashed #e2e8f0",
              background: "transparent", color: "#7c3aed", fontWeight: 700, fontSize: 14,
              cursor: "pointer", fontFamily: "inherit",
            }}>+ הוסיפי רעיון</button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // CASH TAB — with edit
    // ─────────────────────────────────────────
    const EMPTY_CASH = { date: "", desc: "", amount: "", type: "income", paidBy: "" };

    function CashForm({ data, onChange, onSave, onCancel, title }) {
      return (
        <Card style={{ border: "2px solid #1e293b20" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>{title}</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            {["income", "expense"].map(t => (
              <button key={t} onClick={() => onChange({ ...data, type: t })} style={{
                flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
                cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 13,
                background: data.type === t ? (t === "income" ? "#dcfce7" : "#fee2e2") : "#f1f5f9",
                color:      data.type === t ? (t === "income" ? "#059669" : "#ef4444") : "#94a3b8",
              }}><span style={{ display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n={t === "income" ? "income" : "expense"} s={13} c={data.type === t ? (t === "income" ? "#059669" : "#ef4444") : "#94a3b8"} w={2} />{t === "income" ? "הכנסה" : "הוצאה"}</span></button>
            ))}
          </div>
          <FieldLabel>תיאור *</FieldLabel>
          <input value={data.desc} onChange={e => onChange({ ...data, desc: e.target.value })} placeholder="תיאור" style={S.input} autoFocus />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <FieldLabel>סכום ₪ *</FieldLabel>
              <input type="number" value={data.amount} onChange={e => onChange({ ...data, amount: e.target.value })} placeholder="0" style={S.input} />
            </div>
            <div style={{ flex: 1 }}>
              <FieldLabel>תאריך</FieldLabel>
              <input value={data.date} onChange={e => onChange({ ...data, date: e.target.value })} placeholder="01.01.25" style={S.input} />
            </div>
          </div>
          <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
          <input value={data.paidBy || ""} onChange={e => onChange({ ...data, paidBy: e.target.value })} placeholder="שם" style={S.input} />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onSave} style={S.btn("#0f172a")} disabled={!data.desc.trim() || !data.amount}>שמור</button>
            <button onClick={onCancel} style={S.btn("#94a3b8")}>ביטול</button>
          </div>
        </Card>
      );
    }

    function CashTab({ cashLog, setCashLog, students = [], events = [] }) {
      const [showAdd,  setShowAdd]  = useState(false);
      const [addForm,  setAddForm]  = useState(EMPTY_CASH);
      const [editId,   setEditId]   = useState(null);
      const [editForm, setEditForm] = useState({});

      const budgetExpenses        = events
        .filter(ev => (ev.type || "expense") === "expense" && ev.spent > 0)
        .map(ev => ({ id: "budget-exp-" + ev.id, desc: ev.name, amount: -ev.spent, date: ev.date, paidBy: ev.paidBy || "", fromBudget: true, budgetType: "expense" }));
      const budgetIncomes         = events
        .filter(ev => ev.type === "income" && ev.spent > 0)
        .map(ev => ({ id: "budget-inc-" + ev.id, desc: ev.name, amount: ev.spent, date: ev.date, paidBy: ev.paidBy || "", fromBudget: true, budgetType: "income" }));
      const budgetExpTotal        = budgetExpenses.reduce((s, e) => s + e.amount, 0);
      const budgetIncTotal        = budgetIncomes.reduce((s, e) => s + e.amount, 0);

      const cashBalance           = cashLog.reduce((s, c) => s + c.amount, 0);
      const totalIn               = cashLog.filter(c => c.amount > 0).reduce((s, c) => s + c.amount, 0);
      const totalOut              = cashLog.filter(c => c.amount < 0).reduce((s, c) => s + Math.abs(c.amount), 0) + Math.abs(budgetExpTotal);
      const collectedFromStudents = students.reduce((s, st) => s + (st.amount || 0), 0);
      const totalInKupa           = collectedFromStudents + cashBalance + budgetExpTotal + budgetIncTotal;

      // Breakdown by קופה: all amounts (positive + negative) — named collectors + unassigned pool
      const byKupa = {};
      let kupaTotal = 0;
      // Student payments
      students.forEach(s => {
        if ((s.amount || 0) !== 0) {
          if (s.paidBy) { if (!byKupa[s.paidBy]) byKupa[s.paidBy] = 0; byKupa[s.paidBy] += s.amount; }
          else kupaTotal += s.amount;
        }
      });
      // Manual cash log (positive and negative)
      cashLog.forEach(c => {
        if (c.paidBy) { if (!byKupa[c.paidBy]) byKupa[c.paidBy] = 0; byKupa[c.paidBy] += c.amount; }
        else kupaTotal += c.amount;
      });
      // Budget expenses (always negative)
      budgetExpenses.forEach(e => {
        if (e.paidBy) { if (!byKupa[e.paidBy]) byKupa[e.paidBy] = 0; byKupa[e.paidBy] += e.amount; }
        else kupaTotal += e.amount;
      });
      // Budget incomes (always positive)
      budgetIncomes.forEach(e => {
        if (e.paidBy) { if (!byKupa[e.paidBy]) byKupa[e.paidBy] = 0; byKupa[e.paidBy] += e.amount; }
        else kupaTotal += e.amount;
      });
      const kupaEntries = Object.entries(byKupa);

      const addEntry = () => {
        if (!addForm.desc.trim() || !addForm.amount) return;
        const amt = Number(addForm.amount) * (addForm.type === "expense" ? -1 : 1);
        setCashLog([...cashLog, { id: Date.now(), ...addForm, amount: amt }]);
        setAddForm(EMPTY_CASH); setShowAdd(false);
      };

      const startEdit  = (e) => { setEditId(e.id); setEditForm({ ...e, amount: String(Math.abs(e.amount)), type: e.amount >= 0 ? "income" : "expense" }); };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        const amt = Number(editForm.amount) * (editForm.type === "expense" ? -1 : 1);
        setCashLog(cashLog.map(c => c.id === editId ? { ...editForm, id: editId, amount: amt } : c));
        setEditId(null);
      };
      const removeEntry = (id) => { if (window.confirm("למחוק תנועה זו?")) setCashLog(cashLog.filter(c => c.id !== id)); };

      // running balance
      let running = 0;
      const withBal = cashLog.map(c => { running += c.amount; return { ...c, bal: running }; });

      return (
        <div>
          {/* סה"כ בקופה */}
          <div style={{
            background: "linear-gradient(135deg,#1e293b,#0f172a)",
            borderRadius: 20, padding: 20, color: "white", marginBottom: 12,
          }}>
            <div style={{ opacity: 0.6, fontSize: 13, marginBottom: 2 }}>סה״כ בקופה</div>
            <div style={{ fontSize: 36, fontWeight: 900, letterSpacing: -1 }}>
              {totalInKupa < 0 ? "-" : ""}₪{Math.abs(totalInKupa).toLocaleString()}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 14 }}>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>גבייה</div>
                <div style={{ fontWeight: 700, color: "#4ade80", fontSize: 13 }}>₪{collectedFromStudents.toLocaleString()}</div>
              </div>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>הכנסות נוספות</div>
                <div style={{ fontWeight: 700, color: "#4ade80", fontSize: 13 }}>+₪{totalIn.toLocaleString()}</div>
              </div>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>הוצאות</div>
                <div style={{ fontWeight: 700, color: "#f87171", fontSize: 13 }}>-₪{totalOut.toLocaleString()}</div>
              </div>
            </div>
          </div>

          {/* Breakdown by קופה */}
          {(kupaEntries.length > 0 || kupaTotal !== 0) && (
            <Card style={{ background: "#f8fafc", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#1e293b", marginBottom: 8 }}>💼 לפי קופה</div>
              {kupaEntries.map(([name, total]) => (
                <div key={name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>👤 {name}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: total >= 0 ? "#059669" : "#ef4444" }}>{total >= 0 ? "+" : ""}₪{total.toLocaleString()}</span>
                </div>
              ))}
              {kupaTotal !== 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>🏦 קופת איסוף</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: kupaTotal >= 0 ? "#059669" : "#ef4444" }}>{kupaTotal >= 0 ? "+" : ""}₪{kupaTotal.toLocaleString()}</span>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0 2px" }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#64748b" }}>סה״כ</span>
                <span style={{ fontSize: 13, fontWeight: 900, color: totalInKupa >= 0 ? "#059669" : "#ef4444" }}>{totalInKupa >= 0 ? "+" : ""}₪{totalInKupa.toLocaleString()}</span>
              </div>
            </Card>
          )}

          <h3 style={{ fontWeight: 800, fontSize: 15, color: "#1e293b", marginBottom: 10 }}>יומן תנועות</h3>

          {/* Budget-derived entries — read-only */}
          {(budgetExpenses.length > 0 || budgetIncomes.length > 0) && (
            <>
              {budgetIncomes.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#059669", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ display:"inline-flex", alignItems:"center", gap: 5 }}><Icon n="income" s={13} c="#059669" w={2} /> הכנסות מתקציב</span>
                    <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetIncomes.map(entry => (
                    <div key={entry.id} style={{
                      background: "#f0fdf4", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderRight: "4px solid #22c55e",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                            {formatDate(entry.date)}{entry.paidBy && ` • ${entry.paidBy}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "#dcfce7", color: "#059669", borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: 15, color: "#059669" }}>+₪{entry.amount.toLocaleString()}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {budgetExpenses.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#7c3aed", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    📊 הוצאות מתקציב
                    <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetExpenses.map(entry => (
                    <div key={entry.id} style={{
                      background: "#faf5ff", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderRight: "4px solid #a855f7",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                            {formatDate(entry.date)}{entry.paidBy && ` • ${entry.paidBy}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "#ede9fe", color: "#7c3aed", borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: 15, color: "#ef4444" }}>-₪{Math.abs(entry.amount).toLocaleString()}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {withBal.length > 0 && (
                <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", marginBottom: 6, marginTop: 12 }}>📝 תנועות ידניות</div>
              )}
            </>
          )}

          {[...withBal].reverse().map(entry => (
            editId === entry.id ? (
              <CashForm key={entry.id} title="✏️ עריכת תנועה" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <div key={entry.id} style={{
                background: "white", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)",
                borderRight: `4px solid ${entry.amount > 0 ? "#4ade80" : "#f87171"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                      {entry.date}
                    </div>
                    {entry.paidBy && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>👤 {entry.paidBy}</div>}
                  </div>
                  <div style={{ textAlign: "left", flexShrink: 0 }}>
                    <div style={{ fontWeight: 800, fontSize: 15, color: entry.amount > 0 ? "#059669" : "#ef4444" }}>
                      {entry.amount > 0 ? "+" : ""}₪{Math.abs(entry.amount).toLocaleString()}
                    </div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>יתרה ₪{entry.bal.toLocaleString()}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button onClick={() => startEdit(entry)} style={S.smallBtn("#e2e8f0", "#64748b")}>עריכה</button>
                  <button onClick={() => removeEntry(entry.id)} style={S.smallBtn("#fee2e2", "#ef4444")}>✕ מחקי</button>
