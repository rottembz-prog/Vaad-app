    function CashTab({ cashLog, setCashLog, students = [], events = [] }) {
      const [showAdd,  setShowAdd]  = useState(false);
      const [addForm,  setAddForm]  = useState(EMPTY_CASH);
      const [editId,   setEditId]   = useState(null);
      const [editForm, setEditForm] = useState({});

      const budgetExpenses        = events
        .filter(ev => (ev.type || "expense") === "expense" && ev.spent > 0)
        .map(ev => ({ id: "budget-exp-" + ev.id, desc: ev.name, amount: -ev.spent, date: ev.date, paidBy: ev.paidBy || "", fromBudget: true, budgetType: "expense" }));
      const budgetIncomes         = events
        .filter(ev => ev.type === "income" && ev.spent > 0)
        .map(ev => ({ id: "budget-inc-" + ev.id, desc: ev.name, amount: ev.spent, date: ev.date, paidBy: ev.paidBy || "", fromBudget: true, budgetType: "income" }));
      const budgetExpTotal        = budgetExpenses.reduce((s, e) => s + e.amount, 0);
      const budgetIncTotal        = budgetIncomes.reduce((s, e) => s + e.amount, 0);

      const cashBalance           = cashLog.reduce((s, c) => s + c.amount, 0);
      const totalIn               = cashLog.filter(c => c.amount > 0).reduce((s, c) => s + c.amount, 0);
      const totalOut              = cashLog.filter(c => c.amount < 0).reduce((s, c) => s + Math.abs(c.amount), 0) + Math.abs(budgetExpTotal);
      const collectedFromStudents = students.reduce((s, st) => s + (st.amount || 0), 0);
      const totalInKupa           = collectedFromStudents + cashBalance + budgetExpTotal + budgetIncTotal;

      // Breakdown by קופה: all amounts (positive + negative) — named collectors + unassigned pool
      const byKupa = {};
      let kupaTotal = 0;
      // Helper: allocate amount to named payer(s); comma-separated names split equally, remainder to קופת איסוף
      const allocateToKupa = (paidBy, amount) => {
        if (!paidBy || !paidBy.trim()) { kupaTotal += amount; return; }
        const names = paidBy.split(',').map(n => n.trim()).filter(Boolean);
        if (names.length === 1) {
          if (!byKupa[names[0]]) byKupa[names[0]] = 0;
          byKupa[names[0]] += amount;
        } else {
          const sign = amount >= 0 ? 1 : -1;
          const perName = Math.floor(Math.abs(amount) / names.length);
          names.forEach(name => {
            if (!byKupa[name]) byKupa[name] = 0;
            byKupa[name] += perName * sign;
          });
          kupaTotal += amount - (perName * names.length * sign);
        }
      };
      // Student payments
      students.forEach(s => {
        if ((s.amount || 0) === 0) return;
        if (s.paidBySplit && s.paidBySplit.length > 0) {
          let splitSum = 0;
          s.paidBySplit.forEach(sp => {
            if (sp.name) { if (!byKupa[sp.name]) byKupa[sp.name] = 0; byKupa[sp.name] += (sp.amount || 0); }
            splitSum += (sp.amount || 0);
          });
          const remainder = s.amount - splitSum;
          if (remainder > 0.001) kupaTotal += remainder;
        } else {
          allocateToKupa(s.paidBy, s.amount);
        }
      });
      // Manual cash log (positive and negative)
      cashLog.forEach(c => {
        if (c.paidBySplit && c.paidBySplit.length > 0) {
          const sign = c.amount >= 0 ? 1 : -1;
          let splitSum = 0;
          c.paidBySplit.forEach(s => {
            if (s.name) { if (!byKupa[s.name]) byKupa[s.name] = 0; byKupa[s.name] += sign * (s.amount || 0); }
            splitSum += (s.amount || 0);
          });
          const remainder = Math.abs(c.amount) - splitSum;
          if (remainder > 0.001) kupaTotal += sign * remainder;
        } else {
          allocateToKupa(c.paidBy, c.amount);
        }
      });
      // Budget expenses (always negative)
      budgetExpenses.forEach(e => allocateToKupa(e.paidBy, e.amount));
      // Budget incomes (always positive)
      budgetIncomes.forEach(e => allocateToKupa(e.paidBy, e.amount));
      const kupaEntries = Object.entries(byKupa);

      const buildEntry = (form) => {
        const amt = Number(form.amount) * (form.type === "expense" ? -1 : 1);
        const splits = (form.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        return { id: Date.now(), ...form, amount: amt, paidBy, paidBySplit: splits };
      };

      const addEntry       = () => { if (!addForm.desc.trim() || !addForm.amount) return; setCashLog([...cashLog, buildEntry(addForm)]); setAddForm(EMPTY_CASH); setShowAdd(false); };
      const addEntryAndNew = () => { if (!addForm.desc.trim() || !addForm.amount) return; setCashLog([...cashLog, buildEntry(addForm)]); setAddForm(EMPTY_CASH); };

      const startEdit  = (e) => {
        const paidBySplit = (e.paidBySplit
          ? e.paidBySplit.map(s => ({ ...s, amount: Math.abs(s.amount) }))
          : (e.paidBy ? [{ name: e.paidBy, amount: Math.abs(e.amount) }] : [])).filter(s => s.name !== "קופת איסוף");
        setEditId(e.id); setEditForm({ ...e, amount: String(Math.abs(e.amount)), type: e.amount >= 0 ? "income" : "expense", paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        const amt = Number(editForm.amount) * (editForm.type === "expense" ? -1 : 1);
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setCashLog(cashLog.map(c => c.id === editId ? { ...editForm, id: editId, amount: amt, paidBy, paidBySplit: splits } : c));
        setEditId(null);
      };
      const removeEntry = (id) => { if (window.confirm("למחוק תנועה זו?")) setCashLog(cashLog.filter(c => c.id !== id)); };

      // running balance
      let running = 0;
      const withBal = cashLog.map(c => { running += c.amount; return { ...c, bal: running }; });

      return (
        <div>
          {/* סה"כ בקופה */}
          <div style={{
            background: "linear-gradient(135deg,#1e293b,#0f172a)",
            borderRadius: 20, padding: 20, color: "white", marginBottom: 12,
          }}>
            <div style={{ opacity: 0.6, fontSize: 13, marginBottom: 2 }}>סה״כ בקופה</div>
            <div style={{ fontSize: 36, fontWeight: 900, letterSpacing: -1 }}>
              {totalInKupa < 0 ? "-" : ""}₪{Math.abs(totalInKupa).toLocaleString('he-IL')}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 14 }}>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>גבייה</div>
                <div style={{ fontWeight: 700, color: "#4ade80", fontSize: 13 }}>₪{collectedFromStudents.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>הכנסות נוספות</div>
                <div style={{ fontWeight: 700, color: "#4ade80", fontSize: 13 }}>+₪{totalIn.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div style={{ opacity: 0.5, fontSize: 10 }}>הוצאות</div>
                <div style={{ fontWeight: 700, color: "#f87171", fontSize: 13 }}>-₪{totalOut.toLocaleString('he-IL')}</div>
              </div>
            </div>
          </div>

          {/* Breakdown by קופה */}
          {(kupaEntries.length > 0 || kupaTotal !== 0) && (
            <Card style={{ background: "#f8fafc", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#1e293b", marginBottom: 8 }}>💼 לפי קופה</div>
              {kupaEntries.map(([name, total]) => (
                <div key={name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>👤 {name}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: total >= 0 ? "#059669" : "#ef4444" }}>{total >= 0 ? "+" : ""}₪{total.toLocaleString('he-IL')}</span>
                </div>
              ))}
              {kupaTotal !== 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>🏦 קופת איסוף</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: kupaTotal >= 0 ? "#059669" : "#ef4444" }}>{kupaTotal >= 0 ? "+" : ""}₪{kupaTotal.toLocaleString('he-IL')}</span>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0 2px" }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#64748b" }}>סה״כ</span>
                <span style={{ fontSize: 13, fontWeight: 900, color: totalInKupa >= 0 ? "#059669" : "#ef4444" }}>{totalInKupa >= 0 ? "+" : ""}₪{totalInKupa.toLocaleString('he-IL')}</span>
              </div>
            </Card>
          )}

          <h3 style={{ fontWeight: 800, fontSize: 15, color: "#1e293b", marginBottom: 10 }}>יומן תנועות</h3>

          {/* Budget-derived entries — read-only */}
          {(budgetExpenses.length > 0 || budgetIncomes.length > 0) && (
            <>
              {budgetIncomes.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#059669", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ display:"inline-flex", alignItems:"center", gap: 5 }}><Icon n="income" s={13} c="#059669" w={2} /> הכנסות מתקציב</span>
                    <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetIncomes.map(entry => (
                    <div key={entry.id} style={{
                      background: "#f0fdf4", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderRight: "4px solid #22c55e",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                            {formatDate(entry.date)}{entry.paidBy && ` • ${entry.paidBy}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "#dcfce7", color: "#059669", borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: 15, color: "#059669" }}>+₪{entry.amount.toLocaleString('he-IL')}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {budgetExpenses.length > 0 && (
                <>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#0d9488", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    📊 הוצאות מתקציב
                    <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetExpenses.map(entry => (
                    <div key={entry.id} style={{
                      background: "#faf5ff", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderRight: "4px solid #a855f7",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                            {formatDate(entry.date)}{entry.paidBy && ` • ${entry.paidBy}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "#ccfbf1", color: "#0d9488", borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: 15, color: "#ef4444" }}>-₪{Math.abs(entry.amount).toLocaleString('he-IL')}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {withBal.length > 0 && (
                <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", marginBottom: 6, marginTop: 12 }}>📝 תנועות ידניות</div>
              )}
            </>
          )}

          {[...withBal].reverse().map(entry => (
            editId === entry.id ? (
              <CashForm key={entry.id} title="עריכת תנועה" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <div key={entry.id} style={{
                background: "white", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)",
                borderRight: `4px solid ${entry.amount > 0 ? "#4ade80" : "#f87171"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14, color: "#0f172a" }}>{entry.desc}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                      {entry.date}
                    </div>
                    {entry.paidBy && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>👤 {entry.paidBy}</div>}
                  </div>
                  <div style={{ textAlign: "left", flexShrink: 0 }}>
                    <div style={{ fontWeight: 800, fontSize: 15, color: entry.amount > 0 ? "#059669" : "#ef4444" }}>
                      {entry.amount > 0 ? "+" : ""}₪{Math.abs(entry.amount).toLocaleString('he-IL')}
                    </div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>יתרה ₪{entry.bal.toLocaleString('he-IL')}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button onClick={() => startEdit(entry)} style={S.smallBtn("#e2e8f0", "#64748b")}>עריכה</button>
                  <button onClick={() => removeEntry(entry.id)} style={S.smallBtn("#fee2e2", "#ef4444")}>✕ מחקי</button>
                </div>
              </div>
            )
          ))}

          {showAdd ? (
            <CashForm title="תנועה חדשה" data={addForm} onChange={setAddForm} onSave={addEntry} onSaveAndNew={addEntryAndNew} onCancel={() => { setShowAdd(false); setAddForm(EMPTY_CASH); }} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, border: "2px dashed #e2e8f0",
              background: "transparent", color: "#0f172a", fontWeight: 700, fontSize: 14,
              cursor: "pointer", fontFamily: "inherit", marginTop: 4,
            }}>+ רשמי תנועה</button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // BUDGET SCREEN — 4-tab layout for a single budget
    // ─────────────────────────────────────────
    function BudgetScreen({ budget, onUpdate, onBack, activeTab, setActiveTab, gifts, setGifts }) {
      const clr = BUDGET_COLORS[budget.colorKey] || BUDGET_COLORS.teal;

      const setStudents          = (students)  => onUpdate({ students });
      const setEvents            = (events)    => onUpdate({ events });
      const setCashLog           = (cashLog)   => onUpdate({ cashLog });
      const setFeePerStudent     = (val)       => onUpdate({ feePerStudent: val });
      const setExpectedStudents  = (val)       => onUpdate({ expectedStudents: val });
      const setPayboxLink        = (val)       => onUpdate({ payboxLink: val });
      const setClassWhatsappLink = (val)       => onUpdate({ classWhatsappLink: val });

      const paidCount             = budget.students.filter(s => s.paid).length;
      const totalBudget           = budget.events.reduce((s, e) => s + e.budget, 0);
      const totalSpent            = budget.events.reduce((s, e) => s + e.spent, 0);
      const cashLogBalance        = budget.cashLog.reduce((s, c) => s + c.amount, 0);
      const collectedFromStudents = budget.students.reduce((s, st) => s + (st.amount || 0), 0);
      const budgetExpensesTotal   = budget.events.filter(ev => (ev.type || "expense") === "expense" && ev.spent > 0).reduce((s, ev) => s + ev.spent, 0);
      const budgetIncomesTotal    = budget.events.filter(ev => ev.type === "income" && ev.spent > 0).reduce((s, ev) => s + ev.spent, 0);
      const totalInKupa           = collectedFromStudents + cashLogBalance - budgetExpensesTotal + budgetIncomesTotal;

      return (
        <div style={{ minHeight: "100vh", maxWidth: 480, margin: "0 auto", background: "#f8fafc", fontFamily: "'Heebo', sans-serif", direction: "rtl" }}>
          {/* Header */}
          <div style={{
            background: `linear-gradient(135deg, ${clr.from} 0%, ${clr.to} 100%)`,
            padding: "14px 16px 62px", position: "relative", overflow: "hidden",
          }}>
            <div style={{ position: "absolute", top: -40, left: -20, width: 150, height: 150, borderRadius: "50%", background: "rgba(255,255,255,0.07)" }} />
            <button onClick={onBack} style={{
              background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 10,
              padding: "6px 12px", color: "white", cursor: "pointer", fontFamily: "inherit",
              fontSize: 13, fontWeight: 600, marginBottom: 10, display: "flex", alignItems: "center", gap: 4,
            }}>← כל התקציבים</button>
            <div style={{ color: "white", fontWeight: 900, fontSize: 20, marginBottom: 2 }}>{budget.name}</div>
            <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 13 }}>{budget.className} • {budget.year}</div>
          </div>

          {/* Floating stat cards */}
          <div style={{ display: "flex", gap: 8, padding: "0 14px", marginTop: -44, position: "relative", zIndex: 10, paddingBottom: 4 }}>
            {[
              { icon: "chart",   l: "תקציב", v: `₪${totalBudget.toLocaleString('he-IL')}`, c: clr.from },
              { icon: "expense", l: "שולם",  v: `₪${totalSpent.toLocaleString('he-IL')}`,  c: "#ef4444" },
              { icon: "users",   l: "שילמו", v: budget.students.length > 0 ? `${paidCount}/${budget.students.length}` : "—", c: "#059669" },
              { icon: "wallet",  l: "מזומן", v: `₪${totalInKupa.toLocaleString('he-IL')}`,   c: clr.to },
            ].map(s => (
              <div key={s.l} style={{
                background: "white", borderRadius: 16, padding: "14px 6px", flex: 1, minWidth: 0,
                boxShadow: "0 4px 18px rgba(0,0,0,0.13)", textAlign: "center",
              }}>
                <div style={{ display:"flex", justifyContent:"center", marginBottom: 5 }}><Icon n={s.icon} s={22} c={s.c} w={2} /></div>
                <div style={{ fontWeight: 900, fontSize: 14, color: s.c, marginTop: 2, lineHeight: 1.2 }}>{s.v}</div>
                <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Tab content */}
          <div style={{ padding: "14px 14px 90px" }}>
            {activeTab === "budget"  && <BudgetTab  events={budget.events} setEvents={setEvents} collectionBudget={(budget.expectedStudents || 0) * (budget.feePerStudent || 0)} expectedStudents={budget.expectedStudents || 0} />}
            {activeTab === "collect" && <CollectTab students={budget.students} setStudents={setStudents} feePerStudent={budget.feePerStudent || 500} setFeePerStudent={setFeePerStudent} expectedStudents={budget.expectedStudents || 0} setExpectedStudents={setExpectedStudents} payboxLink={budget.payboxLink || ""} setPayboxLink={setPayboxLink} classWhatsappLink={budget.classWhatsappLink || ""} setClassWhatsappLink={setClassWhatsappLink} />}
            {activeTab === "gifts"   && <GiftsTab   gifts={gifts} setGifts={setGifts} onAddEvent={(ev) => setEvents([...budget.events, { id: Date.now(), ...ev }])} />}
            {activeTab === "cash"    && <CashTab     cashLog={budget.cashLog}   setCashLog={setCashLog} students={budget.students} events={budget.events} />}
          </div>

          <BottomNav tabs={BUDGET_TABS} activeTab={activeTab} setActiveTab={setActiveTab} />
        </div>
      );
    }

    // ─────────────────────────────────────────
    // AUTH SCREEN — Sign in / Sign up
    // ─────────────────────────────────────────
    function AuthScreen() {
      const [mode, setMode]           = useState("signin");
      const [email, setEmail]         = useState("");
      const [password, setPassword]   = useState("");
      const [displayName, setDisplayName] = useState("");
      const [error, setError]         = useState("");
      const [loading, setLoading]     = useState(false);

      const signInWithGoogle = async () => {
        setLoading(true); setError("");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await firebase.auth().signInWithPopup(provider);
        } catch (e) {
          console.error("Google sign-in error:", e.code, e.message);
          setError(`שגיאה בהתחברות עם Google — נסי שוב (${e.code})`);
        }
        setLoading(false);
      };

      const handleEmailAuth = async () => {
        if (!email.trim() || !password) return;
        setLoading(true); setError("");
        try {
          if (mode === "signup") {
            const cred = await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
            if (displayName.trim()) await cred.user.updateProfile({ displayName: displayName.trim() });
          } else {
            await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
          }
        } catch (e) {
          const msgs = {
            "auth/user-not-found":      "משתמש לא נמצא",
            "auth/wrong-password":      "סיסמא שגויה",
            "auth/email-already-in-use":"האימייל כבר בשימוש",
            "auth/weak-password":       "הסיסמא קצרה מדי (לפחות 6 תווים)",
            "auth/invalid-email":       "כתובת אימייל לא תקינה",
          };
          setError(msgs[e.code] || "שגיאה — נסי שוב");
        }
        setLoading(false);
      };

      const switchMode = (m) => { setMode(m); setError(""); };

      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#f8fafc", padding: 24, fontFamily: "'Heebo', sans-serif", direction: "rtl" }}>
          <div style={{ width: "100%", maxWidth: 380 }}>
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ marginBottom: 12, display: "inline-block" }}>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" style={{ borderRadius: 18, display: "block", boxShadow: "0 4px 18px rgba(13,148,136,0.35)" }}>
                  <defs>
                    <linearGradient id="kupatiG" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stopColor="#0891b2"/>
                      <stop offset="100%" stopColor="#10b981"/>
                    </linearGradient>
                  </defs>
                  <rect width="100" height="100" rx="22" fill="url(#kupatiG)"/>
                  <rect x="28" y="52" width="44" height="28" rx="4" fill="white" opacity=".92"/>
                  <rect x="28" y="47" width="44" height="8" rx="2" fill="white"/>
                  <rect x="44" y="42" width="12" height="6" rx="2" fill="#0d9488"/>
                  <circle cx="37" cy="30" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5"/>
                  <circle cx="52" cy="22" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5"/>
                  <circle cx="67" cy="30" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5"/>
                  <text x="37" y="34" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold">₪</text>
                  <text x="52" y="26" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold">₪</text>
                  <text x="67" y="34" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold">₪</text>
                  <text x="50" y="72" textAnchor="middle" fill="#0d9488" fontSize="8" fontWeight="900" letterSpacing="1">KUPATI</text>
                </svg>
              </div>
              <div style={{ fontWeight: 900, fontSize: 24, color: "#1e293b" }}>Kupati</div>
              <div style={{ color: "#64748b", fontSize: 14, marginTop: 4 }}>מנהל תקציבים שיתופי</div>
            </div>

            <div style={{ background: "white", borderRadius: 20, padding: 24, boxShadow: "0 4px 24px rgba(0,0,0,0.1)" }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                <button onClick={() => switchMode("signin")} style={{ ...S.btn(mode === "signin" ? "#0d9488" : "#f1f5f9", mode === "signin" ? "white" : "#64748b") }}>התחברות</button>
                <button onClick={() => switchMode("signup")} style={{ ...S.btn(mode === "signup" ? "#0d9488" : "#f1f5f9", mode === "signup" ? "white" : "#64748b") }}>הרשמה</button>
              </div>

              {mode === "signup" && (
                <>
                  <FieldLabel>שם מלא</FieldLabel>
                  <input value={displayName} onChange={e => setDisplayName(e.target.value)} placeholder="שם מלא" style={S.input} />
                </>
              )}

              <FieldLabel>אימייל</FieldLabel>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" style={{ ...S.input, direction: "ltr", textAlign: "right" }} />

              <FieldLabel>סיסמא</FieldLabel>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="לפחות 6 תווים" style={S.input} onKeyDown={e => e.key === "Enter" && handleEmailAuth()} />

              {error && <div style={{ color: "#ef4444", fontSize: 12, marginBottom: 10, textAlign: "center" }}>{error}</div>}

              <button onClick={handleEmailAuth} disabled={loading || !email.trim() || !password} style={{ ...S.btn("#0d9488"), width: "100%", marginBottom: 14, opacity: (!email.trim() || !password) ? 0.5 : 1 }}>
                {loading ? "טוען..." : mode === "signup" ? "הירשמי" : "כניסה"}
              </button>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <div style={{ flex: 1, height: 1, background: "#e2e8f0" }} />
                <span style={{ color: "#94a3b8", fontSize: 12 }}>או</span>
                <div style={{ flex: 1, height: 1, background: "#e2e8f0" }} />
              </div>

              <button onClick={signInWithGoogle} disabled={loading} style={{ ...S.btn("#f8fafc", "#0f172a"), width: "100%", border: "1.5px solid #e2e8f0", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <span style={{ fontWeight: 900, fontSize: 15, color: "#4285f4" }}>G</span>
                כניסה עם Google
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // CLASS SCREEN — Select / Create / Join group
    // ─────────────────────────────────────────
    const GROUPS_HELP_CONTENT = `כאן תוכל לנהל את הקבוצות שלך.

כל קבוצה מייצגת ועד, כיתה, או כל קבוצה אחרת שאתה מנהל עבורה תקציב.

כדי להוסיף חברים לקבוצה:
• לחץ על הקבוצה
• שלח את קוד ההצטרפות לחברים
• הם יוכלו להצטרף עם הקוד

ניתן ליצור קבוצות חדשות או להצטרף לקיימות עם קוד.`;

    function ClassScreen({ user, onSelectClass }) {
      const [mode, setMode]             = useState("list"); // list | create | join
      const [classes, setClasses]       = useState([]);
      const [loading, setLoading]       = useState(true);
      const [createName, setCreateName] = useState("");
      const [joinCode, setJoinCode]     = useState("");
      const [error, setError]           = useState("");
      const [saving, setSaving]         = useState(false);
      const [showHelp, setShowHelp]     = useState(false);
      const [editingClassId, setEditingClassId] = useState(null);
      const [editingName, setEditingName]       = useState("");
      const [confirmDeleteCls, setConfirmDeleteCls] = useState(null);
      const [toast, setToast]           = useState("");

      useEffect(() => {
        const unsub = firebase.firestore()
          .collection("classes")
          .where("members", "array-contains", user.uid)
          .onSnapshot(snap => {
            setClasses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            setLoading(false);
          }, () => setLoading(false));
        return unsub;
      }, [user.uid]);

      const createClass = async () => {
        if (!createName.trim()) return;
        setSaving(true); setError("");
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        try {
          const ref = await firebase.firestore().collection("classes").add({
            name: createName.trim(),
            inviteCode: code,
            createdBy: user.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            members: [user.uid],
            memberDetails: [{ uid: user.uid, displayName: user.displayName || user.email, role: "admin" }],
          });
          onSelectClass({ id: ref.id, name: createName.trim(), inviteCode: code, members: [user.uid] });
        } catch (e) {
          setError("שגיאה ביצירת הקבוצה — נסה שוב");
        }
        setSaving(false);
      };

      const joinClass = async () => {
        if (!joinCode.trim()) return;
        setSaving(true); setError("");
        try {
          const snap = await firebase.firestore()
            .collection("classes")
            .where("inviteCode", "==", joinCode.trim().toUpperCase())
            .get();
          if (snap.empty) { setError("קוד לא נמצא — בדוק שוב"); setSaving(false); return; }
          const doc = snap.docs[0];
          const classData = { id: doc.id, ...doc.data() };
          if (!classData.members.includes(user.uid)) {
            await doc.ref.update({
              members: firebase.firestore.FieldValue.arrayUnion(user.uid),
              memberDetails: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, displayName: user.displayName || user.email, role: "member" }),
            });
          }
          onSelectClass(classData);
        } catch (e) {
          setError("שגיאה בהצטרפות — נסה שוב");
        }
        setSaving(false);
      };

      const cancelSubMode = () => { setMode("list"); setError(""); setCreateName(""); setJoinCode(""); };

      const copyCode = (code, e) => {
        e.stopPropagation();
        copyToClipboard(code, () => { setToast("הקוד הועתק!"); setTimeout(() => setToast(""), 2000); });
      };

      const startEdit = (cls, e) => {
        e.stopPropagation();
        setEditingClassId(cls.id);
        setEditingName(cls.name);
      };

      const saveEdit = async (clsId, e) => {
        e.stopPropagation();
        if (!editingName.trim()) return;
        try {
          await firebase.firestore().collection("classes").doc(clsId).update({ name: editingName.trim() });
        } catch (_) {}
        setEditingClassId(null);
      };

      const cancelEdit = (e) => { e.stopPropagation(); setEditingClassId(null); };

      const doDeleteClass = async () => {
        if (!confirmDeleteCls) return;
        try {
          await firebase.firestore().collection("classes").doc(confirmDeleteCls.id).delete();
        } catch (_) {}
        setConfirmDeleteCls(null);
      };

      return (
        <div style={{ minHeight: "100vh", background: "#f8fafc", fontFamily: "'Heebo', sans-serif", direction: "rtl" }}>
          <Toast message={toast} />
          <HelpModal isOpen={showHelp} onClose={() => setShowHelp(false)} title="הקבוצות שלי" content={GROUPS_HELP_CONTENT} closeLabel="הבנתי" />
          <ConfirmDeleteModal isOpen={!!confirmDeleteCls} itemName={confirmDeleteCls?.name || ""} onConfirm={doDeleteClass} onCancel={() => setConfirmDeleteCls(null)} />
          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)", padding: "24px 20px 28px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 12, fontWeight: 600, marginBottom: 4 }}>שלום, {user.displayName || user.email?.split("@")[0]}</div>
                <div style={{ color: "white", fontWeight: 900, fontSize: 22 }}>הקבוצות שלי</div>
                <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, marginTop: 3 }}>בחר קבוצה לניהול תקציב</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setShowHelp(true)} style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 10, padding: "8px 14px", color: "white", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 600 }}>
                  הסברים
                </button>
                <button onClick={() => firebase.auth().signOut()} style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 10, padding: "8px 14px", color: "white", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 600 }}>
                  יציאה
                </button>
              </div>
            </div>
          </div>

          {/* Content with decorative circles */}
          <div style={{ position: "relative", padding: "20px 14px 30px", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -60, right: -80, width: 420, height: 420, borderRadius: "50%", background: "#86efac", opacity: 0.22, filter: "blur(100px)", zIndex: 0, pointerEvents: "none" }} />
            <div style={{ position: "absolute", bottom: -80, left: -60, width: 360, height: 360, borderRadius: "50%", background: "#bbf7d0", opacity: 0.25, filter: "blur(90px)", zIndex: 0, pointerEvents: "none" }} />
            <div style={{ position: "absolute", top: "45%", left: "25%", width: 300, height: 300, borderRadius: "50%", background: "#86efac", opacity: 0.18, filter: "blur(120px)", zIndex: 0, pointerEvents: "none" }} />

            <div style={{ position: "relative", zIndex: 1 }}>
              {loading ? (
                <div style={{ textAlign: "center", padding: 40, color: "#94a3b8" }}>טוען...</div>
              ) : (
                <>
                  {classes.map(cls => (
                    editingClassId === cls.id ? (
                      <div key={cls.id} style={{ background: "white", borderRadius: 16, padding: "16px 20px", marginBottom: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.08)", borderRight: "4px solid #f59e0b" }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: "#64748b", marginBottom: 8 }}>עריכת שם קבוצה</div>
                        <input
                          value={editingName}
                          onChange={e => setEditingName(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter") saveEdit(cls.id, e); if (e.key === "Escape") cancelEdit(e); }}
                          style={{ ...S.input, marginBottom: 10 }}
                          autoFocus
                        />
                        <div style={{ display: "flex", gap: 8 }}>
                          <button onClick={e => saveEdit(cls.id, e)} style={S.btn("#0d9488")}>שמור</button>
                          <button onClick={cancelEdit} style={S.btn("#94a3b8")}>ביטול</button>
                        </div>
                      </div>
                    ) : (
                      <div key={cls.id} style={{ background: "white", borderRadius: 16, padding: "16px 20px", marginBottom: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.08)", borderRight: "4px solid #0d9488" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div onClick={() => onSelectClass(cls)} style={{ flex: 1, cursor: "pointer" }}>
                            <div style={{ fontWeight: 800, fontSize: 16, color: "#1e293b" }}>{cls.name}</div>
                            <div style={{ fontSize: 12, color: "#64748b", marginTop: 3, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                              <span>{cls.members?.length || 1} חברים · קוד:</span>
                              <span style={{ fontWeight: 700, color: "#0d9488", letterSpacing: 2 }}>{cls.inviteCode}</span>
                              <button onClick={e => copyCode(cls.inviteCode, e)} title="העתק קוד" style={{ background: "none", border: "none", cursor: "pointer", padding: "1px 3px", fontSize: 13, color: "#0d9488", lineHeight: 1 }}>📋</button>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 2, flexShrink: 0 }}>
                            <button onClick={e => startEdit(cls, e)} title="שנה שם" style={{ background: "none", border: "none", cursor: "pointer", padding: "6px 8px", fontSize: 15, borderRadius: 8 }}>✏️</button>
                            <button onClick={e => { e.stopPropagation(); setConfirmDeleteCls(cls); }} title="מחק" style={{ background: "none", border: "none", cursor: "pointer", padding: "6px 8px", fontSize: 15, borderRadius: 8 }}>🗑️</button>
                            <div onClick={() => onSelectClass(cls)} style={{ cursor: "pointer", paddingRight: 4 }}>
                              <Icon n="arrow" s={18} c="#0d9488" w={2} />
                            </div>
                          </div>
                        </div>
                      </div>
                    )
                  ))}

                  {classes.length === 0 && mode === "list" && (
                    <div style={{ textAlign: "center", color: "#94a3b8", padding: "30px 0 20px" }}>
                      <div style={{ fontSize: 40, marginBottom: 10 }}>👨‍👩‍👧‍👦</div>
                      <div style={{ fontWeight: 600, fontSize: 15 }}>אין קבוצות עדיין</div>
                      <div style={{ fontSize: 13, marginTop: 4 }}>צור קבוצה חדשה או הצטרף עם קוד</div>
                    </div>
                  )}

                  {mode === "create" && (
                    <Card style={{ border: "2px solid #ccfbf1" }}>
                      <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>➕ קבוצה חדשה</div>
                      <FieldLabel>שם הקבוצה</FieldLabel>
                      <input value={createName} onChange={e => setCreateName(e.target.value)} placeholder="למשל: ועד הורים כיתה ו׳" style={S.input} autoFocus onKeyDown={e => e.key === "Enter" && createClass()} />
                      {error && <div style={{ color: "#ef4444", fontSize: 12, marginBottom: 8 }}>{error}</div>}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={createClass} disabled={saving || !createName.trim()} style={S.btn("#0d9488")}>{saving ? "יוצר..." : "צור קבוצה"}</button>
                        <button onClick={cancelSubMode} style={S.btn("#94a3b8")}>ביטול</button>
                      </div>
                    </Card>
                  )}

                  {mode === "join" && (
                    <Card style={{ border: "2px solid #dcfce7" }}>
                      <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12 }}>🔗 הצטרפות לקבוצה</div>
                      <FieldLabel>קוד הצטרפות (6 תווים)</FieldLabel>
                      <input value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="ABC123" style={{ ...S.input, letterSpacing: 3, textAlign: "center", textTransform: "uppercase" }} autoFocus onKeyDown={e => e.key === "Enter" && joinClass()} />
                      {error && <div style={{ color: "#ef4444", fontSize: 12, marginBottom: 8 }}>{error}</div>}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={joinClass} disabled={saving || !joinCode.trim()} style={S.btn("#059669")}>{saving ? "מצטרף..." : "הצטרף"}</button>
                        <button onClick={cancelSubMode} style={S.btn("#94a3b8")}>ביטול</button>
                      </div>
                    </Card>
                  )}

                  {mode === "list" && (
                    <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                      <button onClick={() => setMode("create")} style={{ ...S.btn("#0d9488"), flex: 1 }}>+ קבוצה חדשה</button>
                      <button onClick={() => setMode("join")} style={{ ...S.btn("#059669"), flex: 1 }}>🔗 הצטרף עם קוד</button>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // APP — Root state & routing
    // ─────────────────────────────────────────
    function App() {
      const [user, setUser]                     = useState(undefined); // undefined = checking auth
      const [currentClass, setCurrentClass]     = useState(null);
      const [budgets, setBudgets]               = useState([]);
      const [gifts, setGifts]                   = useState([]);
      const [activeBudgetId, setActiveBudgetId] = useState(null);
      const [activeTab, setActiveTab]           = useState("budget");

      // Auth state listener
      useEffect(() => {
        return firebase.auth().onAuthStateChanged(u => setUser(u || null));
      }, []);

      // Firestore real-time listeners for class data
      useEffect(() => {
        if (!currentClass) { setBudgets([]); setGifts([]); return; }
        const classRef = firebase.firestore().collection("classes").doc(currentClass.id);
        const unsubBudgets = classRef.collection("budgets")
          .onSnapshot(snap => setBudgets(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubGifts = classRef.collection("gifts")
          .onSnapshot(snap => setGifts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        return () => { unsubBudgets(); unsubGifts(); };
      }, [currentClass?.id]);

      const classRef = () => firebase.firestore().collection("classes").doc(currentClass.id);

      const handleAddBudget = async (data) => {
        await classRef().collection("budgets").add(data);
      };

      const handleDeleteBudget = async (id) => {
        await classRef().collection("budgets").doc(String(id)).delete();
      };

      const handleUpdateBudget = useCallback(async (id, updates) => {
        await firebase.firestore().collection("classes").doc(currentClass?.id)
          .collection("budgets").doc(String(id)).update(updates);
      }, [currentClass?.id]);

      // Gifts: batch-rewrite all gifts on every change (simple & correct for small collections)
      const handleSetGifts = useCallback(async (updater) => {
        const newGifts = typeof updater === "function" ? updater(gifts) : updater;
        const db = firebase.firestore();
        const giftsRef = classRef().collection("gifts");
        const batch = db.batch();
        const existing = await giftsRef.get();
        existing.docs.forEach(d => batch.delete(d.ref));
        newGifts.forEach(g => batch.set(giftsRef.doc(String(g.id)), { ...g }));
        await batch.commit();
      }, [currentClass?.id, gifts]);

      // Loading
      if (user === undefined) {
        return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "'Heebo', sans-serif", color: "#94a3b8", fontSize: 14 }}>טוען...</div>;
      }

      if (!user) return <AuthScreen />;

      if (!currentClass) return <ClassScreen user={user} onSelectClass={setCurrentClass} />;

      const activeBudget = budgets.find(b => b.id === activeBudgetId) || null;

      if (!activeBudget) {
        return (
          <HomeScreen
            budgets={budgets}
            currentClass={currentClass}
            user={user}
            onSignOut={() => firebase.auth().signOut()}
            onBack={() => { setCurrentClass(null); setActiveBudgetId(null); }}
            onAddBudget={handleAddBudget}
            onDeleteBudget={handleDeleteBudget}
            onUpdateBudgetMeta={(id, data) => classRef().collection("budgets").doc(String(id)).update(data)}
            onSelect={(id) => { setActiveBudgetId(id); setActiveTab("budget"); }}
          />
        );
      }

      return (
        <BudgetScreen
          budget={activeBudget}
          onUpdate={(updates) => handleUpdateBudget(activeBudgetId, updates)}
          onBack={() => setActiveBudgetId(null)}
          activeTab={activeTab}
          setActiveTab={setActiveTab}
          gifts={gifts}
          setGifts={handleSetGifts}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
