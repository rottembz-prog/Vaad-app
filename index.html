    /* ── Design System: CSS Custom Properties ── */
    :root {
      /* Colors */
      --color-primary:        #2DA58E;
      --color-primary-dark:   #1E8A75;
      --color-primary-light:  #E6F7F4;
      --color-secondary:      #4CAF82;
      --color-surface:        #FFFFFF;
      --color-background:     #F0FAF7;
      --color-text-primary:   #1A2E2A;
      --color-text-secondary: #5A7A73;
      --color-border:         #C8E6DE;
      --color-danger:         #E05C5C;
      --color-warning:        #F5A623;
      --color-disabled:       #B0C4BE;

      /* Typography scale */
      --text-xs:   0.875rem;   /* 14px — labels, hints      */
      --text-sm:   1rem;       /* 16px — secondary text     */
      --text-base: 1.125rem;   /* 18px — body / default     */
      --text-lg:   1.25rem;    /* 20px — card titles        */
      --text-xl:   1.5rem;     /* 24px — section headings   */
      --text-2xl:  1.875rem;   /* 30px — page titles        */
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Rubik', sans-serif;
      direction: rtl;
      background: var(--color-background);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      font-size: var(--text-sm);
    }
    #root { min-height: 100vh; }
    input, select, button, textarea { font-family: 'Rubik', sans-serif; }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 0;
    }
    button:active { opacity: 0.85; }
    ::-webkit-scrollbar { display: none; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .kupati-bg {
      background-color: var(--color-background);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(45,165,142,0.10) 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, rgba(76,175,130,0.08) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(245,166,35,0.05) 0%, transparent 55%),
        radial-gradient(circle at 80% 15%, rgba(30,138,117,0.07) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(45,165,142,0.06) 0%, transparent 40%);

    .ev-meta       { font-size: var(--text-xs); }

    /* ── Desktop (≥ 768px) ── */
    @media (min-width: 768px) {

      .bs-tab-pad   { padding: 24px 48px 100px !important; }
      .event-grid   { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 14px !important; }

  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Rubik,sans-serif;color:var(--color-text-secondary,#5A7A73);font-size:1rem">טוען...</div></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getDefaultYear() {
      const now = new Date();
      const m = now.getMonth() + 1;
      const y = now.getFullYear();
      const start = m >= 9 ? y : y - 1;
      const hebYears = { 2024: 'תשפ"ה', 2025: 'תשפ"ו', 2026: 'תשפ"ז', 2027: 'תשפ"ח', 2028: 'תשפ"ט' };
      return `${hebYears[start] || ''} ${start}–${start + 1}`.trim();
    }

    function formatDate(iso) {
      if (!iso) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) {
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
      }
      return iso;
    }

    function parseSortDate(d) {
      if (!d) return Infinity;
      if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return new Date(d).getTime();
      const m = d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
      if (m) { let y = parseInt(m[3]); if (y < 100) y += 2000; return new Date(y, parseInt(m[2]) - 1, parseInt(m[1])).getTime(); }
      return Infinity;
    }

    function fmt(n) {
      return '₪' + (Number(n) || 0).toLocaleString('he-IL');
    }

    // ─────────────────────────────────────────
    // SHARED — clipboard utility
    // ─────────────────────────────────────────
    function copyToClipboard(text, onSuccess) {
      const fallback = () => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        onSuccess && onSuccess();
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => onSuccess && onSuccess()).catch(fallback);
      } else { fallback(); }
    }

    function Toast({ message, type = "success" }) {
      if (!message) return null;
      const isError = type === "error";
      return (
        <div style={{
          position: "fixed",
          bottom: "calc(80px + env(safe-area-inset-bottom, 0px))",
          left: "50%",
          transform: "translateX(-50%)",
          background: isError ? "var(--color-danger)" : "var(--color-secondary)",
          color: "white",
          borderRadius: 14,
          padding: "11px 20px",
          fontSize: "var(--text-xs)",
          fontWeight: 600,
          zIndex: 1000,
          boxShadow: "0 4px 24px rgba(0,0,0,0.22)",
          whiteSpace: "nowrap",
          display: "flex",
          alignItems: "center",
          gap: 8,
          maxWidth: "90vw",
        }}>
          <Icon n={isError ? "alertTri" : "checkCircle"} s={16} c="white" w={2.2} />
          {message}
        </div>
      );
    }

    function generateReport(budget) {
      const events   = budget.events   || [];
      const students = budget.students || [];
      const expenses = events.filter(e => (e.type || 'expense') === 'expense');
      const incomes  = events.filter(e => e.type === 'income');
      const totalBudgetExp  = expenses.reduce((s, e) => s + e.budget, 0);
      const totalSpent      = expenses.reduce((s, e) => s + e.spent,  0);
      const totalBudgetInc  = incomes.reduce((s, e) => s + e.budget, 0);
      const collectionBudget = (budget.expectedStudents || 0) * (budget.feePerStudent || 0);
      const totalCollected   = students.reduce((s, st) => s + (st.amount || 0), 0);
      const paidCount        = students.filter(s => s.paid).length;

      const catMap = {};
      expenses.forEach(e => { catMap[e.category] = (catMap[e.category] || 0) + e.spent; });
      const maxCatVal = Math.max(...Object.values(catMap), 1);

      const catRows = Object.entries(catMap).map(([cat, val]) => `
        <tr><td>${escapeHtml(cat)}</td><td>₪${val.toLocaleString('he-IL')}</td>
        <td><div style="background:#e2e8f0;border-radius:4px;height:10px;width:160px">
        <div style="background:#0d9488;height:10px;border-radius:4px;width:${Math.round((val/maxCatVal)*100)}%"></div>
        </div></td></tr>`).join('');

      const eventRows = events.map(e => `
        <tr><td>${escapeHtml(e.name)}</td><td>${formatDate(e.date)}</td><td>${escapeHtml(e.category)}</td>
        <td>${(e.type||'expense')==='income' ? 'הכנסה' : 'הוצאה'}</td>
        <td>₪${e.budget.toLocaleString('he-IL')}</td><td>₪${e.spent.toLocaleString('he-IL')}</td>
        <td>${e.done ? '✅' : '⬜'}</td></tr>`).join('');

      const membersHtml = (budget.members||[]).length > 0
        ? `<p><strong>חברי הועד:</strong> ${(budget.members||[]).map(escapeHtml).join(', ')}</p>` : '';
      const groupsHtml = (budget.whatsappGroups||[]).length > 0
        ? `<p><strong>קבוצות וואצאפ:</strong> ${(budget.whatsappGroups||[]).map(g => escapeHtml(g.name)).join(', ')}</p>` : '';
      const collPct = students.length > 0 ? Math.round((paidCount / students.length) * 100) : 0;
      const spentPct = totalBudgetExp > 0 ? Math.round((totalSpent / totalBudgetExp) * 100) : 0;

      const html = `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">

        partial:  <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
        calendar:    <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        info:        <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
        help:        <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        alertTri:    <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        settings:    <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
      };
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round" style={{ width: s, height: s, display: "inline-block", verticalAlign: "middle", flexShrink: 0 }}>
          {p[n] || null}
        </svg>
      );
    }

    // ─────────────────────────────────────────
    // BUTTON — unified variant/size system
    // ─────────────────────────────────────────
    const BTN_VARIANTS = {
      primary:   { background: "var(--color-primary)",   color: "white",  border: "none" },
      secondary: { background: "var(--color-surface)",   color: "var(--color-primary)", border: "1.5px solid var(--color-primary)" },
      danger:    { background: "var(--color-danger)",    color: "white",  border: "none" },
      ghost:     { background: "transparent",            color: "var(--color-primary)", border: "none" },
    };
    const BTN_SIZES = {
      sm: { padding: "8px 16px",  fontSize: "var(--text-xs)", iconSize: 16 },
      md: { padding: "12px 24px", fontSize: "var(--text-sm)", iconSize: 20 },
      lg: { padding: "16px 32px", fontSize: "var(--text-lg)", iconSize: 24 },
    };

    function Button({ variant = "primary", size = "md", children, onClick, disabled, style: extraStyle = {}, icon, loading = false }) {
      const v = BTN_VARIANTS[variant] || BTN_VARIANTS.primary;
      const z = BTN_SIZES[size]      || BTN_SIZES.md;
      return (
        <button
          onClick={onClick}
          disabled={disabled || loading}
          style={{
            ...v,
            padding: z.padding,
            fontSize: z.fontSize,
            borderRadius: 12,
            fontWeight: 600,
            fontFamily: "inherit",
            cursor: (disabled || loading) ? "not-allowed" : "pointer",
            opacity: (disabled || loading) ? 0.5 : 1,
            transition: "all 150ms",
            display: "inline-flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 6,
            ...extraStyle,
          }}
        >
          {loading
            ? <span style={{ width: z.iconSize, height: z.iconSize, border: "2px solid currentColor", borderTopColor: "transparent", borderRadius: "50%", display: "inline-block", animation: "spin 0.7s linear infinite" }} />
            : icon && <Icon n={icon} s={z.iconSize} c="currentColor" w={2} />
          }
          {children}
        </button>
      );
    }

    // ─────────────────────────────────────────
    // TOOLTIP — hover/tap popup
    // ─────────────────────────────────────────
    function Tooltip({ text, children }) {
      const [show, setShow] = useState(false);
      return (
        <span style={{ position: "relative", display: "inline-flex", alignItems: "center" }}>
          <span
            onMouseEnter={() => setShow(true)}
            onMouseLeave={() => setShow(false)}
            onClick={e => { e.stopPropagation(); setShow(v => !v); }}
            style={{ cursor: "pointer", display: "inline-flex", alignItems: "center" }}
          >
            {children || <Icon n="help" s={15} c="var(--color-text-secondary)" w={1.8} />}
          </span>
          {show && (
            <div style={{
              position: "absolute",
              bottom: "calc(100% + 6px)",
              right: 0,
              background: "var(--color-text-primary)",
              color: "white",
              fontSize: "var(--text-xs)",
              borderRadius: 8,
              padding: "7px 11px",
              maxWidth: 220,
              minWidth: 140,
              whiteSpace: "normal",
              lineHeight: 1.55,
              boxShadow: "0 4px 18px rgba(0,0,0,0.22)",
              zIndex: 9999,
              pointerEvents: "none",
            }}>{text}</div>
          )}
        </span>
      );
    }

    // ─────────────────────────────────────────
    // HELPBANNER — dismissible page-level hint
    // ─────────────────────────────────────────
    function HelpBanner({ text, pageKey }) {
      const storageKey = `helpBanner_${pageKey}`;
      const [dismissed, setDismissed] = useState(() => {
        try { return localStorage.getItem(storageKey) === "1"; } catch { return false; }
      });
      if (dismissed) return null;
      return (
        <div style={{
          background: "var(--color-primary-light)",
          borderRight: "4px solid var(--color-primary)",
          borderRadius: 12,
          padding: "12px 14px",
          marginBottom: 14,
          display: "flex",
          alignItems: "flex-start",
          gap: 10,
        }}>
          <Icon n="info" s={18} c="var(--color-primary)" w={2} />
          <div style={{ flex: 1, fontSize: "var(--text-xs)", color: "var(--color-text-primary)", lineHeight: 1.65 }}>{text}</div>
          <button
            onClick={() => { setDismissed(true); try { localStorage.setItem(storageKey, "1"); } catch {} }}
            style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: "var(--color-text-secondary)", flexShrink: 0, lineHeight: 1 }}
            title="סגור"
          >
            <Icon n="x" s={15} c="var(--color-text-secondary)" w={2} />
          </button>
        </div>
      );
    }

    // Button spin keyframe (injected once)
    (() => {
      if (document.getElementById("kupati-spin-style")) return;
      const s = document.createElement("style");
      s.id = "kupati-spin-style";
      s.textContent = "@keyframes spin { to { transform: rotate(360deg); } }";
      document.head.appendChild(s);
    })();

    // ─────────────────────────────────────────
    // HOME SCREEN — Budget Manager
    // ─────────────────────────────────────────
    const EMPTY_BUDGET_FORM = { name: "", className: "", year: getDefaultYear(), colorKey: "teal", feePerStudent: "500", members: [], whatsappGroups: [] };

    // ─────────────────────────────────────────
    // SHARED — Icon button (edit / delete / any)
    // Used consistently across ALL pages/tabs
    // ─────────────────────────────────────────
    function IconBtn({ icon, color, onClick, title, size = 16, stopProp = false }) {
      return (
        <button
          onClick={e => { if (stopProp) e.stopPropagation(); onClick && onClick(e); }}
          title={title}
          style={{
            background: "none", border: "none", cursor: "pointer",
            padding: 6, borderRadius: 8, lineHeight: 1,
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            transition: "opacity 150ms",
          }}
        >
          <Icon n={icon} s={size} c={color} w={1.8} />
        </button>
      );
    }

    // ─────────────────────────────────────────
    // SHARED — Action Buttons (card header — white icons on gradient)
    // ─────────────────────────────────────────
    function ActionButtons({ onEdit, onDelete, onCopy, onReport, showEdit = true, showDelete = true, showCopy = false, showReport = false }) {
      const btn = { background: "rgba(255,255,255,0.22)", border: "none", borderRadius: 8, padding: "6px 8px", color: "white", cursor: "pointer", lineHeight: 1, display: "flex", alignItems: "center", transition: "opacity 150ms" };
      return (
        <div style={{ display: "flex", gap: 6 }}>
          {showReport && <button onClick={e => { e.stopPropagation(); onReport && onReport(); }} style={btn} title="דו״ח PDF"><Icon n="report" s={15} c="white" w={1.8} /></button>}
          {showCopy   && <button onClick={e => { e.stopPropagation(); onCopy   && onCopy();   }} style={btn} title="שכפל"><Icon n="copy"   s={15} c="white" w={1.8} /></button>}
          {showEdit   && <button onClick={e => { e.stopPropagation(); onEdit   && onEdit();   }} style={btn} title="ערוך"><Icon n="pencil" s={15} c="white" w={1.8} /></button>}
          {showDelete && <button onClick={e => { e.stopPropagation(); onDelete && onDelete(); }} style={btn} title="מחק"><Icon n="trash"  s={15} c="white" w={1.8} /></button>}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // SHARED — Confirm Delete Modal
    // ─────────────────────────────────────────
    function ConfirmDeleteModal({ isOpen, itemName, onConfirm, onCancel }) {
      if (!isOpen) return null;
      return (
        <div
          style={{ position: "fixed", inset: 0, background: "rgba(26,46,42,0.55)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 20px", backdropFilter: "blur(2px)" }}
          onClick={onCancel}
        >
          <div
            style={{ background: "var(--color-surface)", borderRadius: 20, padding: "28px 24px", width: "100%", maxWidth: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}
            onClick={e => e.stopPropagation()}
          >
            {/* Icon */}
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
              <div style={{ width: 52, height: 52, borderRadius: "50%", background: "#FEE2E2", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon n="trash" s={24} c="var(--color-danger)" w={2} />
              </div>
            </div>
            {/* Title */}
            <div style={{ fontWeight: 700, fontSize: "var(--text-lg)", color: "var(--color-text-primary)", marginBottom: 8, textAlign: "center" }}>
              אישור מחיקה
            </div>
            {/* Body */}
            <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", lineHeight: 1.7, marginBottom: 24, textAlign: "center" }}>
              האם למחוק את <strong style={{ color: "var(--color-text-primary)" }}>&apos;{itemName}&apos;</strong>?<br />פעולה זו אינה ניתנת לביטול.
            </div>
            {/* Buttons */}
            <div style={{ display: "flex", gap: 10 }}>
              <Button variant="danger"    onClick={onConfirm} style={{ flex: 1 }} icon="trash">מחק</Button>
              <Button variant="secondary" onClick={onCancel}  style={{ flex: 1 }}>ביטול</Button>
            </div>
          </div>
        </div>
      );
    }

    function BudgetListCard({ budget, onSelect, onEdit, onDelete, onCopy, onReport }) {
      const clr = BUDGET_COLORS[budget.colorKey] || BUDGET_COLORS.teal;
      const paidCount  = budget.students.filter(s => s.paid).length;
      const total      = budget.students.length;
      const budgetSum  = budget.events.reduce((s, e) => s + e.budget, 0);
      const collected  = budget.students.reduce((s, st) => s + (st.amount || 0), 0);

      return (
        <div style={{ background: "white", borderRadius: 20, overflow: "hidden", marginBottom: 14, boxShadow: "0 4px 20px rgba(0,0,0,0.09)" }}>
          {/* Colored header */}
          <div style={{ background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`, padding: "14px 16px 12px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: "white", fontWeight: 900, fontSize: 18, marginBottom: 2 }}>{budget.name}</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 13 }}>{budget.className} • {budget.year}</div>
              </div>
              <ActionButtons onReport={onReport} onCopy={onCopy} onEdit={onEdit} onDelete={onDelete} showReport showCopy showEdit showDelete />
            </div>
          </div>
          {/* Stats */}
          <div style={{ padding: "12px 16px 14px" }}>
            {total > 0 && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748b", marginBottom: 5 }}>
                  <span>גבייה</span>
                  <span style={{ fontWeight: 700, color: "#0f172a" }}>{paidCount}/{total} שילמו</span>
                </div>
                <ProgressBar pct={total > 0 ? (paidCount / total) * 100 : 0} color={clr.from} style={{ marginBottom: 10 }} />
              </>
            )}
            <div style={{ display: "flex", gap: 14, fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", alignItems: "center" }}>
              <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="chart" s={13} c="var(--color-primary)" w={2} /> ₪{budgetSum.toLocaleString('he-IL')} תקציב</span>
              <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="wallet" s={13} c="var(--color-secondary)" w={2} /> ₪{collected.toLocaleString('he-IL')} נגבה</span>
              {budget.feePerStudent && <span style={{ display:"flex", alignItems:"center", gap: 4 }}><Icon n="user" s={13} c="var(--color-text-secondary)" w={2} /> ₪{budget.feePerStudent}/ילד</span>}
            </div>
            <button onClick={onSelect} style={{
              marginTop: 12, width: "100%", padding: "11px 0", borderRadius: 12, border: "none",
              background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`,
              color: "white", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit",
            }}>כנס לתקציב ←</button>
          </div>
        </div>
      );
    }

    function BudgetForm({ initial = EMPTY_BUDGET_FORM, onSave, onCancel, title }) {
      const [form, setForm]           = useState({ ...EMPTY_BUDGET_FORM, ...initial });
      const [newMember, setNewMember] = useState("");
      const [newGName,  setNewGName]  = useState("");
      const [newGLink,  setNewGLink]  = useState("");
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const addMember = () => {
        if (!newMember.trim()) return;
        set("members", [...(form.members || []), newMember.trim()]);
        setNewMember("");
      };
      const removeMember = (i) => set("members", (form.members || []).filter((_, j) => j !== i));

      const saveGroup = () => {
        if (!newGName.trim()) return;
        set("whatsappGroups", [{ name: newGName.trim(), link: newGLink.trim() }]);
        setNewGName(""); setNewGLink("");
      };
      const removeGroup = () => set("whatsappGroups", []);

      return (
        <Card style={{ border: "2px solid var(--color-border)" }}>
          <div style={{ fontWeight: 800, fontSize: "var(--text-base)", marginBottom: 12 }}>{title}</div>

          <FieldLabel>שם הועד / הקבוצה <Tooltip text="שם שיופיע בראש התקציב ובדוחות" /></FieldLabel>
          <input placeholder="ועד הורים / ועדת ספורט / ..." value={form.name}
            onChange={e => set("name", e.target.value)} style={S.input} autoFocus />

          <FieldLabel>כיתה / קבוצה</FieldLabel>
          <input placeholder='כיתה ו׳ / מחלקת א׳ / ...' value={form.className}
            onChange={e => set("className", e.target.value)} style={S.input} />

          <FieldLabel>שנת לימודים</FieldLabel>
          <input placeholder="תשפ״ה / 2025-2026" value={form.year}
            onChange={e => set("year", e.target.value)} style={S.input} />

          <FieldLabel>תשלום פר ילד (₪)</FieldLabel>
          <input type="text" inputMode="numeric" placeholder="500" value={form.feePerStudent}
            onChange={e => set("feePerStudent", e.target.value)} style={S.input} />

          <FieldLabel>צבע נושא</FieldLabel>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            {Object.entries(BUDGET_COLORS).map(([key, clr]) => (
              <button key={key} onClick={() => set("colorKey", key)} style={{
                width: 36, height: 36, borderRadius: "50%", border: form.colorKey === key ? "3px solid #0f172a" : "3px solid transparent",
                background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`,
                cursor: "pointer", outline: "none",
              }} title={clr.label} />
            ))}
          </div>

          <FieldLabel>חברי הועד</FieldLabel>
          {(form.members || []).map((m, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, background: "#f0fdfa", borderRadius: 8, padding: "6px 10px" }}>
              <span style={{ flex: 1, fontSize: 13, display:"flex", alignItems:"center", gap: 5 }}><Icon n="user" s={13} c="#64748b" w={1.8} /> {m}</span>
              <button onClick={() => removeMember(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            <input value={newMember} onChange={e => setNewMember(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addMember()}
              placeholder="שם חבר/ת ועד" style={{ ...S.input, marginBottom: 0, flex: 1 }} />
            <Button onClick={addMember} style={{ flex: "none" }}>+ הוסף</Button>
          </div>

          <FieldLabel>קבוצות וואצאפ</FieldLabel>
          {(form.whatsappGroups || []).map((g, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, background: "#f0fdf4", borderRadius: 8, padding: "6px 10px" }}>
              <span style={{ flex: 1, fontSize: 13, display:"flex", alignItems:"center", gap: 5 }}><Icon n="msg" s={13} c="#059669" w={1.8} /> {g.name}</span>
              {g.link && <a href={g.link} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#0d9488" }}>🔗</a>}
              <button onClick={() => set("whatsappGroups", (form.whatsappGroups || []).filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ marginBottom: 6 }}>
            <input value={newGName} onChange={e => setNewGName(e.target.value)}
              placeholder="שם הקבוצה" style={{ ...S.input, marginBottom: 6 }} />
            <input value={newGLink} onChange={e => setNewGLink(e.target.value)}
              placeholder="קישור לקבוצה (https://chat.whatsapp.com/...)" style={{ ...S.input, marginBottom: 6 }} />
            <Button onClick={() => { if (!newGName.trim()) return; set("whatsappGroups", [...(form.whatsappGroups || []), { name: newGName.trim(), link: newGLink.trim() }]); setNewGName(""); setNewGLink(""); }} style={{ width: "100%" }}>+ הוסף קבוצה</Button>
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <Button onClick={() => onSave(form)} disabled={!form.name.trim()}>שמור</Button>
            <Button variant="secondary" onClick={onCancel}>ביטול</Button>
          </div>
        </Card>
      );
    }

    // ─────────────────────────────────────────
    // KUPATI LOGO — inline SVG
    // ─────────────────────────────────────────

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width={size} height={size} style={{ borderRadius: size * 0.22, flexShrink: 0 }}>

            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#0891b2" />
              <stop offset="100%" stopColor="#10b981" />
            </linearGradient>
            <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
              <stop offset="0%" stopColor="rgba(255,255,255,0.25)" />

            </radialGradient>
          </defs>
          <rect width="100" height="100" rx="22" fill="url(#logoGrad)" />
          <rect width="100" height="100" rx="22" fill="url(#glow1)" />
          <circle cx="75" cy="25" r="18" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="1.2" />
          <circle cx="25" cy="72" r="12" fill="none" stroke="rgba(255,255,255,0.13)" strokeWidth="1" />
          <rect x="28" y="52" width="44" height="28" rx="4" fill="white" opacity="0.92" />
          <rect x="28" y="46" width="44" height="9" rx="2" fill="white" />
          <rect x="44" y="42" width="12" height="5" rx="2.5" fill="#0d9488" />
          <circle cx="37" cy="28" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5" />
          <circle cx="52" cy="20" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5" />
          <circle cx="67" cy="28" r="9" fill="#f59e0b" stroke="#d97706" strokeWidth="1.5" />
          <text x="37" y="32" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="sans-serif">₪</text>
          <text x="52" y="24" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="sans-serif">₪</text>
          <text x="67" y="32" textAnchor="middle" fill="white" fontSize="9" fontWeight="bold" fontFamily="sans-serif">₪</text>
        </svg>
      );
    }

    // ─────────────────────────────────────────
    // HELP MODAL — הסברים
    // ─────────────────────────────────────────
    // SHARED — Help Modal (generic, prop-driven)
    // ─────────────────────────────────────────
    function HelpModal({ isOpen, onClose, title, content, closeLabel = "הבנתי" }) {
      if (!isOpen) return null;

    const EMPTY_EVENT = { name: "", date: "", budget: "", spent: "", category: "פעילות", notes: "", paidBy: "", paidBySplit: [], done: false, type: "expense" };

    function PaidBySplit({ total, splits, onChange }) {
      const totalNum = Number(String(total).replace(/[^\d.]/g, '')) || 0;
      const otherTotal = splits.reduce((s, x) => s + (Number(x.amount) || 0), 0);
      const kupaAmount = totalNum - otherTotal;
      const update = (i, field, val) => onChange(splits.map((s, j) => j === i ? { ...s, [field]: val } : s));
      const remove = (i) => onChange(splits.filter((_, j) => j !== i));
      const addSplit = () => {
        onChange([...splits, { name: "", amount: kupaAmount > 0 ? kupaAmount : "" }]);
      };
      const kupaStyle = { ...S.input, marginBottom: 0, width: "auto", flex: 1, background: "#f0fdfa", display: "flex", alignItems: "center" };
      return (
        <div style={{ marginBottom: 8 }}>
          <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
          {totalNum > 0 && (

              <div style={{ width: 24, flexShrink: 0 }} />
            </div>

            <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input value={sp.name} onChange={e => update(i, "name", e.target.value)} placeholder="שם"
                style={{ ...S.input, marginBottom: 0, flex: 2 }} />
              <input type="text" inputMode="numeric" value={sp.amount}
                onChange={e => update(i, "amount", e.target.value.replace(/[^\d.]/g, ''))}
                onPaste={e => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); update(i, "amount", t.replace(/[^\d.]/g, '')); }}
                placeholder="סכום" style={{ ...S.input, marginBottom: 0, flex: 1 }} />
              <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 16, padding: "0 4px", flexShrink: 0 }}>✕</button>
            </div>

        </div>

    const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

    function YearCalendar({ events, budgetYear }) {
      const [hoveredId, setHoveredId] = useState(null);
      const match = (budgetYear || "").match(/(\d{4})/);
      const startYear = match ? parseInt(match[1]) : (new Date().getMonth() >= 8 ? new Date().getFullYear() : new Date().getFullYear() - 1);
      // School year: Sep (8) of startYear → Aug (7) of startYear+1
      const months = Array.from({ length: 12 }, (_, i) => {
        const monthIdx = (8 + i) % 12;
        const yr = monthIdx >= 8 ? startYear : startYear + 1;
        return { yr, month: monthIdx };
      });
      const byMonth = {};
      events.forEach(ev => {
        const ts = parseSortDate(ev.date);
        if (ts === Infinity) return;
        const d = new Date(ts);
        const key = `${d.getFullYear()}-${d.getMonth()}`;
        if (!byMonth[key]) byMonth[key] = [];
        byMonth[key].push(ev);
      });
      return (
        <div className="cal-grid" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 6, marginBottom: 16 }}>
          {months.map(({ yr, month }) => {
            const key = `${yr}-${month}`;
            const mes = byMonth[key] || [];
            return (
              <div key={key} className="cal-cell" style={{
                background: "white", borderRadius: 10, padding: "7px 8px 6px",
                boxShadow: "0 1px 4px rgba(0,0,0,0.07)",
                overflow: "hidden", display: "flex", flexDirection: "column",
              }}>
                <div style={{ fontWeight: 800, fontSize: 11, color: "#64748b", marginBottom: 5, borderBottom: "1px solid #f1f5f9", paddingBottom: 4, flexShrink: 0 }}>
                  {HEB_MONTHS[month]} <span style={{ fontWeight: 400, color: "#cbd5e1" }}>{yr}</span>
                </div>
                <div style={{ overflow: "hidden", flex: 1, position: "relative" }}>
                {mes.length === 0
                  ? <div style={{ fontSize: 10, color: "#e2e8f0" }}>—</div>
                  : mes.map(ev => {
                    const isIncome = (ev.type || "expense") === "income";
                    return (
                      <div key={ev.id} style={{ position: "relative", marginBottom: 3 }}
                        onMouseEnter={() => setHoveredId(ev.id)}
                        onMouseLeave={() => setHoveredId(null)}
                      >
                        <div style={{
                          fontSize: 10, padding: "2px 6px", borderRadius: 6, cursor: "default",
                          background: isIncome ? "#dcfce7" : "#fee2e2",
                          color: isIncome ? "#059669" : "#ef4444",
                          fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                          opacity: ev.done ? 0.6 : 1,
                        }}>
                          {ev.done ? "✅ " : ""}{ev.name}
                        </div>
                        {hoveredId === ev.id && (
                          <div style={{
                            position: "absolute", zIndex: 200, background: "white", borderRadius: 12,
                            padding: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.18)", minWidth: 210,
                            right: 0, top: "calc(100% + 4px)", border: "1px solid #e2e8f0",
                          }}>
                            <div style={{ fontWeight: 700, fontSize: 13, color: "#0f172a", marginBottom: 6 }}>{ev.name}</div>
                            {ev.date && <div style={{ fontSize: 11, color: "#64748b", marginBottom: 2 }}>📅 {formatDate(ev.date)}</div>}
                            <div style={{ fontSize: 11, color: "#64748b", marginBottom: 2 }}>🏷️ {ev.category}</div>
                            <div style={{ fontSize: 11, marginBottom: 4 }}>
                              תקציב: <strong>₪{ev.budget.toLocaleString('he-IL')}</strong>
                              {ev.spent > 0 && <> &nbsp;|&nbsp; שולם: <strong style={{ color: isIncome ? "#059669" : "#ea580c" }}>₪{ev.spent.toLocaleString('he-IL')}</strong></>}
                            </div>
                            {ev.notes && <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>📝 {ev.notes}</div>}
                            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                              <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 6, background: isIncome ? "#dcfce7" : "#fee2e2", color: isIncome ? "#059669" : "#ef4444", fontWeight: 700 }}>
                                {isIncome ? "הכנסה" : "הוצאה"}
                              </span>
                              <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 6, background: ev.done ? "#f0fdf4" : "#f8fafc", color: ev.done ? "#059669" : "#94a3b8", fontWeight: 700 }}>
                                {ev.done ? "הושלם ✅" : "עתידי"}
                              </span>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })
                }
                </div>{/* /overflow wrapper */}
              </div>
            );
          })}

    function BudgetTab({ events, setEvents, collectionBudget = 0, expectedStudents = 0, year = "" }) {
      const [showAdd,     setShowAdd]     = useState(false);
      const [filterCat,   setFilterCat]   = useState("הכל");
      const [filterStatus,setFilterStatus]= useState("הכל");
      const [filterType,  setFilterType]  = useState("הכל");
      const [showCalendar,setShowCalendar]= useState(true);
      const [addForm,     setAddForm]     = useState(EMPTY_EVENT);
      const [editId,      setEditId]      = useState(null);
      const [editForm,    setEditForm]    = useState({});
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const totalExpBudget    = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.budget, 0);
      const totalIncBudget    = collectionBudget + events.filter(e => (e.type || "expense") === "income").reduce((s, e) => s + e.budget, 0);
      const totalSpent        = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.spent, 0);
      const totalIncomeActual = events.filter(e => (e.type || "expense") === "income").reduce((s, e) => s + e.spent, 0);
      const budgetPerStudent  = expectedStudents > 0 ? Math.round(totalExpBudget / expectedStudents) : null;
      const balance           = totalIncBudget - totalExpBudget;
      const filtered = events.filter(e => {
        if (filterCat    !== "הכל" && e.category !== filterCat) return false;
        if (filterStatus !== "הכל") { if (filterStatus === "הושלם" && !e.done) return false; if (filterStatus === "עתידי" && e.done) return false; }
        if (filterType   !== "הכל") { const inc = (e.type || "expense") === "income"; if (filterType === "הכנסה" && !inc) return false; if (filterType === "הוצאה" && inc) return false; }
        return true;
      });
      const sorted = [...filtered].sort((a, b) => parseSortDate(a.date) - parseSortDate(b.date));

      const buildEvent = (form) => {
        const splits = (form.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        return { id: Date.now(), ...form, budget: Number(form.budget) || 0, spent: Number(form.spent) || 0, paidBy, paidBySplit: splits };
      };

      const addEvent       = () => { if (!addForm.name.trim()) return; setEvents([...events, buildEvent(addForm)]); setAddForm(EMPTY_EVENT); setShowAdd(false); };
      const addEventAndNew = () => { if (!addForm.name.trim()) return; setEvents([...events, buildEvent(addForm)]); setAddForm(EMPTY_EVENT); };

      const startEdit  = (ev) => {
        const paidBySplit = (ev.paidBySplit || (ev.paidBy ? [{ name: ev.paidBy, amount: ev.spent }] : [])).filter(s => s.name !== "קופת איסוף");
        setEditId(ev.id); setEditForm({ ...ev, budget: String(ev.budget), spent: String(ev.spent), type: ev.type || "expense", paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setEvents(events.map(e => e.id === editId ? { ...editForm, id: editId, budget: Number(editForm.budget) || 0, spent: Number(editForm.spent) || 0, paidBy, paidBySplit: splits } : e));
        setEditId(null);
      };
      const removeEvent   = (id) => setConfirmDeleteId(id);
      const doRemoveEvent = () => { setEvents(events.filter(e => e.id !== confirmDeleteId)); setConfirmDeleteId(null); };
      const toggleDone    = (id) => setEvents(events.map(e => e.id === id ? { ...e, done: !e.done } : e));

      return (
        <React.Fragment>
          <ConfirmDeleteModal
            isOpen={!!confirmDeleteId}
            itemName={(events.find(e => e.id === confirmDeleteId) || {}).name || ""}
            onConfirm={doRemoveEvent}
            onCancel={() => setConfirmDeleteId(null)}
          />
        <div>
          {/* ── Summary card ── */}
          <div style={{ background: "linear-gradient(135deg, var(--color-text-primary) 0%, #0f2420 100%)", borderRadius: 20, padding: 20, color: "white", marginBottom: 16 }}>
            <div className="summary-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
              {[
                { l: "תקציב הוצאות", v: fmt(totalExpBudget), c: "#f87171" },
                { l: "תקציב הכנסות", v: fmt(totalIncBudget), c: "#4ade80" },
                { l: "יתרה תקציבית", v: fmt(balance),        c: balance >= 0 ? "#4ade80" : "#f87171" },
              ].map(x => (
                <div key={x.l}>
                  <div className="summary-val" style={{ fontWeight: 700, color: x.c, letterSpacing: -0.5 }}>{x.v}</div>
                  <div className="summary-lbl" style={{ opacity: 0.55, marginTop: 2 }}>{x.l}</div>
                </div>
              ))}
            </div>
            {[
              { l: "הוצאות בפועל", v: fmt(totalSpent),        c: "#f87171" },
              { l: "הכנסות בפועל", v: fmt(totalIncomeActual), c: "#4ade80" },
            ].map(x => (
              <div key={x.l} style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div className="summary-lbl" style={{ opacity: 0.7 }}>{x.l}</div>
                  <div style={{ fontSize: "0.7rem", opacity: 0.4 }}>מועבר ל״מזומן״</div>
                </div>
                <div className="summary-val" style={{ fontWeight: 700, color: x.c, letterSpacing: -0.5 }}>{x.v}</div>
              </div>
            ))}
            {budgetPerStudent !== null && (
              <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ opacity: 0.55, fontSize: "var(--text-xs)" }}>תקציב לתלמיד</div>
                  <div style={{ opacity: 0.4, fontSize: "0.7rem" }}>הוצאות ÷ {expectedStudents} תלמידים</div>
                </div>
                <div style={{ fontWeight: 700, color: "#60a5fa", fontSize: "var(--text-xl)" }}>{fmt(budgetPerStudent)}</div>
              </div>
            )}
          </div>

          {/* Add button / form — top, below summary */}
          {showAdd ? (
            <EventForm title="➕ ארוע חדש" data={addForm} onChange={setAddForm} onSave={addEvent} onSaveAndNew={addEventAndNew} onCancel={() => { setShowAdd(false); setAddForm(EMPTY_EVENT); }} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, marginBottom: 14,
              border: "2px dashed var(--color-border)",
              background: "var(--color-primary-light)", color: "var(--color-primary)",
              fontWeight: 600, fontSize: "var(--text-sm)",
              cursor: "pointer", fontFamily: "inherit",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
              <Icon n="plus" s={16} c="var(--color-primary)" w={2.2} /> הוספת ארוע
            </button>
          )}

          {/* Filters + calendar toggle */}
          {(() => {
            const isFiltered = filterCat !== "הכל" || filterStatus !== "הכל" || filterType !== "הכל";
            return (
              <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, flex: "1 1 130px" }}>
                  <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 700 }}>קטגוריה</span>
                  <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ ...S.input, marginBottom: 0, fontSize: 12, padding: "6px 8px" }}>
                    <option value="הכל">הכל</option>
                    {CAT_LIST.map(c => <option key={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, flex: "1 1 100px" }}>
                  <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 700 }}>סטטוס</span>
                  <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ ...S.input, marginBottom: 0, fontSize: 12, padding: "6px 8px" }}>
                    <option value="הכל">הכל</option>
                    <option value="עתידי">עתידי</option>
                    <option value="הושלם">הושלם</option>
                  </select>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, flex: "1 1 100px" }}>
                  <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 700 }}>סוג</span>
                  <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ ...S.input, marginBottom: 0, fontSize: 12, padding: "6px 8px" }}>
                    <option value="הכל">הכל</option>
                    <option value="הוצאה">הוצאה</option>
                    <option value="הכנסה">הכנסה</option>
                  </select>
                </div>
                <div style={{ display: "flex", gap: 6, alignSelf: "flex-end" }}>
                  {isFiltered && (
                    <button onClick={() => { setFilterCat("הכל"); setFilterStatus("הכל"); setFilterType("הכל"); }} style={{
                      padding: "6px 10px", borderRadius: 10, border: "1px solid #e2e8f0", cursor: "pointer",
                      fontFamily: "inherit", fontWeight: 700, fontSize: 12,
                      background: "#fff7ed", color: "#ea580c", whiteSpace: "nowrap",
                    }}>✕ איפוס</button>
                  )}
                  <button onClick={() => setShowCalendar(v => !v)} style={{
                    padding: "6px 12px", borderRadius: 10, border: "none", cursor: "pointer",
                    fontFamily: "inherit", fontWeight: 700, fontSize: 12,
                    background: showCalendar ? "#0d9488" : "#f1f5f9",
                    color: showCalendar ? "white" : "#64748b", whiteSpace: "nowrap",
                  }}>📅 {showCalendar ? "הסתר לוח" : "לוח שנתי"}</button>
                </div>
              </div>
            );
          })()}

          {/* Yearly calendar */}
          {showCalendar && <YearCalendar events={filtered} budgetYear={year} />}

          {/* Event list */}
          <div className="event-grid">
          {sorted.map(ev => {
            const isIncome = (ev.type || "expense") === "income";
            return editId === ev.id ? (
              <EventForm key={ev.id} title="✏️ עריכת ארוע" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <Card key={ev.id} style={{ opacity: ev.done ? 0.65 : 1, padding: "12px 14px", borderRight: `3px solid ${isIncome ? "var(--color-secondary)" : "var(--color-danger)"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                      <button onClick={() => toggleDone(ev.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 0, lineHeight: 1 }}>
                        {ev.done ? "✅" : "⬜"}
                      </button>
                      <span className="ev-name" style={{ fontWeight: 700, color: "var(--color-text-primary)" }}>{ev.name}</span>
                      <span style={{ fontSize: "0.75rem", fontWeight: 700, padding: "1px 6px", borderRadius: 8, background: isIncome ? "#dcfce7" : "#fee2e2", color: isIncome ? "var(--color-secondary)" : "var(--color-danger)" }}>
                        <span style={{ display:"inline-flex", alignItems:"center", gap: 3 }}><Icon n={isIncome ? "income" : "expense"} s={10} c={isIncome ? "var(--color-secondary)" : "var(--color-danger)"} w={2.2} />{isIncome ? "הכנסה" : "הוצאה"}</span>
                      </span>
                    </div>
                    <div className="ev-meta" style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                      <Badge text={ev.category} cat={ev.category} />
                      <span style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)" }}>{formatDate(ev.date)}</span>
                      {ev.paidBy && <span style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n="user" s={11} c="var(--color-text-secondary)" w={1.8} /> {ev.paidBy}</span>}
                    </div>
                    {ev.notes && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", display:"flex", alignItems:"center", gap: 4 }}><Icon n="pencil" s={11} c="var(--color-text-secondary)" w={1.8} /> {ev.notes}</div>}
                  </div>
                  <div className="ev-amount-col" style={{ textAlign: "left", flexShrink: 0, marginRight: 8, minWidth: 72 }}>
                    <div className="ev-budget-val" style={{ fontWeight: 900, color: "var(--color-text-primary)" }}>₪{ev.budget.toLocaleString('he-IL')}</div>
                    <div style={{ fontSize: "0.75rem", color: "var(--color-text-secondary)" }}>תקציב</div>
                    {ev.spent > 0 && <div className="ev-paid-val" style={{ fontWeight: 700, color: isIncome ? "var(--color-secondary)" : "var(--color-warning)", marginTop: 2 }}>₪{ev.spent.toLocaleString('he-IL')} {isIncome ? "התקבל" : "שולם"}</div>}
                  </div>
                </div>
                {ev.spent > 0 && ev.budget > 0 && (
                  <ProgressBar
                    pct={(ev.spent / ev.budget) * 100}
                    color={isIncome ? "var(--color-secondary)" : ((ev.spent / ev.budget) > 1 ? "var(--color-danger)" : (ev.spent / ev.budget) > 0.8 ? "var(--color-warning)" : "var(--color-primary)")}
                    style={{ marginTop: 8, marginBottom: 4 }}
                  />
                )}
                <div style={{ display: "flex", gap: 2, marginTop: 8 }}>
                  <IconBtn icon="pencil" color="var(--color-text-secondary)" onClick={() => startEdit(ev)}       title="ערוך"  />
                  <IconBtn icon="trash"  color="var(--color-danger)"          onClick={() => removeEvent(ev.id)} title="מחק"   />
                </div>
              </Card>
            );
          })}

          </div>{/* /event-grid */}

        </div>
        </React.Fragment>
      );
    }

    // ─────────────────────────────────────────
    // COLLECT TAB — Students with edit
    // ─────────────────────────────────────────
    const EMPTY_STUDENT_FORM = { name: "", paid: false, amount: "", note: "", paidBy: "", paidBySplit: [], partial: false };

    function CollectTab({ students, setStudents, feePerStudent = 500, setFeePerStudent, expectedStudents = 0, setExpectedStudents, payboxLink = "", setPayboxLink, classWhatsappLink = "", setClassWhatsappLink }) {
      const [search,        setSearch]        = useState("");
      const [showAdd,       setShowAdd]       = useState(false);
      const [addForm,       setAddForm]       = useState(EMPTY_STUDENT_FORM);
      const [editId,        setEditId]        = useState(null);
      const [editForm,      setEditForm]      = useState({});
      const [studentsRaw,   setStudentsRaw]   = useState(String(expectedStudents));
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const paidCount      = students.filter(s => s.paid).length;
      const totalCollected = students.reduce((s, st) => s + (st.amount || 0), 0);
      const collectionBudgetTotal = expectedStudents * feePerStudent;
      const filtered       = search ? students.filter(s => s.name.includes(search)) : students;

      const toggle = (id) => setStudents(students.map(s =>
        s.id === id ? { ...s, paid: !s.paid, amount: !s.paid ? feePerStudent : s.amount } : s
      ));

      const buildStudent = (form) => {
        const splits = (form.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        return { id: Date.now(), name: form.name.trim(), paid: !!form.paid, amount: Number(form.amount) || 0, note: form.note || "", paidBy, paidBySplit: splits, partial: !!form.partial };
      };

      const addStudent       = () => { if (!addForm.name.trim()) return; setStudents([...students, buildStudent(addForm)]); setAddForm(EMPTY_STUDENT_FORM); setShowAdd(false); };
      const addStudentAndNew = () => { if (!addForm.name.trim()) return; setStudents([...students, buildStudent(addForm)]); setAddForm(EMPTY_STUDENT_FORM); };

      const startEdit = (s) => {
        const paidBySplit = (s.paidBySplit || (s.paidBy ? [{ name: s.paidBy, amount: s.amount }] : [])).filter(sp => sp.name !== "קופת איסוף");
        setEditId(s.id); setEditForm({ ...s, amount: String(s.amount), paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit = () => {
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setStudents(students.map(s => s.id === editId
          ? { ...editForm, id: editId, amount: Number(editForm.amount) || 0, paid: !!editForm.paid, partial: !!editForm.partial, paidBy, paidBySplit: splits }
          : s
        ));
        setEditId(null);
      };
      const removeStudent   = (id) => setConfirmDeleteId(id);
      const doRemoveStudent = () => { setStudents(students.filter(s => s.id !== confirmDeleteId)); setConfirmDeleteId(null); };

      const unpaidStudents = students.filter(s => !s.paid);
      const whatsappMsg = unpaidStudents.length === 0
        ? null
        : paidCount === 0
          ? `שלום כיתה יקרה! 😊\nנפתחה גבייה לדמי ועד הורים לשנה"ל: ₪${feePerStudent} לתלמיד.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`
          : `שלום 😊 תזכורת ידידותית לתשלום דמי ועד הורים (₪${feePerStudent}).\nטרם שולם: ${unpaidStudents.map(s => s.name).join(', ')}.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`;

      return (
        <React.Fragment>
          <ConfirmDeleteModal
            isOpen={!!confirmDeleteId}
            itemName={(students.find(s => s.id === confirmDeleteId) || {}).name || ""}
            onConfirm={doRemoveStudent}
            onCancel={() => setConfirmDeleteId(null)}
          />
        <div>
          {/* Paybox / Bit link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לפייבוקס / ביט</FieldLabel>
            <input value={payboxLink} onChange={e => setPayboxLink && setPayboxLink(e.target.value)}
              placeholder="https://paybox.me/..." style={{ ...S.input, marginBottom: payboxLink ? 6 : 0 }} />
            {payboxLink && <a href={payboxLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#0d9488" }}>🔗 פתח קישור לתשלום</a>}
          </Card>

          {/* Class WhatsApp link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לוואצאפ כיתה</FieldLabel>
            <input value={classWhatsappLink} onChange={e => setClassWhatsappLink && setClassWhatsappLink(e.target.value)}
              placeholder="https://chat.whatsapp.com/..." style={{ ...S.input, marginBottom: classWhatsappLink ? 6 : 0 }} />
            {classWhatsappLink && <a href={classWhatsappLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#25d366" }}>💬 פתח קבוצת כיתה</a>}
          </Card>

          {/* Collection budget settings */}
          <Card style={{ marginBottom: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div>
                <FieldLabel>מספר תלמידים</FieldLabel>
                <input type="text" inputMode="decimal" value={studentsRaw} onChange={e => { const raw = e.target.value; setStudentsRaw(raw); const num = parseFloat(raw); if (setExpectedStudents) setExpectedStudents(isNaN(num) ? 0 : num); }} style={{ ...S.input, marginBottom: 0 }} />
              </div>
              <div>
                <FieldLabel>סכום לגבייה ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={feePerStudent} onChange={e => setFeePerStudent && setFeePerStudent(Number(e.target.value) || 0)} style={{ ...S.input, marginBottom: 0 }} />
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, padding: "10px 14px", background: "#f0fdf4", borderRadius: 10 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: "#166534" }}>תקציב גבייה</span>
              <span style={{ fontSize: 24, fontWeight: 900, color: "#059669" }}>{fmt(collectionBudgetTotal)}</span>
            </div>
          </Card>

          {/* ── Collection summary card ── */}
          <div style={{ background: "linear-gradient(135deg, var(--color-secondary) 0%, var(--color-primary) 100%)", borderRadius: 20, padding: 20, color: "white", marginBottom: 12 }}>
            <div style={{ opacity: 0.8, fontSize: "var(--text-xs)", marginBottom: 2 }}>סה״כ נגבה</div>
            <div style={{ fontSize: "var(--text-2xl)", fontWeight: 700, letterSpacing: -1 }}>
              ₪{totalCollected.toLocaleString('he-IL')}
            </div>
            {collectionBudgetTotal > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 100, height: 7, overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 100, background: "rgba(255,255,255,0.75)", width: `${Math.min((totalCollected / collectionBudgetTotal) * 100, 100)}%`, transition: "width 0.4s ease" }} />
                </div>
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 12 }}>
              <div>
                <div style={{ opacity: 0.65, fontSize: "0.7rem" }}>שילמו</div>
                <div style={{ fontWeight: 700, fontSize: "var(--text-sm)", display: "flex", alignItems: "center", gap: 4 }}><Icon n="check" s={13} c="white" w={2.5} /> {paidCount}/{students.length}</div>
              </div>
              <div>
                <div style={{ opacity: 0.65, fontSize: "0.7rem" }}>יעד גבייה</div>
                <div style={{ fontWeight: 700, fontSize: "var(--text-sm)" }}>₪{collectionBudgetTotal.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div style={{ opacity: 0.65, fontSize: "0.7rem" }}>ממתינים</div>
                <div style={{ fontWeight: 700, fontSize: "var(--text-sm)", color: students.length - paidCount > 0 ? "#fde68a" : "#86efac", display: "flex", alignItems: "center", gap: 4 }}>
                  {students.length - paidCount > 0 ? `${students.length - paidCount} ילדים` : "✓ הכל"}
                </div>
              </div>
            </div>
          </div>

          {/* Add student — top, below summary */}
          {showAdd ? (
            <Card style={{ border: "2px solid var(--color-border)", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, marginBottom: 10, fontSize: "var(--text-sm)" }}>➕ תלמיד/ה חדש/ה</div>
              <FieldLabel>שם התלמיד/ה *</FieldLabel>
              <input value={addForm.name} onChange={e => setAddForm({ ...addForm, name: e.target.value })}
                placeholder="שם התלמיד/ה" style={S.input} autoFocus />
              <FieldLabel>סכום ששולם ₪</FieldLabel>
              <input type="text" inputMode="numeric" value={addForm.amount}
                onChange={e => setAddForm({ ...addForm, amount: e.target.value.replace(/[^\d.]/g, '') })}
                onPaste={e => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); setAddForm({ ...addForm, amount: t.replace(/[^\d.]/g, '') }); }}
                placeholder="0" style={S.input} />
              <FieldLabel>הערה</FieldLabel>
              <input value={addForm.note} onChange={e => setAddForm({ ...addForm, note: e.target.value })}
                placeholder="הערה..." style={S.input} />
              <PaidBySplit
                total={addForm.amount}
                splits={addForm.paidBySplit || []}
                onChange={splits => setAddForm({ ...addForm, paidBySplit: splits })}
              />
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, cursor: "pointer", fontSize: 13 }}>
                <input type="checkbox" checked={!!addForm.paid} onChange={e => setAddForm({ ...addForm, paid: e.target.checked })} style={{ width: 16, height: 16 }} />
                שולם ✅
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
                <input type="checkbox" checked={!!addForm.partial} onChange={e => setAddForm({ ...addForm, partial: e.target.checked })} style={{ width: 16, height: 16 }} />
                🟠 תשלום חלקי
              </label>
              <div style={{ display: "flex", gap: 8 }}>
                <Button onClick={addStudent} disabled={!addForm.name.trim()}>הוספת</Button>
                <Button variant="ghost" onClick={addStudentAndNew} disabled={!addForm.name.trim()}>שמור + חדש</Button>
                <Button variant="secondary" onClick={() => { setShowAdd(false); setAddForm(EMPTY_STUDENT_FORM); }}>ביטול</Button>
              </div>
            </Card>
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, marginBottom: 12,
              border: "2px dashed var(--color-border)",
              background: "var(--color-primary-light)", color: "var(--color-primary)",
              fontWeight: 700, fontSize: "var(--text-sm)",
              cursor: "pointer", fontFamily: "inherit", display:"flex", alignItems:"center", justifyContent:"center", gap: 8,
            }}><Icon n="plus" s={14} c="var(--color-primary)" w={2.5} /> הוספת תלמיד/ה</button>
          )}

          <input placeholder="🔍 חפשי תלמיד..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ ...S.input, marginBottom: 10 }} />

          {students.length > 0 && (
            <>
              <ProgressBar pct={(paidCount / students.length) * 100} color="linear-gradient(90deg,#0d9488,#10b981)" />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginBottom: 14, marginTop: 4 }}>
                <span>0%</span>
                <span style={{ fontWeight: 600 }}>{Math.round((paidCount / students.length) * 100)}% שולם</span>
                <span>100%</span>
              </div>
            </>
          )}

          <div className="student-grid">
          {filtered.map(s => (
            editId === s.id ? (
              <Card key={s.id} style={{ border: "2px solid var(--color-border)" }}>
                <div style={{ fontWeight: 700, marginBottom: 10, fontSize: "var(--text-sm)" }}>✏️ עריכת תלמיד</div>
                <FieldLabel>שם</FieldLabel>
                <input value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} style={S.input} autoFocus />
                <FieldLabel>סכום ששולם ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={editForm.amount}
                  onChange={e => setEditForm({ ...editForm, amount: e.target.value.replace(/[^\d.]/g, '') })}
                  onPaste={e => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); setEditForm({ ...editForm, amount: t.replace(/[^\d.]/g, '') }); }}
                  style={S.input} />
                <FieldLabel>הערה</FieldLabel>
                <input value={editForm.note || ""} onChange={e => setEditForm({ ...editForm, note: e.target.value })} placeholder="הערה..." style={S.input} />
                <PaidBySplit
                  total={editForm.amount}
                  splits={editForm.paidBySplit || []}
                  onChange={splits => setEditForm({ ...editForm, paidBySplit: splits })}
                />
                <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, cursor: "pointer", fontSize: 13 }}>
                  <input type="checkbox" checked={!!editForm.paid} onChange={e => setEditForm({ ...editForm, paid: e.target.checked })} style={{ width: 16, height: 16 }} />
                  שולם ✅
                </label>
                <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
                  <input type="checkbox" checked={!!editForm.partial} onChange={e => setEditForm({ ...editForm, partial: e.target.checked })} style={{ width: 16, height: 16 }} />
                  🟠 תשלום חלקי
                </label>
                <div style={{ display: "flex", gap: 8 }}>
                  <Button onClick={saveEdit}>שמור</Button>
                  <Button variant="secondary" onClick={cancelEdit}>ביטול</Button>
                </div>
              </Card>
            ) : (
              <div key={s.id} style={{
                background: s.partial && !s.paid ? "#fff7ed" : "var(--color-surface)",
                borderRadius: 14, padding: "12px 14px", marginBottom: 8,
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: "1px solid var(--color-border)",
                borderRight: `4px solid ${s.paid ? "var(--color-secondary)" : s.partial ? "#f97316" : "var(--color-border)"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div className="ev-name" style={{ fontWeight: 700, fontSize: "var(--text-xs)", color: "var(--color-text-primary)", display: "flex", alignItems: "center", gap: 6 }}>
                      {students.indexOf(s) + 1}. {s.name}
                      {s.partial && !s.paid && <span style={{ fontSize: "0.75rem", background: "#fed7aa", color: "#c2410c", borderRadius: 6, padding: "1px 6px", fontWeight: 700 }}>חלקי</span>}
                    </div>
                    {s.note   && <div style={{ fontSize: "0.8rem", color: "var(--color-warning)", marginTop: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="pencil" s={11} c="var(--color-warning)" w={1.8} /> {s.note}</div>}
                    {s.paidBy && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginTop: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="user" s={11} c="var(--color-text-secondary)" w={1.8} /> {s.paidBy}</div>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                    {(s.paid || s.amount > 0) && <span className="ev-paid-val" style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: s.paid ? "var(--color-secondary)" : "#f97316" }}>₪{(s.amount || 0).toLocaleString('he-IL')}</span>}
                    <button onClick={() => toggle(s.id)} style={{
                      width: 36, height: 36, borderRadius: "50%", border: "none", cursor: "pointer",
                      background: s.paid ? "#dcfce7" : s.partial ? "#fed7aa" : "#fee2e2", fontSize: 18,
                    }}>{s.paid ? "✅" : s.partial ? "🟠" : "❌"}</button>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2, marginTop: 8 }}>
                  <IconBtn icon="pencil" color="var(--color-text-secondary)" onClick={() => startEdit(s)}          title="ערוך" />
                  <IconBtn icon="trash"  color="var(--color-danger)"          onClick={() => removeStudent(s.id)}  title="מחק"  />
                </div>
              </div>
            )
          ))}
          </div>{/* /student-grid */}

          {/* Dynamic WhatsApp reminder */}
          {students.length > 0 && (
            <Card style={{ background: "var(--color-primary-light)", border: `1px solid var(--color-border)`, marginTop: 12 }}>
              <div style={{ fontWeight: 700, fontSize: "var(--text-xs)", color: "var(--color-primary-dark)", marginBottom: 6 }}>
                <span style={{ display:"inline-flex", alignItems:"center", gap: 6 }}>{unpaidStudents.length === 0 ? <><Icon n="check" s={14} c="var(--color-primary-dark)" w={2.5} /> כולם שילמו!</> : <><Icon n="msg" s={14} c="var(--color-primary-dark)" w={2} /> תזכורת לוואצאפ</>}</span>
              </div>
              {whatsappMsg && (
                <div style={{ fontSize: "var(--text-xs)", color: "var(--color-primary-dark)", lineHeight: 1.8, userSelect: "all", whiteSpace: "pre-wrap" }}>
                  {whatsappMsg}
                </div>
              )}
            </Card>
          )}
        </div>
        </React.Fragment>
      );
    }

    // ─────────────────────────────────────────
    // GIFTS TAB — Global ideas directory (cross-budget)
    // ─────────────────────────────────────────
    const EMPTY_GIFT = { icon: "🎁", name: "", forWhom: "", priceRange: "", tag: "", notes: "", vendorName: "", vendorPhone: "", vendorLink: "", photo: null };

    function handlePhotoUpload(e, data, onChange) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => onChange({ ...data, photo: ev.target.result });
      reader.readAsDataURL(file);
    }

    function GiftForm({ data, onChange, onSave, onCancel, title }) {
      return (
        <Card style={{ border: "2px solid var(--color-border)" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: "var(--text-sm)" }}>{title}</div>
          <FieldLabel>אמוג׳י</FieldLabel>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {EMOJIS.map(e => (
              <button key={e} onClick={() => onChange({ ...data, icon: e })} style={{
                fontSize: 20, background: data.icon === e ? "var(--color-primary-light)" : "var(--color-background)",
                border: data.icon === e ? "2px solid var(--color-primary)" : "2px solid transparent",
                borderRadius: 8, padding: 4, cursor: "pointer",
              }}>{e}</button>
            ))}
          </div>
          <FieldLabel>שם הרעיון *</FieldLabel>
          <input value={data.name} onChange={e => onChange({ ...data, name: e.target.value })} placeholder="שם הרעיון" style={S.input} autoFocus />
          <FieldLabel>עבור מי</FieldLabel>
          <input value={data.forWhom} onChange={e => onChange({ ...data, forWhom: e.target.value })} placeholder="אנני, כיתה, הורים..." style={S.input} />
          <FieldLabel>טווח מחיר</FieldLabel>
          <input value={data.priceRange} onChange={e => onChange({ ...data, priceRange: e.target.value })} placeholder="50–100₪" style={S.input} />
          <FieldLabel>תג / אירוע</FieldLabel>
          <input value={data.tag} onChange={e => onChange({ ...data, tag: e.target.value })} placeholder="סוף שנה, פורים..." style={S.input} />
          <FieldLabel>שם ספק</FieldLabel>
          <input value={data.vendorName || ""} onChange={e => onChange({ ...data, vendorName: e.target.value })} placeholder="שם הספק / חנות" style={S.input} />
          <FieldLabel>טלפון ספק</FieldLabel>
          <input value={data.vendorPhone || ""} onChange={e => onChange({ ...data, vendorPhone: e.target.value })} placeholder="050-0000000" style={S.input} />
          <FieldLabel>קישור לספק</FieldLabel>
          <input value={data.vendorLink || ""} onChange={e => onChange({ ...data, vendorLink: e.target.value })} placeholder="https://..." style={S.input} />
          <FieldLabel>הערות</FieldLabel>
          <input value={data.notes} onChange={e => onChange({ ...data, notes: e.target.value })} placeholder="הערות" style={S.input} />
          <FieldLabel>תמונה</FieldLabel>
          {data.photo && <img src={data.photo} alt="" style={{ width: "100%", borderRadius: 8, marginBottom: 8, maxHeight: 150, objectFit: "cover" }} />}
          <input type="file" accept="image/*" onChange={e => handlePhotoUpload(e, data, onChange)}
            style={{ ...S.input, padding: "6px 12px", cursor: "pointer" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
            <Button onClick={onSave} disabled={!data.name.trim()}>שמור</Button>
            <Button variant="secondary" onClick={onCancel}>ביטול</Button>
          </div>
        </Card>
      );
    }

    const GIFT_CAT_MAP = { 'ט"ו בשבט': "חג", 'פורים': "חג", 'פסח': "חג", 'ראש השנה': "חג", 'חנוכה': "חג", 'שבועות': "חג", 'סוף שנה': "מתנות", 'יום המורה': "מתנות", 'יום המשפחה': "פעילות" };

    function GiftsTab({ gifts, setGifts, onAddEvent }) {
      const [search,      setSearch]      = useState("");
      const [showAdd,     setShowAdd]     = useState(false);
      const [addForm,     setAddForm]     = useState(EMPTY_GIFT);
      const [editId,      setEditId]      = useState(null);
      const [editForm,    setEditForm]    = useState({});
      const [copyGiftId,  setCopyGiftId]  = useState(null);
      const [copyForm,    setCopyForm]    = useState({ ...EMPTY_EVENT });

      const filtered = search
        ? gifts.filter(g => g.name.includes(search) || g.tag.includes(search) || g.forWhom.includes(search) || (g.vendorName || "").includes(search))
        : gifts;

      const addGift    = () => { if (!addForm.name.trim()) return; setGifts([...gifts, { ...addForm, id: Date.now() }]); setAddForm(EMPTY_GIFT); setShowAdd(false); };
      const startEdit  = (g) => { setEditId(g.id); setEditForm({ ...g }); };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => { setGifts(gifts.map(g => g.id === editId ? { ...editForm, id: editId } : g)); setEditId(null); };
      const removeGift = (id) => { if (window.confirm("למחוק רעיון זה?")) setGifts(gifts.filter(g => g.id !== id)); };

      const startCopy = (gift) => {
        const cat = GIFT_CAT_MAP[gift.tag] || "פעילות";
        setCopyGiftId(gift.id);
        setCopyForm({ ...EMPTY_EVENT, name: gift.name, category: cat, notes: gift.notes || "", type: "expense" });
      };
      const saveCopy = () => {
        if (onAddEvent) onAddEvent({ ...copyForm, budget: Number(copyForm.budget) || 0, spent: Number(copyForm.spent) || 0 });
        setCopyGiftId(null);
      };

      return (
        <div>
          <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", marginBottom: 10, textAlign: "center" }}>
            ספרייה משותפת לכל התקציבים • {gifts.length} רעיונות
          </div>

          {/* Add gift — top, above search */}
          {showAdd ? (
            <GiftForm title="➕ רעיון חדש" data={addForm} onChange={setAddForm} onSave={addGift} onCancel={() => setShowAdd(false)} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, marginBottom: 12,
              border: "2px dashed var(--color-border)",
              background: "var(--color-primary-light)", color: "var(--color-primary)",
              fontWeight: 700, fontSize: "var(--text-sm)",
              cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}><Icon n="plus" s={14} c="var(--color-primary)" w={2.5} /> הוספת רעיון</button>
          )}

          <input placeholder="🔍 חפשי רעיון, ספק, תג..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ ...S.input, marginBottom: 12 }} />

          <div className="gift-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            {filtered.map(gift => (
              editId === gift.id ? null : (
                <div key={gift.id} style={{ background: "var(--color-surface)", borderRadius: 16, padding: 14, boxShadow: "0 2px 14px rgba(0,0,0,0.08)", border: "1px solid var(--color-border)", display: "flex", flexDirection: "column" }}>
                  {gift.photo
                    ? <img src={gift.photo} alt="" style={{ width: "100%", borderRadius: 10, marginBottom: 8, height: 90, objectFit: "cover" }} />
                    : <div style={{ fontSize: 30, marginBottom: 6 }}>{gift.icon}</div>
                  }
                  <div style={{ fontWeight: 700, fontSize: "var(--text-xs)", color: "var(--color-text-primary)", marginBottom: 4 }}>{gift.name}</div>
                  {gift.forWhom    && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginBottom: 2 }}>עבור: {gift.forWhom}</div>}
                  {gift.vendorName && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginBottom: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="store" s={11} c="var(--color-text-secondary)" w={1.8} />{gift.vendorName}</div>}
                  {gift.vendorPhone && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginBottom: 2, display:"flex", alignItems:"center", gap: 4 }}><Icon n="phone" s={11} c="var(--color-text-secondary)" w={1.8} />{gift.vendorPhone}</div>}
                  {gift.notes      && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginBottom: 4 }}>{gift.notes}</div>}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "auto", paddingTop: 6, marginBottom: 8 }}>
                    {gift.tag        && <span style={{ fontSize: "0.75rem", fontWeight: 700, background: "var(--color-primary-light)", color: "var(--color-primary-dark)", borderRadius: 8, padding: "2px 6px" }}>{gift.tag}</span>}
