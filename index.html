                    {gift.priceRange && <span style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: "var(--color-primary)" }}>{gift.priceRange}</span>}
                  </div>
                  {gift.vendorLink && (
                    <a href={gift.vendorLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: "0.8rem", color: "var(--color-primary)", marginBottom: 6, display: "block", wordBreak: "break-all" }}>🔗 קישור לספק</a>
                  )}
                  <div style={{ display: "flex", gap: 2, justifyContent: "flex-end", marginTop: 4 }}>
                    {onAddEvent && <IconBtn icon="chart"  color="var(--color-primary)"        onClick={() => startCopy(gift)}    title="הוסף לתקציב" />}
                    <IconBtn icon="pencil" color="var(--color-text-secondary)" onClick={() => startEdit(gift)}      title="ערוך" />
                    <IconBtn icon="trash"  color="var(--color-danger)"          onClick={() => removeGift(gift.id)} title="מחק"  />
                  </div>
                </div>
              )
            ))}
          </div>

          {/* Edit form (full width, below grid) */}
          {editId !== null && (
            <GiftForm title="✏️ עריכת רעיון" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
          )}

          {/* Copy-to-budget form */}
          {copyGiftId !== null && (
            <Card style={{ border: "2px solid var(--color-border)" }}>
              <div style={{ fontWeight: 700, marginBottom: 10, fontSize: "var(--text-sm)" }}>📊 הוספת לתקציב</div>
              <FieldLabel>שם הארוע</FieldLabel>
              <input value={copyForm.name} onChange={e => setCopyForm({ ...copyForm, name: e.target.value })} style={S.input} />
              <FieldLabel>קטגוריה</FieldLabel>
              <select value={copyForm.category} onChange={e => setCopyForm({ ...copyForm, category: e.target.value })} style={S.input}>
                {CAT_LIST.map(c => <option key={c}>{c}</option>)}
              </select>
              <FieldLabel>תאריך</FieldLabel>
              <input type="date" value={copyForm.date} onChange={e => setCopyForm({ ...copyForm, date: e.target.value })} style={S.input} />
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <FieldLabel>תקציב ₪</FieldLabel>
                  <input type="text" inputMode="numeric" value={copyForm.budget} onChange={e => setCopyForm({ ...copyForm, budget: e.target.value })} placeholder="0" style={S.input} />
                </div>
                <div style={{ flex: 1 }}>
                  <FieldLabel>שולם ₪</FieldLabel>
                  <input type="text" inputMode="numeric" value={copyForm.spent} onChange={e => setCopyForm({ ...copyForm, spent: e.target.value })} placeholder="0" style={S.input} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Button onClick={saveCopy} disabled={!copyForm.name.trim()}>הוספת לתקציב</Button>
                <Button variant="secondary" onClick={() => setCopyGiftId(null)}>ביטול</Button>
              </div>
            </Card>
          )}

        </div>
      );
    }

    // ─────────────────────────────────────────
    // CASH TAB — with edit
    // ─────────────────────────────────────────
    const EMPTY_CASH = { date: "", desc: "", amount: "", type: "income", paidBy: "", paidBySplit: [] };

    function CashForm({ data, onChange, onSave, onSaveAndNew, onCancel, title }) {
      const pasteAmt = (e) => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); onChange({ ...data, amount: t.replace(/[^\d.]/g, '') }); };
      return (
        <Card style={{ border: "2px solid var(--color-border)" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: "var(--text-sm)" }}>{title}</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            {["income", "expense"].map(t => (
              <button key={t} onClick={() => onChange({ ...data, type: t })} style={{
                flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
                cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: "var(--text-xs)",
                background: data.type === t ? (t === "income" ? "#dcfce7" : "#fee2e2") : "var(--color-background)",
                color:      data.type === t ? (t === "income" ? "#059669" : "var(--color-danger)") : "var(--color-text-secondary)",
              }}><span style={{ display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n={t === "income" ? "income" : "expense"} s={13} c={data.type === t ? (t === "income" ? "#059669" : "var(--color-danger)") : "var(--color-text-secondary)"} w={2} />{t === "income" ? "הכנסה" : "הוצאה"}</span></button>
            ))}
          </div>
          <FieldLabel>תיאור *</FieldLabel>
          <input value={data.desc} onChange={e => onChange({ ...data, desc: e.target.value })} placeholder="תיאור" style={S.input} autoFocus />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <FieldLabel>סכום ₪ *</FieldLabel>
              <input type="text" inputMode="numeric" value={data.amount}
                onChange={e => onChange({ ...data, amount: e.target.value.replace(/[^\d.]/g, '') })}
                onPaste={pasteAmt} placeholder="0" style={S.input} />
            </div>
            <div style={{ flex: 1 }}>
              <FieldLabel>תאריך</FieldLabel>
              <input value={data.date} onChange={e => onChange({ ...data, date: e.target.value })} placeholder="01.01.25" style={S.input} />
            </div>
          </div>
          <PaidBySplit
            total={data.amount}
            splits={data.paidBySplit || []}
            onChange={splits => onChange({ ...data, paidBySplit: splits })}
          />
          <div style={{ display: "flex", gap: 8 }}>
            <Button onClick={onSave} disabled={!data.desc.trim() || !data.amount}>שמור</Button>
            {onSaveAndNew && <Button variant="ghost" onClick={onSaveAndNew} disabled={!data.desc.trim() || !data.amount}>שמור + חדש</Button>}
            <Button variant="secondary" onClick={onCancel}>ביטול</Button>
          </div>
        </Card>
      );
    }

    function CashTab({ cashLog, setCashLog, students = [], events = [] }) {
      const [editId,   setEditId]   = useState(null);
      const [editForm, setEditForm] = useState({});
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const budgetExpenses        = events
        .filter(ev => (ev.type || "expense") === "expense" && ev.spent > 0)
        .map(ev => ({ id: "budget-exp-" + ev.id, desc: ev.name, amount: -ev.spent, date: ev.date, paidBy: ev.paidBy || "", paidBySplit: ev.paidBySplit || [], fromBudget: true, budgetType: "expense" }));
      const budgetIncomes         = events
        .filter(ev => ev.type === "income" && ev.spent > 0)
        .map(ev => ({ id: "budget-inc-" + ev.id, desc: ev.name, amount: ev.spent, date: ev.date, paidBy: ev.paidBy || "", paidBySplit: ev.paidBySplit || [], fromBudget: true, budgetType: "income" }));
      const budgetExpTotal        = budgetExpenses.reduce((s, e) => s + e.amount, 0);
      const budgetIncTotal        = budgetIncomes.reduce((s, e) => s + e.amount, 0);

      const cashBalance           = cashLog.reduce((s, c) => s + c.amount, 0);
      const totalIn               = cashLog.filter(c => c.amount > 0).reduce((s, c) => s + c.amount, 0);
      const totalOut              = cashLog.filter(c => c.amount < 0).reduce((s, c) => s + Math.abs(c.amount), 0) + Math.abs(budgetExpTotal);
      const collectedFromStudents = students.reduce((s, st) => s + (st.amount || 0), 0);
      const totalInKupa           = collectedFromStudents + cashBalance + budgetExpTotal + budgetIncTotal;

      // Breakdown by קופה: all amounts (positive + negative) — named collectors + unassigned pool
      const byKupa = {};
      let kupaTotal = 0;
      // Helper: allocate amount to named payer(s); comma-separated names split equally, remainder to קופת איסוף
      const allocateToKupa = (paidBy, amount) => {
        if (!paidBy || !paidBy.trim()) { kupaTotal += amount; return; }
        const names = paidBy.split(',').map(n => n.trim()).filter(Boolean);
        if (names.length === 1) {
          if (!byKupa[names[0]]) byKupa[names[0]] = 0;
          byKupa[names[0]] += amount;
        } else {
          const sign = amount >= 0 ? 1 : -1;
          const perName = Math.floor(Math.abs(amount) / names.length);
          names.forEach(name => {
            if (!byKupa[name]) byKupa[name] = 0;
            byKupa[name] += perName * sign;
          });
          kupaTotal += amount - (perName * names.length * sign);
        }
      };
      // Student payments
      students.forEach(s => {
        if ((s.amount || 0) === 0) return;
        if (s.paidBySplit && s.paidBySplit.length > 0) {
          let splitSum = 0;
          s.paidBySplit.forEach(sp => {
            if (sp.name) { if (!byKupa[sp.name]) byKupa[sp.name] = 0; byKupa[sp.name] += (sp.amount || 0); }
            splitSum += (sp.amount || 0);
          });
          const remainder = s.amount - splitSum;
          if (remainder > 0.001) kupaTotal += remainder;
        } else {
          allocateToKupa(s.paidBy, s.amount);
        }
      });
      // Manual cash log (positive and negative)
      cashLog.forEach(c => {
        if (c.paidBySplit && c.paidBySplit.length > 0) {
          const sign = c.amount >= 0 ? 1 : -1;
          let splitSum = 0;
          c.paidBySplit.forEach(s => {
            if (s.name) { if (!byKupa[s.name]) byKupa[s.name] = 0; byKupa[s.name] += sign * (s.amount || 0); }
            splitSum += (s.amount || 0);
          });
          const remainder = Math.abs(c.amount) - splitSum;
          if (remainder > 0.001) kupaTotal += sign * remainder;
        } else {
          allocateToKupa(c.paidBy, c.amount);
        }
      });
      // Budget expenses (always negative) — use actual per-kupa split amounts when available
      budgetExpenses.forEach(e => {
        if (e.paidBySplit && e.paidBySplit.length > 0) {
          let splitSum = 0;
          e.paidBySplit.forEach(s => {
            if (s.name) { if (!byKupa[s.name]) byKupa[s.name] = 0; byKupa[s.name] -= (s.amount || 0); }
            splitSum += (s.amount || 0);
          });
          const remainder = Math.abs(e.amount) - splitSum;
          if (remainder > 0.001) kupaTotal += e.amount < 0 ? -remainder : remainder;
        } else {
          allocateToKupa(e.paidBy, e.amount);
        }
      });
      // Budget incomes (always positive) — use actual per-kupa split amounts when available
      budgetIncomes.forEach(e => {
        if (e.paidBySplit && e.paidBySplit.length > 0) {
          let splitSum = 0;
          e.paidBySplit.forEach(s => {
            if (s.name) { if (!byKupa[s.name]) byKupa[s.name] = 0; byKupa[s.name] += (s.amount || 0); }
            splitSum += (s.amount || 0);
          });
          const remainder = e.amount - splitSum;
          if (remainder > 0.001) kupaTotal += remainder;
        } else {
          allocateToKupa(e.paidBy, e.amount);
        }
      });
      const kupaEntries = Object.entries(byKupa);

      const startEdit  = (e) => {
        const paidBySplit = (e.paidBySplit
          ? e.paidBySplit.map(s => ({ ...s, amount: Math.abs(s.amount) }))
          : (e.paidBy ? [{ name: e.paidBy, amount: Math.abs(e.amount) }] : [])).filter(s => s.name !== "קופת איסוף");
        setEditId(e.id); setEditForm({ ...e, amount: String(Math.abs(e.amount)), type: e.amount >= 0 ? "income" : "expense", paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        const amt = Number(editForm.amount) * (editForm.type === "expense" ? -1 : 1);
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setCashLog(cashLog.map(c => c.id === editId ? { ...editForm, id: editId, amount: amt, paidBy, paidBySplit: splits } : c));
        setEditId(null);
      };
      const removeEntry   = (id) => setConfirmDeleteId(id);
      const doRemoveEntry = () => { setCashLog(cashLog.filter(c => c.id !== confirmDeleteId)); setConfirmDeleteId(null); };

      // Returns paidBy string + "קופת איסוף" when there is a genuine remainder
      const displayPaidBy = (entry) => {
        const names = (entry.paidBy || "").split(',').map(n => n.trim()).filter(Boolean);
        if (entry.paidBySplit && entry.paidBySplit.length > 0) {
          // Explicit splits: remainder = unallocated portion → goes to קופת איסוף
          const splitTotal = entry.paidBySplit.reduce((s, sp) => s + (sp.amount || 0), 0);
          if (Math.abs(entry.amount) - splitTotal > 0.001) names.push("קופת איסוף");
        } else if (!entry.paidBy || !entry.paidBy.trim()) {
          // No payer at all: entire amount goes to קופת איסוף
          names.push("קופת איסוף");
        }
        // paidBy set but no paidBySplit → named payer(s) cover the full amount, no remainder
        return names.join(', ');
      };

      // running balance
      let running = 0;
      const withBal = cashLog.map(c => { running += c.amount; return { ...c, bal: running }; });

      return (
        <React.Fragment>
          <ConfirmDeleteModal
            isOpen={!!confirmDeleteId}
            itemName={(cashLog.find(c => c.id === confirmDeleteId) || {}).desc || ""}
            onConfirm={doRemoveEntry}
            onCancel={() => setConfirmDeleteId(null)}
          />
        <div>
          {/* סה"כ בקופה */}
          <div style={{
            background: "linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-text-primary) 100%)",
            borderRadius: 20, padding: 20, color: "white", marginBottom: 12,
          }}>
            <div className="cash-lbl" style={{ opacity: 0.65, fontSize: "var(--text-xs)", marginBottom: 2 }}>סה״כ בקופה</div>
            <div className="cash-total-val" style={{ fontSize: "var(--text-2xl)", fontWeight: 900, letterSpacing: -1 }}>
              {totalInKupa < 0 ? "-" : ""}₪{Math.abs(totalInKupa).toLocaleString('he-IL')}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 14 }}>
              <div>
                <div className="cash-sub-lbl" style={{ opacity: 0.55, fontSize: "0.75rem" }}>גבייה</div>
                <div className="cash-sub-val" style={{ fontWeight: 700, color: "#4ade80", fontSize: "var(--text-xs)" }}>₪{collectedFromStudents.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div className="cash-sub-lbl" style={{ opacity: 0.55, fontSize: "0.75rem" }}>הכנסות בפועל</div>
                <div className="cash-sub-val" style={{ fontWeight: 700, color: "#34d399", fontSize: "var(--text-xs)" }}>+₪{budgetIncTotal.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div className="cash-sub-lbl" style={{ opacity: 0.55, fontSize: "0.75rem" }}>הוצאות בפועל</div>
                <div className="cash-sub-val" style={{ fontWeight: 700, color: "#f87171", fontSize: "var(--text-xs)" }}>-₪{Math.abs(budgetExpTotal).toLocaleString('he-IL')}</div>
              </div>
            </div>
          </div>

          {/* Breakdown by קופה */}
          {(kupaEntries.length > 0 || kupaTotal !== 0) && (
            <Card style={{ background: "var(--color-primary-light)", border: "1px solid var(--color-border)", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, fontSize: "var(--text-xs)", color: "var(--color-text-primary)", marginBottom: 8 }}>💼 לפי קופה</div>
              {kupaEntries.map(([name, total]) => (
                <div key={name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid var(--color-border)" }}>
                  <span style={{ fontSize: "var(--text-xs)", fontWeight: 600, color: "var(--color-text-primary)" }}>👤 {name}</span>
                  <span style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: total >= 0 ? "var(--color-secondary)" : "var(--color-danger)" }}>{total >= 0 ? "+" : ""}₪{total.toLocaleString('he-IL')}</span>
                </div>
              ))}
              {kupaTotal !== 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid var(--color-border)" }}>
                  <span style={{ fontSize: "var(--text-xs)", fontWeight: 600, color: "var(--color-text-primary)" }}>🏦 קופת איסוף</span>
                  <span style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: kupaTotal >= 0 ? "var(--color-secondary)" : "var(--color-danger)" }}>{kupaTotal >= 0 ? "+" : ""}₪{kupaTotal.toLocaleString('he-IL')}</span>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0 2px" }}>
                <span style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: "var(--color-text-secondary)" }}>סה״כ</span>
                <span style={{ fontSize: "var(--text-xs)", fontWeight: 900, color: totalInKupa >= 0 ? "var(--color-secondary)" : "var(--color-danger)" }}>{totalInKupa >= 0 ? "+" : ""}₪{totalInKupa.toLocaleString('he-IL')}</span>
              </div>
            </Card>
          )}

          <h3 style={{ fontWeight: 800, fontSize: "var(--text-base)", color: "var(--color-text-primary)", marginBottom: 10 }}>יומן תנועות</h3>

          {/* Budget-derived entries — read-only */}
          {(budgetExpenses.length > 0 || budgetIncomes.length > 0) && (
            <>
              {budgetIncomes.length > 0 && (
                <>
                  <div style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: "var(--color-secondary)", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ display:"inline-flex", alignItems:"center", gap: 5 }}><Icon n="income" s={13} c="var(--color-secondary)" w={2} /> הכנסות מתקציב</span>
                    <span style={{ fontSize: "0.75rem", color: "var(--color-text-secondary)", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetIncomes.map(entry => (
                    <div key={entry.id} style={{
                      background: "var(--color-primary-light)", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", borderRight: "4px solid var(--color-secondary)",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: "var(--text-xs)", color: "var(--color-text-primary)" }}>{entry.desc}</div>
                          <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginTop: 2 }}>
                            {formatDate(entry.date)}{displayPaidBy(entry) && ` • ${displayPaidBy(entry)}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "var(--color-border)", color: "var(--color-primary-dark)", borderRadius: 6, padding: "2px 7px", fontSize: "0.75rem", fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: "var(--text-sm)", color: "var(--color-secondary)" }}>+₪{entry.amount.toLocaleString('he-IL')}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {budgetExpenses.length > 0 && (
                <>
                  <div style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: "var(--color-primary)", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                    📊 הוצאות מתקציב
                    <span style={{ fontSize: "0.75rem", color: "var(--color-text-secondary)", fontWeight: 400 }}>עריכה רק מלשונית תקציב</span>
                  </div>
                  {budgetExpenses.map(entry => (
                    <div key={entry.id} style={{
                      background: "var(--color-surface)", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                      boxShadow: "0 1px 6px rgba(0,0,0,0.05)", border: "1px solid var(--color-border)", borderRight: "4px solid var(--color-primary)",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: "var(--text-xs)", color: "var(--color-text-primary)" }}>{entry.desc}</div>
                          <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginTop: 2 }}>
                            {formatDate(entry.date)}{displayPaidBy(entry) && ` • ${displayPaidBy(entry)}`}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ background: "var(--color-primary-light)", color: "var(--color-primary-dark)", borderRadius: 6, padding: "2px 7px", fontSize: "0.75rem", fontWeight: 700 }}>📊 תקציב</span>
                          <div style={{ fontWeight: 800, fontSize: "var(--text-sm)", color: "var(--color-danger)" }}>-₪{Math.abs(entry.amount).toLocaleString('he-IL')}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
              {withBal.length > 0 && (
                <div style={{ fontSize: "var(--text-xs)", fontWeight: 700, color: "var(--color-text-secondary)", marginBottom: 6, marginTop: 12 }}>📝 תנועות ידניות</div>
              )}
            </>
          )}

          {[...withBal].reverse().map(entry => (
            editId === entry.id ? (
              <CashForm key={entry.id} title="עריכת תנועה" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <div key={entry.id} style={{
                background: "var(--color-surface)", borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: "1px solid var(--color-border)",
                borderRight: `4px solid ${entry.amount > 0 ? "var(--color-secondary)" : "var(--color-danger)"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: "var(--text-xs)", color: "var(--color-text-primary)" }}>{entry.desc}</div>
                    <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginTop: 2 }}>
                      {entry.date}
                    </div>
                    {displayPaidBy(entry) && <div style={{ fontSize: "0.8rem", color: "var(--color-text-secondary)", marginTop: 2 }}>👤 {displayPaidBy(entry)}</div>}
                  </div>
                  <div style={{ textAlign: "left", flexShrink: 0 }}>
                    <div style={{ fontWeight: 800, fontSize: "var(--text-sm)", color: entry.amount > 0 ? "var(--color-secondary)" : "var(--color-danger)" }}>
                      {entry.amount > 0 ? "+" : ""}₪{Math.abs(entry.amount).toLocaleString('he-IL')}
                    </div>
                    <div style={{ fontSize: "0.75rem", color: "var(--color-text-secondary)" }}>יתרה ₪{entry.bal.toLocaleString('he-IL')}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2, marginTop: 8 }}>
                  <IconBtn icon="pencil" color="var(--color-text-secondary)" onClick={() => startEdit(entry)}       title="ערוך" />
                  <IconBtn icon="trash"  color="var(--color-danger)"          onClick={() => removeEntry(entry.id)} title="מחק"  />
                </div>
              </div>
            )
          ))}

          <div style={{ marginTop: 8, padding: "12px 16px", borderRadius: 12, background: "var(--color-primary-light)", border: "1px solid var(--color-border)", fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", textAlign: "center" }}>
            תנועות נוצרות אוטומטית מלשונית <strong style={{ color: "var(--color-primary)" }}>תקציב</strong>
          </div>
        </div>
        </React.Fragment>
      );
    }

    // ─────────────────────────────────────────
    // BUDGET SCREEN — 4-tab layout for a single budget
    // ─────────────────────────────────────────
    function BudgetScreen({ budget, onUpdate, onBack, activeTab, setActiveTab, gifts, setGifts }) {
      const clr = BUDGET_COLORS[budget.colorKey] || BUDGET_COLORS.teal;

      const setStudents          = (students)  => onUpdate({ students });
      const setEvents            = (events)    => onUpdate({ events });
      const setCashLog           = (cashLog)   => onUpdate({ cashLog });
      const setFeePerStudent     = (val)       => onUpdate({ feePerStudent: val });
      const setExpectedStudents  = (val)       => onUpdate({ expectedStudents: val });
      const setPayboxLink        = (val)       => onUpdate({ payboxLink: val });
      const setClassWhatsappLink = (val)       => onUpdate({ classWhatsappLink: val });

      const paidCount             = budget.students.filter(s => s.paid).length;
      const totalBudget           = budget.events.reduce((s, e) => s + e.budget, 0);
      const totalSpent            = budget.events.reduce((s, e) => s + e.spent, 0);
      const cashLogBalance        = budget.cashLog.reduce((s, c) => s + c.amount, 0);
      const collectedFromStudents = budget.students.reduce((s, st) => s + (st.amount || 0), 0);
      const budgetExpensesTotal   = budget.events.filter(ev => (ev.type || "expense") === "expense" && ev.spent > 0).reduce((s, ev) => s + ev.spent, 0);
      const budgetIncomesTotal    = budget.events.filter(ev => ev.type === "income" && ev.spent > 0).reduce((s, ev) => s + ev.spent, 0);
      const totalInKupa           = collectedFromStudents + cashLogBalance - budgetExpensesTotal + budgetIncomesTotal;

      return (
        <div className="bs-screen" style={{ minHeight: "100vh", maxWidth: 480, margin: "0 auto", background: "var(--color-background)", fontFamily: "inherit", direction: "rtl" }}>
          {/* ── Header ── */}
          <div style={{
            background: `linear-gradient(135deg, ${clr.from} 0%, ${clr.to} 100%)`,
            padding: "16px 16px 58px", position: "relative", overflow: "hidden",
          }}>
            <div style={{ position: "absolute", top: -40, left: -20, width: 150, height: 150, borderRadius: "50%", background: "rgba(255,255,255,0.07)", pointerEvents: "none" }} />
            <button onClick={onBack} style={{
              background: "rgba(255,255,255,0.18)", border: "1.5px solid rgba(255,255,255,0.3)",
              borderRadius: 10, padding: "7px 14px", color: "white", cursor: "pointer",
              fontFamily: "inherit", fontSize: "var(--text-xs)", fontWeight: 600,
              marginBottom: 12, display: "inline-flex", alignItems: "center", gap: 6,
              transition: "opacity 150ms",
            }}>
              <Icon n="arrowleft" s={14} c="white" w={2} /> התקציבים שלי
            </button>
            <div style={{ color: "white", fontWeight: 800, fontSize: "var(--text-xl)", marginBottom: 2 }}>{budget.name}</div>
            <div style={{ color: "rgba(255,255,255,0.75)", fontSize: "var(--text-xs)" }}>
              {budget.className} • {budget.year}
              {" · "}
              {activeTab === "budget"  ? "ניהול תקציב" :
               activeTab === "collect" ? "גבייה מתלמידים" :
               activeTab === "gifts"   ? "ספריית רעיונות" :
                                         "יומן קופה"}
            </div>
          </div>

          {/* ── Floating stat cards ── */}
          <div style={{ display: "flex", gap: 8, padding: "0 14px", marginTop: -40, position: "relative", zIndex: 10, paddingBottom: 4 }}>
            {[
              { icon: "chart",   l: "תקציב", v: `₪${totalBudget.toLocaleString('he-IL')}`, c: clr.from },
              { icon: "expense", l: "שולם",  v: `₪${totalSpent.toLocaleString('he-IL')}`,  c: "var(--color-danger)" },
              { icon: "users",   l: "שילמו", v: budget.students.length > 0 ? `${paidCount}/${budget.students.length}` : "—", c: "var(--color-secondary)" },
              { icon: "wallet",  l: "מזומן", v: `₪${totalInKupa.toLocaleString('he-IL')}`,  c: clr.to },
            ].map(s => (
              <div key={s.l} style={{
                background: "var(--color-surface)", borderRadius: 16, padding: "12px 6px", flex: 1, minWidth: 0,
                boxShadow: "0 4px 18px rgba(26,46,42,0.12)", textAlign: "center",
              }}>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
                  <Icon n={s.icon} s={20} c={s.c} w={2} />
                </div>
                <div style={{ fontWeight: 700, fontSize: "var(--text-xs)", color: s.c, lineHeight: 1.2 }}>{s.v}</div>
                <div style={{ fontSize: "0.7rem", color: "var(--color-text-secondary)", marginTop: 2 }}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* ── Tab content ── */}
          <div className="bs-tab-pad" style={{ padding: "14px 14px 96px" }}>
            {activeTab === "budget"  && <BudgetTab  events={budget.events} setEvents={setEvents} collectionBudget={(budget.expectedStudents || 0) * (budget.feePerStudent || 0)} expectedStudents={budget.expectedStudents || 0} year={budget.year || ""} />}
            {activeTab === "collect" && <CollectTab students={budget.students} setStudents={setStudents} feePerStudent={budget.feePerStudent || 500} setFeePerStudent={setFeePerStudent} expectedStudents={budget.expectedStudents || 0} setExpectedStudents={setExpectedStudents} payboxLink={budget.payboxLink || ""} setPayboxLink={setPayboxLink} classWhatsappLink={budget.classWhatsappLink || ""} setClassWhatsappLink={setClassWhatsappLink} />}
            {activeTab === "gifts"   && <GiftsTab   gifts={gifts} setGifts={setGifts} onAddEvent={(ev) => setEvents([...budget.events, { id: Date.now(), ...ev }])} />}
            {activeTab === "cash"    && <CashTab     cashLog={budget.cashLog}   setCashLog={setCashLog} students={budget.students} events={budget.events} />}
          </div>

          <BottomNav tabs={BUDGET_TABS} activeTab={activeTab} setActiveTab={setActiveTab} />
        </div>
      );
    }

    // ─────────────────────────────────────────
    // AUTH SCREEN — Sign in / Sign up
    // ─────────────────────────────────────────
    function AuthScreen() {
      const [mode, setMode]           = useState("signin");
      const [email, setEmail]         = useState("");
      const [password, setPassword]   = useState("");
      const [displayName, setDisplayName] = useState("");
      const [error, setError]         = useState("");
      const [loading, setLoading]     = useState(false);

      const signInWithGoogle = async () => {
        setLoading(true); setError("");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await firebase.auth().signInWithPopup(provider);
        } catch (e) {
          console.error("Google sign-in error:", e.code, e.message);
          setError(`שגיאה בהתחברות עם Google — נסי שוב (${e.code})`);
        }
        setLoading(false);
      };

      const handleEmailAuth = async () => {
        if (!email.trim() || !password) return;
        setLoading(true); setError("");
        try {
          if (mode === "signup") {
            const cred = await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
            if (displayName.trim()) await cred.user.updateProfile({ displayName: displayName.trim() });
          } else {
            await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
          }
        } catch (e) {
          const msgs = {
            "auth/user-not-found":      "משתמש לא נמצא",
            "auth/wrong-password":      "סיסמא שגויה",
            "auth/email-already-in-use":"האימייל כבר בשימוש",
            "auth/weak-password":       "הסיסמא קצרה מדי (לפחות 6 תווים)",
            "auth/invalid-email":       "כתובת אימייל לא תקינה",
          };
          setError(msgs[e.code] || "שגיאה — נסי שוב");
        }
        setLoading(false);
      };

      const switchMode = (m) => { setMode(m); setError(""); };

      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "var(--color-background)", padding: 24, fontFamily: "inherit", direction: "rtl" }}>
          <div style={{ width: "100%", maxWidth: 380 }}>
            {/* Logo */}
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ marginBottom: 14, display: "inline-block" }}>
                <KupatiLogo size={72} />
              </div>
              <div style={{ fontWeight: 700, fontSize: "var(--text-2xl)", color: "var(--color-text-primary)" }}>Kupati</div>
              <div style={{ color: "var(--color-text-secondary)", fontSize: "var(--text-xs)", marginTop: 4 }}>מנהל תקציבים שיתופי לועד הורים</div>
            </div>

            {/* Card */}
            <div style={{ background: "var(--color-surface)", borderRadius: 20, padding: 24, boxShadow: "0 4px 28px rgba(26,46,42,0.1)" }}>
              {/* Mode toggle */}
              <div style={{ display: "flex", gap: 6, marginBottom: 20, background: "var(--color-primary-light)", borderRadius: 12, padding: 4 }}>
                {["signin", "signup"].map(m => (
                  <button key={m} onClick={() => switchMode(m)} style={{
                    flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
                    background: mode === m ? "var(--color-surface)" : "transparent",
                    color: mode === m ? "var(--color-primary)" : "var(--color-text-secondary)",
                    fontWeight: mode === m ? 700 : 500,
                    fontSize: "var(--text-xs)", cursor: "pointer", fontFamily: "inherit",
                    boxShadow: mode === m ? "0 1px 6px rgba(0,0,0,0.08)" : "none",
                    transition: "all 150ms",
                  }}>
                    {m === "signin" ? "התחברות" : "הרשמה"}
                  </button>
                ))}
              </div>

              {mode === "signup" && (
                <>
                  <FieldLabel>שם מלא</FieldLabel>
                  <input value={displayName} onChange={e => setDisplayName(e.target.value)} placeholder="שם מלא" style={S.input} />
                </>
              )}

              <FieldLabel>אימייל</FieldLabel>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" style={{ ...S.input, direction: "ltr", textAlign: "right" }} />

              <FieldLabel>סיסמא</FieldLabel>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="לפחות 6 תווים" style={S.input} onKeyDown={e => e.key === "Enter" && handleEmailAuth()} />

              {error && <div style={{ color: "var(--color-danger)", fontSize: "var(--text-xs)", marginBottom: 10, textAlign: "center" }}>{error}</div>}

              <Button
                variant="primary"
                onClick={handleEmailAuth}
                disabled={!email.trim() || !password}
                loading={loading}
                style={{ width: "100%", marginBottom: 16 }}
              >
                {mode === "signup" ? "הירשמי" : "כניסה"}
              </Button>

              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <div style={{ flex: 1, height: 1, background: "var(--color-border)" }} />
                <span style={{ color: "var(--color-text-secondary)", fontSize: "var(--text-xs)" }}>או</span>
                <div style={{ flex: 1, height: 1, background: "var(--color-border)" }} />
              </div>

              <button onClick={signInWithGoogle} disabled={loading} style={{
                width: "100%", padding: "12px 0", borderRadius: 12,
                border: "1.5px solid var(--color-border)",
                background: "var(--color-surface)", color: "var(--color-text-primary)",
                fontWeight: 600, fontSize: "var(--text-xs)", cursor: "pointer",
                fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                transition: "opacity 150ms",
              }}>
                <span style={{ fontWeight: 900, fontSize: "var(--text-base)", color: "#4285f4" }}>G</span>
                כניסה עם Google
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // CLASS SCREEN — Select / Create / Join group
    // ─────────────────────────────────────────
    const GROUPS_HELP_CONTENT = `כאן תוכל לנהל את הקבוצות שלך.

כל קבוצה מייצגת ועד, כיתה, או כל קבוצה אחרת שאתה מנהל עבורה תקציב.

כדי להוסיף חברים לקבוצה:
• לחץ על הקבוצה
• שלח את קוד ההצטרפות לחברים
• הם יוכלו להצטרף עם הקוד

ניתן ליצור קבוצות חדשות או להצטרף לקיימות עם קוד.`;

    // ── Member avatar — colored circle with initials ──
    const AVATAR_COLORS = ["var(--color-primary)","var(--color-secondary)","var(--color-warning)","var(--color-danger)","#8b5cf6","#0ea5e9","#f43f5e","#14b8a6"];
    function MemberAvatar({ name, size = 34 }) {
      const initials = (name || "?").split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase() || "?";
      const colorIdx = (name || "").charCodeAt(0) % AVATAR_COLORS.length;
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          background: AVATAR_COLORS[colorIdx], color: "white",
          fontWeight: 700, fontSize: size * 0.36,
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0, border: "2px solid var(--color-surface)",
        }}>{initials}</div>
      );
    }

    function ClassScreen({ user, onSelectClass }) {
      const [mode, setMode]             = useState("list"); // list | create | join
      const [classes, setClasses]       = useState([]);
      const [loading, setLoading]       = useState(true);
      const [createName, setCreateName] = useState("");
      const [joinCode, setJoinCode]     = useState("");
      const [error, setError]           = useState("");
      const [saving, setSaving]         = useState(false);
      const [showHelp, setShowHelp]     = useState(false);
      const [editingClassId, setEditingClassId] = useState(null);
      const [editingName, setEditingName]       = useState("");
      const [confirmDeleteCls, setConfirmDeleteCls] = useState(null);
      const [expandedMembersId, setExpandedMembersId] = useState(null);
      const [confirmLeaveId, setConfirmLeaveId] = useState(null);
      const [toast, setToast]           = useState("");

      useEffect(() => {
        const unsub = firebase.firestore()
          .collection("classes")
          .where("members", "array-contains", user.uid)
          .onSnapshot(snap => {
            setClasses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            setLoading(false);
          }, () => setLoading(false));
        return unsub;
      }, [user.uid]);

      const createClass = async () => {
        if (!createName.trim()) return;
        setSaving(true); setError("");
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        try {
          const ref = await firebase.firestore().collection("classes").add({
            name: createName.trim(),
            inviteCode: code,
            createdBy: user.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            members: [user.uid],
            memberDetails: [{ uid: user.uid, displayName: user.displayName || user.email, role: "admin" }],
          });
          onSelectClass({ id: ref.id, name: createName.trim(), inviteCode: code, members: [user.uid] });
        } catch (e) {
          setError("שגיאה ביצירת הקבוצה — נסה שוב");
        }
        setSaving(false);
      };

      const joinClass = async () => {
        if (!joinCode.trim()) return;
        setSaving(true); setError("");
        try {
          const snap = await firebase.firestore()
            .collection("classes")
            .where("inviteCode", "==", joinCode.trim().toUpperCase())
            .get();
          if (snap.empty) { setError("קוד לא נמצא — בדוק שוב"); setSaving(false); return; }
          const doc = snap.docs[0];
          const classData = { id: doc.id, ...doc.data() };
          if (!classData.members.includes(user.uid)) {
            await doc.ref.update({
              members: firebase.firestore.FieldValue.arrayUnion(user.uid),
              memberDetails: firebase.firestore.FieldValue.arrayUnion({ uid: user.uid, displayName: user.displayName || user.email, role: "member" }),
            });
          }
          onSelectClass(classData);
        } catch (e) {
          setError("שגיאה בהצטרפות — נסה שוב");
        }
        setSaving(false);
      };

      const cancelSubMode = () => { setMode("list"); setError(""); setCreateName(""); setJoinCode(""); };

      const copyCode = (code, e) => {
        e.stopPropagation();
        copyToClipboard(code, () => { setToast("הקוד הועתק!"); setTimeout(() => setToast(""), 2000); });
      };

      const startEdit = (cls, e) => {
        e.stopPropagation();
        setEditingClassId(cls.id);
        setEditingName(cls.name);
      };

      const saveEdit = async (clsId, e) => {
        e.stopPropagation();
        if (!editingName.trim()) return;
        try {
          await firebase.firestore().collection("classes").doc(clsId).update({ name: editingName.trim() });
        } catch (_) {}
        setEditingClassId(null);
      };

      const cancelEdit = (e) => { e.stopPropagation(); setEditingClassId(null); };

      const doDeleteClass = async () => {
        if (!confirmDeleteCls) return;
        try {
          await firebase.firestore().collection("classes").doc(confirmDeleteCls.id).delete();
        } catch (_) {}
        setConfirmDeleteCls(null);
      };

      const leaveGroup = async (cls) => {
        try {
          const details = (cls.memberDetails || []).filter(m => m.uid !== user.uid);
          const members = (cls.members || []).filter(id => id !== user.uid);
          await firebase.firestore().collection("classes").doc(cls.id).update({ members, memberDetails: details });
          setConfirmLeaveId(null);
          setToast("עזבת את הקבוצה");
          setTimeout(() => setToast(""), 2000);
        } catch (_) {
          setToast("שגיאה — נסה שוב");
          setTimeout(() => setToast(""), 2000);
        }
      };

      return (
        <div style={{ minHeight: "100vh", background: "var(--color-background)", fontFamily: "inherit", direction: "rtl" }}>
          <Toast message={toast} />
          <HelpModal isOpen={showHelp} onClose={() => setShowHelp(false)} title="הקבוצות שלי" content={GROUPS_HELP_CONTENT} closeLabel="הבנתי" />
          <ConfirmDeleteModal isOpen={!!confirmDeleteCls} itemName={confirmDeleteCls?.name || ""} onConfirm={doDeleteClass} onCancel={() => setConfirmDeleteCls(null)} />
          {/* Leave confirm */}
          <ConfirmDeleteModal isOpen={!!confirmLeaveId} itemName={`לעזוב את "${confirmLeaveId?.name || ""}"`} onConfirm={() => leaveGroup(confirmLeaveId)} onCancel={() => setConfirmLeaveId(null)} />

          {/* ── Header ── */}
          <div style={{ background: "linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%)", padding: "28px 20px 32px", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -40, left: -20, width: 160, height: 160, borderRadius: "50%", background: "rgba(255,255,255,0.06)", pointerEvents: "none" }} />
            <div style={{ position: "absolute", bottom: -30, right: 10, width: 110, height: 110, borderRadius: "50%", background: "rgba(255,255,255,0.05)", pointerEvents: "none" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: "rgba(255,255,255,0.7)", fontSize: "var(--text-xs)", fontWeight: 500, marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                  <MemberAvatar name={user.displayName || user.email} size={26} />
                  שלום, {user.displayName || user.email?.split("@")[0]} 👋
                </div>
                <div style={{ color: "white", fontWeight: 800, fontSize: "var(--text-2xl)", lineHeight: 1.1 }}>הקבוצות שלי</div>
                <div style={{ color: "rgba(255,255,255,0.65)", fontSize: "var(--text-xs)", marginTop: 6, maxWidth: 260, lineHeight: 1.5 }}>
                  כאן תפתח קבוצה לכל קבוצת אנשים שברצונך לשתף בניהול התקציבים
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
                <button onClick={() => firebase.auth().signOut()} style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 10, padding: "8px 14px", color: "white", cursor: "pointer", fontSize: "var(--text-xs)", fontFamily: "inherit", fontWeight: 600 }}>יציאה</button>
                <button onClick={() => setShowHelp(true)} style={{ background: "rgba(255,255,255,0.1)", border: "1.5px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "6px 12px", color: "rgba(255,255,255,0.8)", cursor: "pointer", fontSize: "0.75rem", fontFamily: "inherit" }}>הסברים</button>
              </div>
            </div>
          </div>

          {/* ── Content ── */}
          <div style={{ padding: "20px 16px 40px", maxWidth: 960, margin: "0 auto" }}>

            {loading ? (
              <div style={{ textAlign: "center", padding: 40, color: "var(--color-text-secondary)" }}>טוען...</div>
            ) : (
              <>
                {/* Add group buttons — top */}
                {mode === "list" && (
                  <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                    <button onClick={() => setMode("create")} style={{
                      flex: 1, padding: "13px 0", borderRadius: 14,
                      border: "2px dashed var(--color-border)",
                      background: "var(--color-primary-light)", color: "var(--color-primary)",
                      fontWeight: 700, fontSize: "var(--text-xs)", cursor: "pointer",
                      fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                    }}><Icon n="plus" s={14} c="var(--color-primary)" w={2.5} /> קבוצה חדשה</button>
                    <button onClick={() => setMode("join")} style={{
                      flex: 1, padding: "13px 0", borderRadius: 14,
                      border: "2px solid var(--color-border)",
                      background: "var(--color-surface)", color: "var(--color-text-secondary)",
                      fontWeight: 700, fontSize: "var(--text-xs)", cursor: "pointer",
                      fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                    }}><Icon n="link" s={14} c="var(--color-text-secondary)" w={2} /> הצטרף עם קוד</button>
                  </div>
                )}

                {/* Create form */}
                {mode === "create" && (
                  <Card style={{ border: "2px solid var(--color-border)", marginBottom: 16 }}>
                    <div style={{ fontWeight: 700, fontSize: "var(--text-base)", marginBottom: 4 }}>➕ קבוצה חדשה</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", marginBottom: 12 }}>פתח קבוצה לקבוצת אנשים שיחלקו גישה לתקציבים</div>
                    <FieldLabel>שם הקבוצה</FieldLabel>
                    <input value={createName} onChange={e => setCreateName(e.target.value)} placeholder="למשל: ועד הורים כיתה ו׳" style={S.input} autoFocus onKeyDown={e => e.key === "Enter" && createClass()} />
                    {error && <div style={{ color: "var(--color-danger)", fontSize: "var(--text-xs)", marginBottom: 8 }}>{error}</div>}
                    <div style={{ display: "flex", gap: 8 }}>
                      <Button onClick={createClass} disabled={saving || !createName.trim()} loading={saving} style={{ flex: 1 }}>צור קבוצה</Button>
                      <Button variant="secondary" onClick={cancelSubMode} style={{ flex: 1 }}>ביטול</Button>
                    </div>
                  </Card>
                )}

                {/* Join form */}
                {mode === "join" && (
                  <Card style={{ border: "2px solid var(--color-border)", marginBottom: 16 }}>
                    <div style={{ fontWeight: 700, fontSize: "var(--text-base)", marginBottom: 4 }}>🔗 הצטרפות לקבוצה</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", marginBottom: 12 }}>קבל קוד מחבר וצטרף לקבוצה קיימת</div>
                    <FieldLabel>קוד הצטרפות (6 תווים)</FieldLabel>
                    <input value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="ABC123" style={{ ...S.input, letterSpacing: 3, textAlign: "center", textTransform: "uppercase" }} autoFocus onKeyDown={e => e.key === "Enter" && joinClass()} />
                    {error && <div style={{ color: "var(--color-danger)", fontSize: "var(--text-xs)", marginBottom: 8 }}>{error}</div>}
                    <div style={{ display: "flex", gap: 8 }}>
                      <Button onClick={joinClass} disabled={saving || !joinCode.trim()} loading={saving} style={{ flex: 1 }}>הצטרף</Button>
                      <Button variant="secondary" onClick={cancelSubMode} style={{ flex: 1 }}>ביטול</Button>
                    </div>
                  </Card>
                )}

                {/* Group cards */}
                {classes.map(cls => {
                  const members   = cls.memberDetails || [];
                  const isAdmin   = cls.createdBy === user.uid;
                  // Sort: admin first, then rest in join order
                  const sorted    = [...members].sort((a, b) => (a.uid === cls.createdBy ? -1 : b.uid === cls.createdBy ? 1 : 0));
                  const expanded  = expandedMembersId === cls.id;
                  const visibleMembers = expanded ? sorted : sorted.slice(0, 3);
                  const extraCount = sorted.length - 3;

                  return editingClassId === cls.id ? (
                    <div key={cls.id} style={{ background: "var(--color-surface)", borderRadius: 18, padding: "18px 20px", marginBottom: 14, boxShadow: "0 2px 12px rgba(0,0,0,0.07)", border: "2px solid var(--color-warning)" }}>
                      <div style={{ fontWeight: 600, fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", marginBottom: 8 }}>✏️ עריכת שם קבוצה</div>
                      <input value={editingName} onChange={e => setEditingName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") saveEdit(cls.id, e); if (e.key === "Escape") cancelEdit(e); }} style={{ ...S.input, marginBottom: 10 }} autoFocus />
                      <div style={{ display: "flex", gap: 8 }}>
                        <Button onClick={e => saveEdit(cls.id, e)} style={{ flex: 1 }}>שמור</Button>
                        <Button variant="secondary" onClick={cancelEdit} style={{ flex: 1 }}>ביטול</Button>
                      </div>
                    </div>
                  ) : (
                    <div key={cls.id} style={{ background: "var(--color-surface)", borderRadius: 18, marginBottom: 14, boxShadow: "0 3px 16px rgba(26,46,42,0.09)", border: "1px solid var(--color-border)", overflow: "hidden" }}>

                      {/* Card header — colored stripe */}
                      <div style={{ background: "linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%)", padding: "14px 18px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", flex: 1 }} onClick={() => onSelectClass(cls)}>
                          {/* Group icon */}
                          <div style={{ width: 42, height: 42, borderRadius: 12, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            <span style={{ fontSize: 22 }}>👥</span>
                          </div>
                          <div>
                            <div style={{ color: "white", fontWeight: 800, fontSize: "var(--text-base)", lineHeight: 1.2 }}>{cls.name}</div>
                            <div style={{ color: "rgba(255,255,255,0.7)", fontSize: "0.75rem", marginTop: 2 }}>
                              {sorted.length} {sorted.length === 1 ? "חבר" : "חברים"}{isAdmin ? " · מנהל" : " · חבר"}
                            </div>
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                          <button onClick={e => startEdit(cls, e)} title="שנה שם" style={{ background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", padding: 8, borderRadius: 8 }}>
                            <Icon n="pencil" s={15} c="white" w={1.8} />
                          </button>
                          {isAdmin ? (
                            <button onClick={e => { e.stopPropagation(); setConfirmDeleteCls(cls); }} title="מחק קבוצה" style={{ background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", padding: 8, borderRadius: 8 }}>
                              <Icon n="trash" s={15} c="white" w={1.8} />
                            </button>
                          ) : (
                            <button onClick={e => { e.stopPropagation(); setConfirmLeaveId(cls); }} title="עזוב קבוצה" style={{ background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", padding: 8, borderRadius: 8, color: "white", fontFamily: "inherit", fontSize: "0.75rem", fontWeight: 600 }}>
                              עזוב
                            </button>
                          )}
                          <button onClick={() => onSelectClass(cls)} style={{ background: "rgba(255,255,255,0.2)", border: "none", cursor: "pointer", padding: "8px 12px", borderRadius: 8, color: "white", fontFamily: "inherit", fontWeight: 700, fontSize: "var(--text-xs)", display: "flex", alignItems: "center", gap: 4 }}>
                            כנס <Icon n="arrow" s={14} c="white" w={2} />
                          </button>
                        </div>
                      </div>

                      {/* Card body */}
                      <div style={{ padding: "14px 18px" }}>

                        {/* Members section */}
                        <div style={{ marginBottom: 12 }}>
                          <div style={{ fontSize: "0.75rem", fontWeight: 700, color: "var(--color-text-secondary)", marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>
                            <Icon n="users" s={12} c="var(--color-text-secondary)" w={2} /> חברי הקבוצה
                          </div>
                          {/* Avatar row */}
                          <div style={{ display: "flex", alignItems: "center", gap: 0, marginBottom: 10 }}>
                            {sorted.slice(0, 5).map((m, i) => (
                              <div key={m.uid} style={{ marginRight: i > 0 ? -8 : 0, zIndex: 5 - i }}>
                                <MemberAvatar name={m.displayName} size={32} />
                              </div>
                            ))}
                            {sorted.length > 5 && (
                              <div style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--color-border)", border: "2px solid var(--color-surface)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem", fontWeight: 700, color: "var(--color-text-secondary)", marginRight: -8 }}>
                                +{sorted.length - 5}
                              </div>
                            )}
                          </div>
                          {/* Member list */}
                          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                            {visibleMembers.map(m => (
                              <div key={m.uid} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <MemberAvatar name={m.displayName} size={28} />
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <span style={{ fontSize: "var(--text-xs)", fontWeight: 600, color: "var(--color-text-primary)" }}>
                                    {m.displayName || m.uid}
                                    {m.uid === user.uid && <span style={{ fontSize: "0.7rem", color: "var(--color-text-secondary)", marginRight: 4 }}>(אני)</span>}
                                  </span>
                                </div>
                                <span style={{
                                  fontSize: "0.7rem", fontWeight: 700, padding: "2px 8px", borderRadius: 20,
                                  background: m.uid === cls.createdBy ? "var(--color-primary-light)" : "var(--color-background)",
                                  color: m.uid === cls.createdBy ? "var(--color-primary-dark)" : "var(--color-text-secondary)",
                                }}>
                                  {m.uid === cls.createdBy ? "👑 מנהל" : "👤 חבר"}
                                </span>
                              </div>
                            ))}
                          </div>
                          {sorted.length > 3 && (
                            <button onClick={() => setExpandedMembersId(expanded ? null : cls.id)} style={{ marginTop: 8, background: "none", border: "none", cursor: "pointer", color: "var(--color-primary)", fontSize: "0.75rem", fontWeight: 600, fontFamily: "inherit", padding: 0 }}>
                              {expanded ? "הצג פחות ▲" : `הצג את כל ${sorted.length} החברים ▼`}
                            </button>
                          )}
                        </div>

                        {/* Invite code row */}
                        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: "var(--color-primary-light)", borderRadius: 10 }}>
                          <Icon n="link" s={14} c="var(--color-primary)" w={2} />
                          <span style={{ fontSize: "0.75rem", color: "var(--color-text-secondary)", flex: 1 }}>קוד הצטרפות:</span>
                          <strong style={{ color: "var(--color-primary)", letterSpacing: 3, fontSize: "var(--text-sm)", fontFamily: "monospace" }}>{cls.inviteCode}</strong>
                          <button onClick={e => copyCode(cls.inviteCode, e)} style={{ background: "var(--color-primary)", border: "none", borderRadius: 8, padding: "5px 10px", cursor: "pointer", color: "white", fontSize: "0.75rem", fontWeight: 600, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4 }}>
                            <Icon n="copy" s={12} c="white" w={2} /> העתק
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}

                {/* Empty state */}
                {classes.length === 0 && mode === "list" && (
                  <div style={{ textAlign: "center", padding: "48px 0 24px" }}>
                    <div style={{ fontSize: 52, marginBottom: 14 }}>👥</div>
                    <div style={{ fontWeight: 700, fontSize: "var(--text-lg)", color: "var(--color-text-primary)", marginBottom: 8 }}>אין קבוצות עדיין</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "var(--color-text-secondary)", maxWidth: 240, margin: "0 auto", lineHeight: 1.6 }}>
                      פתח קבוצה חדשה לכל קבוצת אנשים שברצונך לשתף בניהול התקציבים
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    // APP — Root state & routing
    // ─────────────────────────────────────────
    function App() {
      const [user, setUser]                     = useState(undefined); // undefined = checking auth
      const [currentClass, setCurrentClass]     = useState(null);
      const [budgets, setBudgets]               = useState([]);
      const [gifts, setGifts]                   = useState([]);
      const [activeBudgetId, setActiveBudgetId] = useState(null);
      const [activeTab, setActiveTab]           = useState("budget");
      const [toast, setToast]                   = useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2000); };

      // Auth state listener
      useEffect(() => {
        return firebase.auth().onAuthStateChanged(u => setUser(u || null));
      }, []);

      // Firestore real-time listeners for class data
      useEffect(() => {
        if (!currentClass) { setBudgets([]); setGifts([]); return; }
        const classRef = firebase.firestore().collection("classes").doc(currentClass.id);
        const unsubBudgets = classRef.collection("budgets")
          .onSnapshot(snap => setBudgets(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubGifts = classRef.collection("gifts")
          .onSnapshot(snap => setGifts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        return () => { unsubBudgets(); unsubGifts(); };
      }, [currentClass?.id]);

      const classRef = () => firebase.firestore().collection("classes").doc(currentClass.id);

      const handleAddBudget = async (data) => {
        try {
          await classRef().collection("budgets").add(data);
        } catch (e) {
          showToast("שגיאה בשמירה — נסה שוב");
        }
      };

      const handleDeleteBudget = async (id) => {
        try {
          await classRef().collection("budgets").doc(String(id)).delete();
        } catch (e) {
          showToast("שגיאה במחיקה — נסה שוב");
        }
      };

      const handleUpdateBudget = useCallback(async (id, updates) => {
        try {
          await firebase.firestore().collection("classes").doc(currentClass?.id)
            .collection("budgets").doc(String(id)).update(updates);
        } catch (e) {
          showToast("שגיאה בעדכון — נסה שוב");
        }
      }, [currentClass?.id]);

      // Gifts: update only what changed — per-document add/edit/delete
      const handleSetGifts = useCallback(async (updater) => {
        const newGifts = typeof updater === "function" ? updater(gifts) : updater;
        const giftsRef = classRef().collection("gifts");
        const removedIds = gifts.filter(g => !newGifts.find(ng => ng.id === g.id)).map(g => g.id);
        const upserted   = newGifts.filter(ng => {
          const old = gifts.find(g => g.id === ng.id);
          return !old || JSON.stringify(old) !== JSON.stringify(ng);
        });
        try {
          await Promise.all([
            ...removedIds.map(id => giftsRef.doc(String(id)).delete()),
            ...upserted.map(g  => giftsRef.doc(String(g.id)).set({ ...g })),
          ]);
        } catch (e) {
          showToast("שגיאה בשמירת מתנות — נסה שוב");
        }
      }, [currentClass?.id, gifts]);

      // Loading
      if (user === undefined) {
        return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", fontFamily: "inherit", color: "var(--color-text-secondary)", fontSize: "var(--text-sm)" }}>טוען...</div>;
      }

      if (!user) return <AuthScreen />;

      if (!currentClass) return <ClassScreen user={user} onSelectClass={setCurrentClass} />;

      const activeBudget = budgets.find(b => b.id === activeBudgetId) || null;

      if (!activeBudget) {
        return (
          <React.Fragment>
            <Toast message={toast} />
            <HomeScreen
              budgets={budgets}
              currentClass={currentClass}
              user={user}
              onSignOut={() => firebase.auth().signOut()}
              onBack={() => { setCurrentClass(null); setActiveBudgetId(null); }}
              onAddBudget={handleAddBudget}
              onDeleteBudget={handleDeleteBudget}
              onUpdateBudgetMeta={(id, data) => classRef().collection("budgets").doc(String(id)).update(data)}
              onSelect={(id) => { setActiveBudgetId(id); setActiveTab("budget"); }}
            />
          </React.Fragment>
        );
      }

      return (
        <React.Fragment>
          <Toast message={toast} />
          <BudgetScreen
            budget={activeBudget}
            onUpdate={(updates) => handleUpdateBudget(activeBudgetId, updates)}
            onBack={() => setActiveBudgetId(null)}
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            gifts={gifts}
            setGifts={handleSetGifts}
          />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
