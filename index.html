    const { useState, useCallback, useEffect } = React;

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getDefaultYear() {
      const now = new Date();
      const m = now.getMonth() + 1;
      const y = now.getFullYear();
      const start = m >= 9 ? y : y - 1;
      const hebYears = { 2024: 'תשפ"ה', 2025: 'תשפ"ו', 2026: 'תשפ"ז', 2027: 'תשפ"ח', 2028: 'תשפ"ט' };
      return `${hebYears[start] || ''} ${start}–${start + 1}`.trim();
    }

    function formatDate(iso) {
      if (!iso) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) {
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
      }
      return iso;
    }

    function fmt(n) {
      return '₪' + (Number(n) || 0).toLocaleString('he-IL');
    }

    // ─────────────────────────────────────────
    // SHARED — clipboard utility
    // ─────────────────────────────────────────
    function copyToClipboard(text, onSuccess) {
      const fallback = () => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        onSuccess && onSuccess();
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => onSuccess && onSuccess()).catch(fallback);
      } else { fallback(); }
    }

    function Toast({ message }) {
      if (!message) return null;
      return (
        <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: "#0f172a", color: "white", borderRadius: 12, padding: "10px 22px", fontSize: 14, fontWeight: 600, zIndex: 999, boxShadow: "0 4px 20px rgba(0,0,0,0.25)", whiteSpace: "nowrap" }}>
          {message}
        </div>
      );
    }

    function generateReport(budget) {
      const events   = budget.events   || [];
      const students = budget.students || [];
      const expenses = events.filter(e => (e.type || 'expense') === 'expense');
      const incomes  = events.filter(e => e.type === 'income');
      const totalBudgetExp  = expenses.reduce((s, e) => s + e.budget, 0);
      const totalSpent      = expenses.reduce((s, e) => s + e.spent,  0);
      const totalBudgetInc  = incomes.reduce((s, e) => s + e.budget, 0);
      const collectionBudget = (budget.expectedStudents || 0) * (budget.feePerStudent || 0);
      const totalCollected   = students.reduce((s, st) => s + (st.amount || 0), 0);
      const paidCount        = students.filter(s => s.paid).length;

      const catMap = {};
      expenses.forEach(e => { catMap[e.category] = (catMap[e.category] || 0) + e.spent; });
      const maxCatVal = Math.max(...Object.values(catMap), 1);

      const catRows = Object.entries(catMap).map(([cat, val]) => `
        <tr><td>${escapeHtml(cat)}</td><td>₪${val.toLocaleString('he-IL')}</td>
        <td><div style="background:#e2e8f0;border-radius:4px;height:10px;width:160px">
        <div style="background:#0d9488;height:10px;border-radius:4px;width:${Math.round((val/maxCatVal)*100)}%"></div>
        </div></td></tr>`).join('');

      const eventRows = events.map(e => `
        <tr><td>${escapeHtml(e.name)}</td><td>${formatDate(e.date)}</td><td>${escapeHtml(e.category)}</td>
        <td>${(e.type||'expense')==='income' ? 'הכנסה' : 'הוצאה'}</td>
        <td>₪${e.budget.toLocaleString('he-IL')}</td><td>₪${e.spent.toLocaleString('he-IL')}</td>
        <td>${e.done ? '✅' : '⬜'}</td></tr>`).join('');

      const membersHtml = (budget.members||[]).length > 0
        ? `<p><strong>חברי הועד:</strong> ${(budget.members||[]).map(escapeHtml).join(', ')}</p>` : '';
      const groupsHtml = (budget.whatsappGroups||[]).length > 0
        ? `<p><strong>קבוצות וואצאפ:</strong> ${(budget.whatsappGroups||[]).map(g => escapeHtml(g.name)).join(', ')}</p>` : '';
      const collPct = students.length > 0 ? Math.round((paidCount / students.length) * 100) : 0;
      const spentPct = totalBudgetExp > 0 ? Math.round((totalSpent / totalBudgetExp) * 100) : 0;

      const html = `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<title>דו״ח — ${escapeHtml(budget.name)}</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">

</body></html>`;

    function BudgetForm({ initial = EMPTY_BUDGET_FORM, onSave, onCancel, title }) {
      const [form, setForm]           = useState({ ...EMPTY_BUDGET_FORM, ...initial });
      const [newMember, setNewMember] = useState("");
      const [newGName,  setNewGName]  = useState("");
      const [newGLink,  setNewGLink]  = useState("");
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const addMember = () => {
        if (!newMember.trim()) return;
        set("members", [...(form.members || []), newMember.trim()]);
        setNewMember("");
      };
      const removeMember = (i) => set("members", (form.members || []).filter((_, j) => j !== i));

      const saveGroup = () => {
        if (!newGName.trim()) return;
        set("whatsappGroups", [{ name: newGName.trim(), link: newGLink.trim() }]);
        setNewGName(""); setNewGLink("");
      };
      const removeGroup = () => set("whatsappGroups", []);

      return (

          <input placeholder="תשפ״ה / 2025-2026" value={form.year}
            onChange={e => set("year", e.target.value)} style={S.input} />

          <FieldLabel>תשלום פר ילד (₪)</FieldLabel>

              <button key={key} onClick={() => set("colorKey", key)} style={{
                width: 36, height: 36, borderRadius: "50%", border: form.colorKey === key ? "3px solid #0f172a" : "3px solid transparent",
                background: `linear-gradient(135deg, ${clr.from}, ${clr.to})`,

          <FieldLabel>חברי הועד</FieldLabel>

              <span style={{ flex: 1, fontSize: 13, display:"flex", alignItems:"center", gap: 5 }}><Icon n="user" s={13} c="#64748b" w={1.8} /> {m}</span>
              <button onClick={() => removeMember(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            <input value={newMember} onChange={e => setNewMember(e.target.value)}

          </div>

              <button onClick={() => set("whatsappGroups", (form.whatsappGroups || []).filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>
            </div>
          ))}
          <div style={{ marginBottom: 6 }}>

            <button onClick={() => { if (!newGName.trim()) return; set("whatsappGroups", [...(form.whatsappGroups || []), { name: newGName.trim(), link: newGLink.trim() }]); setNewGName(""); setNewGLink(""); }} style={{ ...S.btn("#059669"), width: "100%" }}>+ הוסף קבוצה</button>

    const BUDGET_HELP_CONTENT = `כאן תוכל לנהל את התקציב של הקבוצה שלך.

כל תקציב כולל:
• שם התקציב ושנת הפעילות

לחץ על התקציב כדי להיכנס ולנהל את רשימת המשתתפים.

שיתוף: שלח את קוד ההצטרפות לאחרים — הם יוכלו לצפות בלבד.`;

    function HomeScreen({ budgets, currentClass, user, onSignOut, onBack, onAddBudget, onDeleteBudget, onUpdateBudgetMeta, onSelect }) {

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2000); };

        await onAddBudget({
          name: form.name.trim(),
          className: form.className.trim(),
          year: form.year.trim(),
          colorKey: form.colorKey,
          feePerStudent: Number(form.feePerStudent) || 500,
          expectedStudents: 0,
          students: [], events: [], cashLog: [],
          members: form.members || [],
          whatsappGroups: form.whatsappGroups || [],
          payboxLink: "",
          classWhatsappLink: "",
        });
        setMode("list");
      };

      const handleSave = async (form) => {
        await onUpdateBudgetMeta(editingId, {
          name: form.name.trim(),
          className: form.className.trim(),
          year: form.year.trim(),
          colorKey: form.colorKey,
          feePerStudent: Number(form.feePerStudent),
          members: form.members || [],
          whatsappGroups: form.whatsappGroups || [],
        });
        setMode("list"); setEditingId(null);
      };

      const handleCopy = async (id) => {
        const src = budgets.find(b => b.id === id);
        if (!src) return;
        const { id: _id, ...rest } = src;
        await onAddBudget({ ...rest, name: `עותק — ${src.name}` });

      const handleDeleteConfirmed = async () => {
        if (deleteConfirmId) { await onDeleteBudget(deleteConfirmId); }
        setDeleteConfirmId(null);
      };

      const editingBudget = budgets.find(b => b.id === editingId);
      const deleteTargetName = deleteConfirmId ? (budgets.find(b => b.id === deleteConfirmId)?.name || "") : "";

      const navBtnStyle = { background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.3)", borderRadius: 10, padding: "8px 14px", color: "white", cursor: "pointer", fontSize: 13, fontFamily: "inherit", fontWeight: 600 };

      return (
        <div className="kupati-bg" style={{ minHeight: "100vh" }}>
          <Toast message={toast} />
          <HelpModal isOpen={showHelp} onClose={() => setShowHelp(false)} title="איך עובד דף התקציב?" content={BUDGET_HELP_CONTENT} closeLabel="הבנתי" />
          <ConfirmDeleteModal isOpen={!!deleteConfirmId} itemName={deleteTargetName} onConfirm={handleDeleteConfirmed} onCancel={() => setDeleteConfirmId(null)} />

            background: "linear-gradient(135deg, #0f766e 0%, #0d9488 50%, #10b981 100%)",
            padding: "28px 20px 32px", position: "relative", overflow: "hidden",
          }}>
            {/* decorative circles */}
            <div style={{ position: "absolute", top: -30, left: -20, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,0.07)", pointerEvents: "none" }} />
            <div style={{ position: "absolute", bottom: -20, right: 30, width: 100, height: 100, borderRadius: "50%", background: "rgba(245,158,11,0.12)", pointerEvents: "none" }} />

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <KupatiLogo size={56} />
                <div>
                  <div style={{ color: "white", fontWeight: 900, fontSize: 26, letterSpacing: -0.5, lineHeight: 1.1 }}>Kupati</div>

                  <button onClick={onSignOut} style={navBtnStyle}>יציאה</button>
                </div>
                {currentClass?.inviteCode && (
                  <button

                    🔗 קוד הצטרפות

            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

            {mode === "edit" && editingBudget && (

                title="✏️ עריכת תקציב"
                initial={{ ...editingBudget, feePerStudent: String(editingBudget.feePerStudent), members: editingBudget.members || [], whatsappGroups: editingBudget.whatsappGroups || [] }}
                onSave={handleSave}
                onCancel={() => { setMode("list"); setEditingId(null); }}

              <div style={{ textAlign: "center", color: "#94a3b8", padding: "40px 0" }}>

            <span style={{ margin: "0 6px", color: "#cbd5e1" }}>•</span>
            <a href="mailto:rottem.wolf@gmail.com?subject=Kupati Bug Report" style={{ color: "#94a3b8", textDecoration: "none", fontSize: 12 }}>דיווח על באג</a>
          </div>

    // ─────────────────────────────────────────
    // BUDGET TAB — Events with edit
    // ─────────────────────────────────────────
    const EMPTY_EVENT = { name: "", date: "", budget: "", spent: "", category: "פעילות", notes: "", paidBy: "", paidBySplit: [], done: false, type: "expense" };

    function PaidBySplit({ total, splits, onChange }) {
      const totalNum = Number(String(total).replace(/[^\d.]/g, '')) || 0;
      const otherTotal = splits.reduce((s, x) => s + (Number(x.amount) || 0), 0);
      const kupaAmount = totalNum - otherTotal;
      const update = (i, field, val) => onChange(splits.map((s, j) => j === i ? { ...s, [field]: val } : s));
      const remove = (i) => onChange(splits.filter((_, j) => j !== i));
      const addSplit = () => {
        onChange([...splits, { name: "", amount: kupaAmount > 0 ? kupaAmount : "" }]);
      };
      const kupaStyle = { ...S.input, marginBottom: 0, width: "auto", flex: 1, background: "#f0fdfa", display: "flex", alignItems: "center" };
      return (
        <div style={{ marginBottom: 8 }}>
          <FieldLabel>שולם / נגבה ע״י (אופציונלי)</FieldLabel>
          {totalNum > 0 && (
            <div style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <div style={{ ...kupaStyle, flex: 2, color: "#0d9488", fontWeight: 600 }}>קופת איסוף</div>
              <div style={{ ...kupaStyle, color: kupaAmount < -0.01 ? "#ef4444" : "#0d9488", fontWeight: 600 }}>{fmt(kupaAmount)}</div>
              <div style={{ width: 24, flexShrink: 0 }} />
            </div>
          )}
          {splits.map((sp, i) => (
            <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input value={sp.name} onChange={e => update(i, "name", e.target.value)} placeholder="שם"
                style={{ ...S.input, marginBottom: 0, flex: 2 }} />
              <input type="text" inputMode="numeric" value={sp.amount}
                onChange={e => update(i, "amount", e.target.value.replace(/[^\d.]/g, ''))}
                onPaste={e => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); update(i, "amount", t.replace(/[^\d.]/g, '')); }}
                placeholder="סכום" style={{ ...S.input, marginBottom: 0, flex: 1 }} />
              <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 16, padding: "0 4px", flexShrink: 0 }}>✕</button>
            </div>
          ))}
          {kupaAmount < -0.01 && (
            <div style={{ color: "#ef4444", fontSize: 11, marginBottom: 6 }}>
              סכומי הפיצול עולים על הסכום הכולל ב-{fmt(Math.abs(kupaAmount))}
            </div>
          )}
          <button onClick={addSplit} style={{ ...S.smallBtn("#e2e8f0", "#64748b"), marginBottom: 6 }}>+ הוסף שולם נוסף</button>
        </div>
      );
    }

    function EventForm({ data, onChange, onSave, onSaveAndNew, onCancel, title }) {
      const setAmt = (field, val) => onChange({ ...data, [field]: val.replace(/[^\d.]/g, '') });
      const pasteAmt = (field, e) => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); onChange({ ...data, [field]: t.replace(/[^\d.]/g, '') }); };
      return (
        <Card style={{ border: "2px solid #ccfbf1" }}>
          <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>{title}</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            {["expense", "income"].map(t => (
              <button key={t} onClick={() => onChange({ ...data, type: t })} style={{
                flex: 1, padding: "10px 0", borderRadius: 10, border: "none",
                cursor: "pointer", fontFamily: "inherit", fontWeight: 700, fontSize: 13,
                background: data.type === t ? (t === "expense" ? "#fee2e2" : "#dcfce7") : "#f1f5f9",
                color:      data.type === t ? (t === "expense" ? "#ef4444" : "#059669") : "#94a3b8",
              }}><span style={{ display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n={t === "expense" ? "expense" : "income"} s={13} c={data.type === t ? (t === "expense" ? "#ef4444" : "#059669") : "#94a3b8"} w={2} />{t === "expense" ? "הוצאה" : "הכנסה"}</span></button>
            ))}
          </div>
          <FieldLabel>קטגוריה</FieldLabel>
          <select value={data.category} onChange={e => onChange({ ...data, category: e.target.value })} style={S.input}>
            {CAT_LIST.map(c => <option key={c}>{c}</option>)}
          </select>
          {data.category === "חג" && (
            <div style={{ marginBottom: 4 }}>
              <FieldLabel>בחרי חג (ימלא את שם הארוע)</FieldLabel>
              <select value="" onChange={e => { if (e.target.value) onChange({ ...data, name: e.target.value }); }} style={S.input}>
                <option value="">— בחרי חג —</option>
                {HOLIDAY_OPTIONS.map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          )}
          <FieldLabel>שם הארוע *</FieldLabel>
          <input value={data.name} onChange={e => onChange({ ...data, name: e.target.value })} placeholder="שם הארוע" style={S.input} autoFocus />
          <FieldLabel>תאריך</FieldLabel>
          <input type="date" value={data.date} onChange={e => onChange({ ...data, date: e.target.value })} style={S.input} />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <FieldLabel>תקציב ₪</FieldLabel>
              <input type="text" inputMode="numeric" value={data.budget}
                onChange={e => setAmt("budget", e.target.value)} onPaste={e => pasteAmt("budget", e)}
                placeholder="0" style={S.input} />
            </div>
            <div style={{ flex: 1 }}>
              <FieldLabel>{(data.type || "expense") === "income" ? "התקבל ₪" : "שולם ₪"}</FieldLabel>
              <input type="text" inputMode="numeric" value={data.spent}
                onChange={e => setAmt("spent", e.target.value)} onPaste={e => pasteAmt("spent", e)}
                placeholder="0" style={S.input} />
            </div>
          </div>
          <FieldLabel>הערות</FieldLabel>
          <input value={data.notes} onChange={e => onChange({ ...data, notes: e.target.value })} placeholder="הערות" style={S.input} />
          <PaidBySplit
            total={data.spent}
            splits={data.paidBySplit || []}
            onChange={splits => onChange({ ...data, paidBySplit: splits })}
          />
          <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
            <input type="checkbox" checked={!!data.done} onChange={e => onChange({ ...data, done: e.target.checked })} style={{ width: 16, height: 16 }} />
            הושלם ✅
          </label>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onSave} style={S.btn("#0d9488")} disabled={!data.name.trim()}>שמור</button>
            {onSaveAndNew && <button onClick={onSaveAndNew} style={S.btn("#0f172a")} disabled={!data.name.trim()}>שמור + חדש</button>}
            <button onClick={onCancel} style={S.btn("#94a3b8")}>ביטול</button>
          </div>
        </Card>
      );
    }

    function BudgetTab({ events, setEvents, collectionBudget = 0, expectedStudents = 0 }) {
      const [showAdd, setShowAdd] = useState(false);
      const [filter, setFilter]  = useState("הכל");
      const [addForm, setAddForm] = useState(EMPTY_EVENT);
      const [editId, setEditId]  = useState(null);
      const [editForm, setEditForm] = useState({});

      const totalExpBudget   = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.budget, 0);
      const totalIncBudget   = collectionBudget + events.filter(e => (e.type || "expense") === "income").reduce((s, e) => s + e.budget, 0);
      const totalSpent       = events.filter(e => (e.type || "expense") === "expense").reduce((s, e) => s + e.spent, 0);
      const budgetPerStudent = expectedStudents > 0 ? Math.round(totalExpBudget / expectedStudents) : null;
      const balance          = totalIncBudget - totalExpBudget;
      const cats             = ["הכל", ...CAT_LIST];
      const filtered         = filter === "הכל" ? events : events.filter(e => e.category === filter);
      const parseSortDate    = (d) => { if (!d) return Infinity; if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return new Date(d).getTime(); const m = d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/); if (m) { let y = parseInt(m[3]); if (y < 100) y += 2000; return new Date(y, parseInt(m[2]) - 1, parseInt(m[1])).getTime(); } return Infinity; };
      const sorted           = [...filtered].sort((a, b) => parseSortDate(a.date) - parseSortDate(b.date));

      const buildEvent = (form) => {
        const splits = (form.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        return { id: Date.now(), ...form, budget: Number(form.budget) || 0, spent: Number(form.spent) || 0, paidBy, paidBySplit: splits };
      };

      const addEvent       = () => { if (!addForm.name.trim()) return; setEvents([...events, buildEvent(addForm)]); setAddForm(EMPTY_EVENT); setShowAdd(false); };
      const addEventAndNew = () => { if (!addForm.name.trim()) return; setEvents([...events, buildEvent(addForm)]); setAddForm(EMPTY_EVENT); };

      const startEdit  = (ev) => {
        const paidBySplit = (ev.paidBySplit || (ev.paidBy ? [{ name: ev.paidBy, amount: ev.spent }] : [])).filter(s => s.name !== "קופת איסוף");
        setEditId(ev.id); setEditForm({ ...ev, budget: String(ev.budget), spent: String(ev.spent), type: ev.type || "expense", paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit   = () => {
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setEvents(events.map(e => e.id === editId ? { ...editForm, id: editId, budget: Number(editForm.budget) || 0, spent: Number(editForm.spent) || 0, paidBy, paidBySplit: splits } : e));
        setEditId(null);
      };
      const removeEvent = (id) => { if (window.confirm("למחוק ארוע זה?")) setEvents(events.filter(e => e.id !== id)); };
      const toggleDone  = (id) => setEvents(events.map(e => e.id === id ? { ...e, done: !e.done } : e));

      return (
        <div>
          {/* Summary — dark card */}
          <div style={{ background: "linear-gradient(135deg,#1e293b,#0f172a)", borderRadius: 20, padding: 20, color: "white", marginBottom: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {[
                { l: "תקציב הוצאות", v: fmt(totalExpBudget), c: "#f87171" },
                { l: "תקציב הכנסות", v: fmt(totalIncBudget), c: "#4ade80" },
                { l: "שולם בפועל",   v: fmt(totalSpent),     c: "#c084fc" },
                { l: "יתרה תקציבית", v: fmt(balance),        c: balance >= 0 ? "#4ade80" : "#f87171" },
              ].map(x => (
                <div key={x.l}>
                  <div style={{ fontSize: 24, fontWeight: 900, color: x.c, letterSpacing: -0.5 }}>{x.v}</div>
                  <div style={{ fontSize: 11, opacity: 0.55, marginTop: 2 }}>{x.l}</div>
                </div>
              ))}
            </div>
            {budgetPerStudent !== null && (
              <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ opacity: 0.55, fontSize: 11 }}>תקציב לתלמיד</div>
                  <div style={{ opacity: 0.4, fontSize: 10 }}>הוצאות ÷ {expectedStudents} תלמידים</div>
                </div>
                <div style={{ fontSize: 28, fontWeight: 900, color: "#60a5fa" }}>{fmt(budgetPerStudent)}</div>
              </div>
            )}
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
            {cats.map(c => (
              <button key={c} onClick={() => setFilter(c)} style={{
                padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer",
                fontFamily: "inherit", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap",
                background: filter === c ? "#0d9488" : "#f1f5f9",
                color:      filter === c ? "white"   : "#64748b",
              }}>{c}</button>
            ))}
          </div>

          {/* Event list */}
          {sorted.map(ev => {
            const isIncome = (ev.type || "expense") === "income";
            return editId === ev.id ? (
              <EventForm key={ev.id} title="✏️ עריכת ארוע" data={editForm} onChange={setEditForm} onSave={saveEdit} onCancel={cancelEdit} />
            ) : (
              <Card key={ev.id} style={{ opacity: ev.done ? 0.65 : 1, padding: "12px 14px", borderRight: `3px solid ${isIncome ? "#22c55e" : "#0d9488"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                      <button onClick={() => toggleDone(ev.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 0, lineHeight: 1 }}>
                        {ev.done ? "✅" : "⬜"}
                      </button>
                      <span style={{ fontWeight: 700, fontSize: 14, color: "#0f172a" }}>{ev.name}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 8, background: isIncome ? "#dcfce7" : "#fee2e2", color: isIncome ? "#059669" : "#ef4444" }}>
                        <span style={{ display:"inline-flex", alignItems:"center", gap: 3 }}><Icon n={isIncome ? "income" : "expense"} s={10} c={isIncome ? "#059669" : "#ef4444"} w={2.2} />{isIncome ? "הכנסה" : "הוצאה"}</span>
                      </span>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                      <Badge text={ev.category} cat={ev.category} />
                      <span style={{ fontSize: 11, color: "#94a3b8" }}>{formatDate(ev.date)}</span>
                      {ev.paidBy && <span style={{ fontSize: 11, color: "#64748b", display:"inline-flex", alignItems:"center", gap: 4 }}><Icon n="user" s={11} c="#94a3b8" w={1.8} /> {ev.paidBy}</span>}
                    </div>
                    {ev.notes && <div style={{ fontSize: 11, color: "#64748b", display:"flex", alignItems:"center", gap: 4 }}><Icon n="pencil" s={11} c="#94a3b8" w={1.8} /> {ev.notes}</div>}
                  </div>
                  <div style={{ textAlign: "left", flexShrink: 0, marginRight: 8 }}>
                    <div style={{ fontWeight: 900, fontSize: 16, color: "#0f172a" }}>₪{ev.budget.toLocaleString('he-IL')}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8" }}>תקציב</div>
                    {ev.spent > 0 && <div style={{ fontSize: 12, fontWeight: 700, color: isIncome ? "#059669" : "#ea580c", marginTop: 2 }}>₪{ev.spent.toLocaleString('he-IL')} {isIncome ? "התקבל" : "שולם"}</div>}
                  </div>
                </div>
                {ev.spent > 0 && ev.budget > 0 && (
                  <ProgressBar
                    pct={(ev.spent / ev.budget) * 100}
                    color={isIncome ? "#22c55e" : ((ev.spent / ev.budget) > 1 ? "#ef4444" : (ev.spent / ev.budget) > 0.8 ? "#f59e0b" : "#0d9488")}
                    style={{ marginTop: 8, marginBottom: 4 }}
                  />
                )}
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <button onClick={() => startEdit(ev)} style={S.smallBtn("#e2e8f0", "#64748b")}>עריכה</button>
                  <button onClick={() => removeEvent(ev.id)} style={S.smallBtn("#fee2e2", "#ef4444")}>✕ מחקי</button>
                </div>
              </Card>
            );
          })}

          {/* Add form */}
          {showAdd ? (
            <EventForm title="➕ ארוע חדש" data={addForm} onChange={setAddForm} onSave={addEvent} onSaveAndNew={addEventAndNew} onCancel={() => { setShowAdd(false); setAddForm(EMPTY_EVENT); }} />
          ) : (
            <button onClick={() => setShowAdd(true)} style={{
              width: "100%", padding: 14, borderRadius: 14, border: "2px dashed #e2e8f0",
              background: "transparent", color: "#0d9488", fontWeight: 700, fontSize: 14,
              cursor: "pointer", fontFamily: "inherit",
            }}>+ הוסיפי ארוע</button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    // COLLECT TAB — Students with edit
    // ─────────────────────────────────────────
    const EMPTY_STUDENT_FORM = { name: "", paid: false, amount: "", note: "", paidBy: "", paidBySplit: [], partial: false };

    function CollectTab({ students, setStudents, feePerStudent = 500, setFeePerStudent, expectedStudents = 0, setExpectedStudents, payboxLink = "", setPayboxLink, classWhatsappLink = "", setClassWhatsappLink }) {
      const [search,        setSearch]        = useState("");
      const [showAdd,       setShowAdd]       = useState(false);
      const [addForm,       setAddForm]       = useState(EMPTY_STUDENT_FORM);
      const [editId,        setEditId]        = useState(null);
      const [editForm,      setEditForm]      = useState({});
      const [studentsRaw,   setStudentsRaw]   = useState(String(expectedStudents));

      const paidCount      = students.filter(s => s.paid).length;
      const totalCollected = students.reduce((s, st) => s + (st.amount || 0), 0);
      const collectionBudgetTotal = expectedStudents * feePerStudent;
      const filtered       = search ? students.filter(s => s.name.includes(search)) : students;

      const toggle = (id) => setStudents(students.map(s =>
        s.id === id ? { ...s, paid: !s.paid, amount: !s.paid ? feePerStudent : s.amount } : s
      ));

      const buildStudent = (form) => {
        const splits = (form.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        return { id: Date.now(), name: form.name.trim(), paid: !!form.paid, amount: Number(form.amount) || 0, note: form.note || "", paidBy, paidBySplit: splits, partial: !!form.partial };
      };

      const addStudent       = () => { if (!addForm.name.trim()) return; setStudents([...students, buildStudent(addForm)]); setAddForm(EMPTY_STUDENT_FORM); setShowAdd(false); };
      const addStudentAndNew = () => { if (!addForm.name.trim()) return; setStudents([...students, buildStudent(addForm)]); setAddForm(EMPTY_STUDENT_FORM); };

      const startEdit = (s) => {
        const paidBySplit = (s.paidBySplit || (s.paidBy ? [{ name: s.paidBy, amount: s.amount }] : [])).filter(sp => sp.name !== "קופת איסוף");
        setEditId(s.id); setEditForm({ ...s, amount: String(s.amount), paidBySplit });
      };
      const cancelEdit = () => setEditId(null);
      const saveEdit = () => {
        const splits = (editForm.paidBySplit || []).map(s => ({ ...s, amount: Number(s.amount) || 0 }));
        const paidBy = splits.map(s => s.name).filter(Boolean).join(', ');
        setStudents(students.map(s => s.id === editId
          ? { ...editForm, id: editId, amount: Number(editForm.amount) || 0, paid: !!editForm.paid, partial: !!editForm.partial, paidBy, paidBySplit: splits }
          : s
        ));
        setEditId(null);
      };
      const removeStudent = (id) => { if (window.confirm("למחוק תלמיד זה?")) setStudents(students.filter(s => s.id !== id)); };

      const unpaidStudents = students.filter(s => !s.paid);
      const whatsappMsg = unpaidStudents.length === 0
        ? null
        : paidCount === 0
          ? `שלום כיתה יקרה! 😊\nנפתחה גבייה לדמי ועד הורים לשנה"ל: ₪${feePerStudent} לתלמיד.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`
          : `שלום 😊 תזכורת ידידותית לתשלום דמי ועד הורים (₪${feePerStudent}).\nטרם שולם: ${unpaidStudents.map(s => s.name).join(', ')}.\n${payboxLink ? `ניתן לשלם דרך: ${payboxLink}` : 'ניתן להעביר בפייבוקס / העברה בנקאית.'}\nתודה! 🙏`;

      return (
        <div>
          {/* Paybox / Bit link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לפייבוקס / ביט</FieldLabel>
            <input value={payboxLink} onChange={e => setPayboxLink && setPayboxLink(e.target.value)}
              placeholder="https://paybox.me/..." style={{ ...S.input, marginBottom: payboxLink ? 6 : 0 }} />
            {payboxLink && <a href={payboxLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#0d9488" }}>🔗 פתח קישור לתשלום</a>}
          </Card>

          {/* Class WhatsApp link */}
          <Card style={{ marginBottom: 10 }}>
            <FieldLabel>קישור לוואצאפ כיתה</FieldLabel>
            <input value={classWhatsappLink} onChange={e => setClassWhatsappLink && setClassWhatsappLink(e.target.value)}
              placeholder="https://chat.whatsapp.com/..." style={{ ...S.input, marginBottom: classWhatsappLink ? 6 : 0 }} />
            {classWhatsappLink && <a href={classWhatsappLink} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#25d366" }}>💬 פתח קבוצת כיתה</a>}
          </Card>

          {/* Collection budget settings */}
          <Card style={{ marginBottom: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div>
                <FieldLabel>מספר תלמידים</FieldLabel>
                <input type="text" inputMode="decimal" value={studentsRaw} onChange={e => { const raw = e.target.value; setStudentsRaw(raw); const num = parseFloat(raw); if (setExpectedStudents) setExpectedStudents(isNaN(num) ? 0 : num); }} style={{ ...S.input, marginBottom: 0 }} />
              </div>
              <div>
                <FieldLabel>סכום לגבייה ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={feePerStudent} onChange={e => setFeePerStudent && setFeePerStudent(Number(e.target.value) || 0)} style={{ ...S.input, marginBottom: 0 }} />
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, padding: "10px 14px", background: "#f0fdf4", borderRadius: 10 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: "#166534" }}>תקציב גבייה</span>
              <span style={{ fontSize: 24, fontWeight: 900, color: "#059669" }}>{fmt(collectionBudgetTotal)}</span>
            </div>
          </Card>

          {/* Gradient summary header */}
          <div style={{ background: "linear-gradient(135deg,#059669,#0d9488)", borderRadius: 20, padding: 20, color: "white", marginBottom: 12 }}>
            <div style={{ opacity: 0.75, fontSize: 13, marginBottom: 2 }}>סה״כ נגבה</div>
            <div style={{ fontSize: 36, fontWeight: 900, letterSpacing: -1 }}>
              ₪{totalCollected.toLocaleString('he-IL')}
            </div>
            {collectionBudgetTotal > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 100, height: 7, overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 100, background: "rgba(255,255,255,0.7)", width: `${Math.min((totalCollected / collectionBudgetTotal) * 100, 100)}%`, transition: "width 0.4s ease" }} />
                </div>
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 12 }}>
              <div>
                <div style={{ opacity: 0.65, fontSize: 10 }}>שילמו</div>
                <div style={{ fontWeight: 700, fontSize: 15, display:"flex", alignItems:"center", gap: 4 }}><Icon n="check" s={13} c="white" w={2.5} /> {paidCount}/{students.length}</div>
              </div>
              <div>
                <div style={{ opacity: 0.65, fontSize: 10 }}>יעד גבייה</div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>₪{collectionBudgetTotal.toLocaleString('he-IL')}</div>
              </div>
              <div>
                <div style={{ opacity: 0.65, fontSize: 10 }}>ממתינים</div>
                <div style={{ fontWeight: 700, fontSize: 15, color: students.length - paidCount > 0 ? "#fde68a" : "#86efac", display:"flex", alignItems:"center", gap: 4 }}>
                  {students.length - paidCount > 0 && <Icon n="x" s={13} c="#fde68a" w={2.5} />}
                  {students.length - paidCount > 0 ? `${students.length - paidCount} ילדים` : "✓ הכל"}
                </div>
              </div>
            </div>
          </div>

          <input placeholder="🔍 חפשי תלמיד..." value={search}
            onChange={e => setSearch(e.target.value)} style={{ ...S.input, marginBottom: 10 }} />

          {students.length > 0 && (
            <>
              <ProgressBar pct={(paidCount / students.length) * 100} color="linear-gradient(90deg,#0d9488,#10b981)" />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94a3b8", marginBottom: 14, marginTop: 4 }}>
                <span>0%</span>
                <span style={{ fontWeight: 600 }}>{Math.round((paidCount / students.length) * 100)}% שולם</span>
                <span>100%</span>
              </div>
            </>
          )}

          {filtered.map(s => (
            editId === s.id ? (
              <Card key={s.id} style={{ border: "2px solid #ccfbf1" }}>
                <div style={{ fontWeight: 700, marginBottom: 10, fontSize: 14 }}>✏️ עריכת תלמיד</div>
                <FieldLabel>שם</FieldLabel>
                <input value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} style={S.input} autoFocus />
                <FieldLabel>סכום ששולם ₪</FieldLabel>
                <input type="text" inputMode="numeric" value={editForm.amount}
                  onChange={e => setEditForm({ ...editForm, amount: e.target.value.replace(/[^\d.]/g, '') })}
                  onPaste={e => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); setEditForm({ ...editForm, amount: t.replace(/[^\d.]/g, '') }); }}
                  style={S.input} />
                <FieldLabel>הערה</FieldLabel>
                <input value={editForm.note || ""} onChange={e => setEditForm({ ...editForm, note: e.target.value })} placeholder="הערה..." style={S.input} />
                <PaidBySplit
                  total={editForm.amount}
                  splits={editForm.paidBySplit || []}
                  onChange={splits => setEditForm({ ...editForm, paidBySplit: splits })}
                />
